::-webkit-scrollbar-thumb{background:#C5CDD9;border-radius:3px}
input,select,textarea,button{font-family:'IBM Plex Sans',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-item{transition:all .15s ease;cursor:pointer}
.nav-item:hover{background:rgba(255,255,255,.08)!important;color:#fff!important}
.nav-item.active{background:#1447E6!important;color:#fff!important}
.card{transition:border-color .15s ease,box-shadow .15s ease}
.card:hover{border-color:#93BFFC!important;box-shadow:0 2px 12px rgba(20,71,230,.07)!important}

.btn-p:hover{background:#0F3CC7}
.btn-s{background:#fff;color:#3D4F6B;border:1px solid #D8DDE6;cursor:pointer;border-radius:7px;font-family:'IBM Plex Sans',sans-serif;transition:all .15s}
.btn-s:hover{background:#F5F7FA;border-color:#B0BAC8}
.row-hover:hover{background:#F7F9FC!important}
.inp{background:#fff;border:1px solid #D8DDE6;color:#0D1B2A;border-radius:6px;padding:9px 12px;font-size:13.5px;width:100%;outline:none;font-family:'IBM Plex Sans',sans-serif;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:#1447E6;box-shadow:0 0 0 3px rgba(20,71,230,.1)}
.tab{background:none;border:none;cursor:pointer;padding:8px 14px;font-size:13px;font-weight:500;color:#6B7A90;border-bottom:2px solid transparent;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:all .15s}
.tab.on{color:#1447E6;border-bottom-color:#1447E6}
.tab:hover{color:#1447E6}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex}
.tabscroll::-webkit-scrollbar{display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;animation:fadeIn .2s ease}
@media(max-width:640px){.hide-mobile{display:none!important}}

(function(){

     'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js'],
  ];
  var idx=0;
  function tryLoad(i){
    if(i>=cdns.length){
      document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px;background:#0D1B2A;color:#fff"><div style="font-size:32px">🚛</div><div style="font-size:18px;font-weight:700">FleetOS</div><div style="font-size:14px;color:rgba(255,255,255,.6);text-align:center;max-width:360px">No se pudo cargar la aplicación.<br>Necesita conexión a internet la primera vez que abre el archivo.<br><br>Si ya tiene internet, intente recargar (F5).</div><button onclick="location.reload()" style="margin-top:8px;padding:10px 24px;background:#1447E6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">Recargar</button></div>';
      return;
    }
    var s1=document.createElement('script');
    s1.src=cdns[i][0];
    s1.crossOrigin='anonymous';
    s1.onerror=function(){tryLoad(i+1);};
    s1.onload=function(){
      var s2=document.createElement('script');
      s2.src=cdns[i][1];
      s2.crossOrigin='anonymous';
      s2.onerror=function(){tryLoad(i+1);};
      s2.onload=function(){ startApp(); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  }
  tryLoad(0);
})();
</script>

  );
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({units,drivers,trips,fuel,maint}){
  const {isMobile,isTablet}=useBP();
  const active=units.filter(u=>u.status==="en ruta").length;
  const done=trips.filter(t=>t.status==="finalizado").length;
  const fuelCost=fuel.reduce((a,b)=>a+b.cost,0);
  const maintCost=maint.reduce((a,b)=>a+(b.cost||0),0);
  const avgEff=(units.reduce((a,b)=>a+b.fuelEff,0)/units.length).toFixed(1);
  const alerts=[
    ...units.filter(u=>days(u.docExpiry)<30).map(u=>({t:"danger",m:`Documentación de ${u.plates} vence en ${days(u.docExpiry)} días.`})),

        ),
        h('div',{style:{padding:"18px 18px 14px"}},
          byStatus.map(t=>h('div',{key:t.l,style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},

            h('div',{style:{flex:1,height:8,background:C.surfaceAlt,borderRadius:4,overflow:"hidden"}},
              h('div',{style:{height:"100%",width:`${(t.v/maxT)*100}%`,background:t.c,borderRadius:4,transition:"width .5s"}})

// ── DRIVERS ──────────────────────────────────────────────────────────────────
function Drivers({drivers,setDrivers,units}){
  const {isMobile,isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [detailId,setDetailId]=useState(null);     // driver detail panel
  const [incModal,setIncModal]=useState(null);      // add incident for driver id
  const ef={name:"",license:"",licExpiry:"",phone:"",rfc:"",address:""};
  const [form,setForm]=useState(ef);
  const [incForm,setIncForm]=useState({type:"Infracción de tránsito",date:"",desc:"",sev:"warn"});
  const [filtEstatus,setFiltEstatus]=useState("activo");
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  function openNew(){
    setForm(ef);setEditId(null);setModal(true);
  }
  function openEdit(d){
    setForm({name:d.name,license:d.license,licExpiry:d.licExpiry,phone:d.phone||"",
      rfc:d.rfc||"",address:d.address||"",estatus:d.estatus||"activo"});
    setEditId(d.id);setModal(true);
  }
  function save(){
    if(!form.name||!form.license)return;
    if(editId){
      setDrivers(drivers.map(d=>d.id===editId?{...d,...form}:d));
    } else {
      setDrivers([...drivers,{...form,id:`D${String(drivers.length+1).padStart(3,"0")}`,
        trips:0,fuelScore:85,licPdf:null,licPdfName:null,incidents:[],estatus:form.estatus||"activo"}]);
    }
    setModal(false);setEditId(null);setForm(ef);
  }

  function handleLicPdf(driverId,file){
    if(!file||file.type!=="application/pdf")return;
    const reader=new FileReader();
    reader.onload=e=>{
      setDrivers(prev=>prev.map(d=>d.id===driverId
        ?{...d,licPdf:e.target.result,licPdfName:file.name}:d));
    };
    reader.readAsDataURL(file);
  }

  function addIncident(driverId){
    if(!incForm.date||!incForm.desc)return;
    setDrivers(prev=>prev.map(d=>{
      if(d.id!==driverId)return d;
      const newInc={...incForm,id:`I${Date.now()}`};
      const newIncs=[...(d.incidents||[]),newInc];
      // Recalculate fuelScore: base 100 - penalties
      const penalties=newIncs.reduce((a,i)=>a+(i.sev==="danger"?10:5),0);
      return{...d,incidents:newIncs,fuelScore:Math.max(10,100-penalties)};
    }));
    setIncModal(null);
    setIncForm({type:"Infracción de tránsito",date:"",desc:"",sev:"warn"});
  }

  function removeIncident(driverId,incId){
    setDrivers(prev=>prev.map(d=>{
      if(d.id!==driverId)return d;
      const newIncs=(d.incidents||[]).filter(i=>i.id!==incId);
      const penalties=newIncs.reduce((a,i)=>a+(i.sev==="danger"?10:5),0);
      return{...d,incidents:newIncs,fuelScore:Math.max(10,100-penalties)};
    }));
  }

// ── CHART COMPONENTS (pure SVG, no libs) ─────────────────────────────────────

// Bar chart — data:[{label,value,value2?}], colors, height, formatY
function BarChart({data,color="#1447E6",color2,height=180,formatY,title,subtitle}){
  if(!data||!data.length) return h('div',{style:{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,fontSize:13}},"Sin datos");
  const max=Math.max(...data.flatMap(d=>[d.value,d.value2||0]),1);
  const PAD={l:48,r:8,t:16,b:36};
  const W=400, H=height+PAD.t+PAD.b;
  const chartW=W-PAD.l-PAD.r, chartH=height;
  const barW=data.length>1?(chartW/data.length)*0.55:40;
  const gap=(chartW/data.length);
  const fmtV=formatY||(v=>v>=1000000?`${(v/1000000).toFixed(1)}M`:v>=1000?`${(v/1000).toFixed(0)}k`:String(v));
  // Y grid lines
  const yTicks=4;
  return h('div',{style:{width:"100%",position:"relative"}},
    h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:"auto",display:"block",overflow:"visible"}},
      // Y grid + labels
      [...Array(yTicks+1)].map((_,i)=>{
        const val=Math.round((max/yTicks)*i);
        const y=PAD.t+chartH-(chartH/yTicks)*i;
        return h('g',{key:`yg${i}`},
          h('line',{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.borderLt,strokeWidth:.8}),
          h('text',{x:PAD.l-5,y:y+4,textAnchor:"end",fontSize:9,fill:C.textLight,fontFamily:"IBM Plex Mono,monospace"},
            fmtV(val))
        );
      }),
      // Bars + x labels
      data.map((d,i)=>{
        const cx=PAD.l+gap*i+gap/2;
        const bh1=d.value>0?(d.value/max)*chartH:0;
        const bh2=d.value2>0?(d.value2/max)*chartH:0;
        const dual=color2&&d.value2!==undefined;
        const bw=dual?barW*.46:barW;
        return h('g',{key:`b${i}`},
          // Bar 1
          h('rect',{
            x:cx-(dual?barW/2:bw/2), y:PAD.t+chartH-bh1,
            width:bw, height:Math.max(bh1,0), rx:3,
            fill:color, opacity:.9
          }),
          // Bar 2 (optional)
          dual&&h('rect',{
            x:cx+2, y:PAD.t+chartH-bh2,
            width:bw, height:Math.max(bh2,0), rx:3,
            fill:color2, opacity:.85
          }),
          // Value label on top
          d.value>0&&h('text',{
            x:cx-(dual?barW/4:0),y:PAD.t+chartH-bh1-4,
            textAnchor:"middle",fontSize:8.5,fill:color,fontWeight:"600",
            fontFamily:"IBM Plex Sans,sans-serif"
          },fmtV(d.value)),
          // X label
          h('text',{x:cx,y:PAD.t+chartH+14,textAnchor:"middle",
            fontSize:data.length>8?7.5:9,fill:C.textLight,
            fontFamily:"IBM Plex Sans,sans-serif"},
            d.label.length>5?d.label.slice(0,5):d.label)
        );
      }),
      // X axis
      h('line',{x1:PAD.l,y1:PAD.t+chartH,x2:W-PAD.r,y2:PAD.t+chartH,stroke:C.border,strokeWidth:1})
    )
  );
}

// Line chart
function LineChart({data,color="#1447E6",color2,height=180,formatY,smooth}){
  if(!data||data.length<2) return h('div',{style:{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,fontSize:13}},"Sin datos suficientes");
  const max=Math.max(...data.flatMap(d=>[d.value,d.value2||0]),1);
  const PAD={l:48,r:8,t:16,b:36};
  const W=400, H=height+PAD.t+PAD.b;
  const chartW=W-PAD.l-PAD.r, chartH=height;
  const fmtV=formatY||(v=>v>=1000000?`${(v/1000000).toFixed(1)}M`:v>=1000?`${(v/1000).toFixed(0)}k`:String(v));
  const px=(i)=>PAD.l+(i/(data.length-1))*chartW;
  const py=(v)=>PAD.t+chartH-(v/max)*chartH;
  // Build SVG path
  function makePath(key){
    return data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d[key]||0).toFixed(1)}`).join(" ");
  }
  function makeArea(key){
    const pts=data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d[key]||0).toFixed(1)}`).join(" ");
    return `${pts} L${px(data.length-1).toFixed(1)},${(PAD.t+chartH).toFixed(1)} L${PAD.l},${(PAD.t+chartH).toFixed(1)} Z`;
  }
  const yTicks=4;
  return h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:"auto",display:"block",overflow:"visible"}},
    h('defs',null,
      h('linearGradient',{id:`lg1${color.replace("#","")}`,x1:"0%",y1:"0%",x2:"0%",y2:"100%"},
        h('stop',{offset:"0%",stopColor:color,stopOpacity:.25}),
        h('stop',{offset:"100%",stopColor:color,stopOpacity:.02})
      ),
      color2&&h('linearGradient',{id:`lg2${color2.replace("#","")}`,x1:"0%",y1:"0%",x2:"0%",y2:"100%"},
        h('stop',{offset:"0%",stopColor:color2,stopOpacity:.2}),
        h('stop',{offset:"100%",stopColor:color2,stopOpacity:.02})
      )
    ),
    // Grid
    [...Array(yTicks+1)].map((_,i)=>{
      const val=Math.round((max/yTicks)*i);
      const y=PAD.t+chartH-(chartH/yTicks)*i;
      return h('g',{key:`yg${i}`},
        h('line',{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.borderLt,strokeWidth:.8}),
        h('text',{x:PAD.l-5,y:y+4,textAnchor:"end",fontSize:9,fill:C.textLight,fontFamily:"IBM Plex Mono,monospace"},fmtV(val))
      );
    }),
    // Area fill
    h('path',{d:makeArea("value"),fill:`url(#lg1${color.replace("#","")})`}),
    color2&&h('path',{d:makeArea("value2"),fill:`url(#lg2${color2.replace("#","")})`}),
    // Lines
    h('path',{d:makePath("value"),fill:"none",stroke:color,strokeWidth:2,strokeLinejoin:"round"}),
    color2&&h('path',{d:makePath("value2"),fill:"none",stroke:color2,strokeWidth:2,strokeLinejoin:"round",strokeDasharray:"5,3"}),
    // Dots + x labels
    data.map((d,i)=>h('g',{key:`p${i}`},
      h('circle',{cx:px(i),cy:py(d.value),r:3,fill:"#fff",stroke:color,strokeWidth:1.8}),
      color2&&h('circle',{cx:px(i),cy:py(d.value2||0),r:3,fill:"#fff",stroke:color2,strokeWidth:1.8}),
      h('text',{x:px(i),y:PAD.t+chartH+14,textAnchor:"middle",
        fontSize:data.length>8?7.5:9,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},
        d.label.length>5?d.label.slice(0,5):d.label)
    )),
    h('line',{x1:PAD.l,y1:PAD.t+chartH,x2:W-PAD.r,y2:PAD.t+chartH,stroke:C.border,strokeWidth:1})
  );
}

// Donut chart
function DonutChart({data,size=120}){
  if(!data||!data.length) return null;
  const total=data.reduce((a,b)=>a+b.value,0)||1;
  const R=46,r=28,cx=60,cy=60;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sweep=(d.value/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle+=sweep;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const ix1=cx+r*Math.cos(angle-sweep), iy1=cy+r*Math.sin(angle-sweep);
    const ix2=cx+r*Math.cos(angle), iy2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return{...d,path:`M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${large},0 ${ix1},${iy1} Z`};
  });
  return h('svg',{viewBox:"0 0 120 120",style:{width:size,height:size}},
    slices.map((s,i)=>h('path',{key:i,d:s.path,fill:s.color,stroke:"#fff",strokeWidth:1})),
    h('text',{x:cx,y:cy-4,textAnchor:"middle",fontSize:14,fontWeight:"700",fill:C.text,fontFamily:"IBM Plex Sans,sans-serif"},total),
    h('text',{x:cx,y:cy+11,textAnchor:"middle",fontSize:8,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},"total")
  );
}

                  h('td',{style:{padding:"10px 14px",fontSize:11.5,color:C.textLight,whiteSpace:"nowrap"}},
                    h('div',null,t.departDate),h('div',null,t.arrivalDate)),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.textMid}},fmt(t.km)," km"),
                  h('td',{style:{padding:"10px 14px"}},h(Badge,{status:t.status})),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",gap:5,flexWrap:"wrap"}},
                      t.status==="programado"&&h('button',{onClick:()=>chg(t.id,"en curso"),
                        style:{background:C.primaryLt,color:C.primary,border:`1px solid ${C.primary}30`,borderRadius:5,padding:"4px 8px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}},"▶ Iniciar"),
                      t.status==="en curso"&&h('button',{onClick:()=>chg(t.id,"finalizado"),
                        style:{background:C.successBg,color:C.success,border:`1px solid ${C.successBd}`,borderRadius:5,padding:"4px 8px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}},"✓ Finalizar"),
                      t.status==="en curso"&&h('button',{onClick:()=>chg(t.id,"cancelado"),
                        style:{background:C.dangerBg,color:C.danger,border:`1px solid ${C.dangerBd}`,borderRadius:5,padding:"4px 8px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}},"✕ Cancelar"),
                      h('button',{onClick:()=>openEdit(t),
                        style:{background:C.surfaceAlt,color:C.textMid,border:`1px solid ${C.border}`,borderRadius:5,padding:"4px 8px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}},"✏️")
                    )
                  )
                );
              }),
              shown.length===0&&h('tr',null,
                h('td',{colSpan:9,style:{textAlign:"center",padding:"32px 0",color:C.textLight,fontSize:13}},"Sin viajes en esta categoría."))
            )
          )
        )
      )
    ),

    modal&&h(Modal,{title:editId?"Editar Viaje":"Registrar Nuevo Viaje",width:640,
      onClose:()=>{setModal(false);setEditId(null);setForm(ef);}},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Ciudad Origen",value:form.origin,onChange:v=>upd("origin",v),half:true,required:true}),
        h(Field,{label:"Ciudad Destino",value:form.destination,onChange:v=>upd("destination",v),half:true,required:true}),
        h(Field,{label:"Cliente",value:form.client,onChange:v=>upd("client",v),required:true}),
        h(Field,{label:"Tipo de Carga",value:form.cargoType,onChange:v=>upd("cargoType",v),half:true,
          opts:["Alimentos","Bebidas","Acero","Electrónicos","Cemento","Textiles","Otro"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Estado",value:form.status,onChange:v=>upd("status",v),half:true,
          opts:["programado","en curso","finalizado","cancelado"].map(x=>({v:x,l:ST[x]?.label||x}))}),
        h(Field,{label:"Peso (kg)",value:form.weight,onChange:v=>upd("weight",v),type:"number",half:true}),
        h(Field,{label:"Km Recorridos",value:form.km,onChange:v=>upd("km",v),type:"number",half:true}),
        h(Field,{label:"Comb. Real (L)",value:form.fuelEst,onChange:v=>upd("fuelEst",v),type:"number",half:true}),
        h(Field,{label:"Fecha Salida",value:form.departDate,onChange:v=>upd("departDate",v),type:"date",half:true}),
        h(Field,{label:"Fecha Llegada",value:form.arrivalDate,onChange:v=>upd("arrivalDate",v),type:"date",half:true}),
        h(Field,{label:"Unidad",value:form.unit,onChange:v=>upd("unit",v),half:true,required:true,
          opts:[{v:"",l:"Seleccionar"},...units.map(u=>({v:u.id,l:`${u.plates} — ${u.model}`}))]}),
        h(Field,{label:"Operador",value:form.driver,onChange:v=>upd("driver",v),half:true,
          opts:[{v:"",l:"Seleccionar"},...drivers.map(d=>({v:d.id,l:d.name}))]}),
        h(Field,{label:"Mes",value:form.month,onChange:v=>upd("month",v),half:true,
          opts:["2025-01","2025-02","2025-03","2025-04","2025-05","2025-06"].map(x=>({v:x,l:x}))}),
        h('div',{style:{gridColumn:"1/-1",marginBottom:14}},
          h('label',{style:{display:"block",fontSize:11.5,fontWeight:600,color:C.textMid,marginBottom:5,
            textTransform:"uppercase",letterSpacing:".07em"}},"Notas"),
          h('textarea',{value:form.notes||"",onChange:e=>upd("notes",e.target.value),
            className:"inp",rows:2,style:{resize:"vertical",minHeight:56}})
        )
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}},
        h('button',{onClick:()=>{setModal(false);setEditId(null);setForm(ef);},
          className:"btn-s",style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},
          editId?"Guardar Cambios":"Registrar Viaje")
      )
    )
  );
}

// ── FUEL ────────────────────────────────────────────────────────────────────
function Fuel({fuel,setFuel,units,drivers}){
  const {isMobile,isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [fuelView,setFuelView]=useState("charts");
  const [fuelSubview,setFuelSubview]=useState("periodo");
  const [fuelPeriod,setFuelPeriod]=useState("month");
  const ef={unit:"",driver:"",date:"",liters:"",cost:"",location:"",km:"",month:"2025-01"};
  const [form,setForm]=useState(ef);
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  function save(){
    if(!form.unit||!form.liters)return;
    setFuel([...fuel,{...form,id:`F${String(fuel.length+1).padStart(3,"0")}`,liters:+form.liters,cost:+form.cost,km:+form.km}]);
    setModal(false);setForm(ef);
  }
  const totalL=fuel.reduce((a,b)=>a+b.liters,0);
  const totalC=fuel.reduce((a,b)=>a+b.cost,0);

  function exportCSV(){
    const rows=[["ID","Unidad","Placas","Operador","Fecha","Mes","Litros","Costo MXN","Precio/L","Odómetro","Estación"]];
    fuel.forEach(f=>{
      const u=units.find(u=>u.id===f.unit);
      const d=drivers.find(d=>d.id===f.driver);
      rows.push([f.id,f.unit,u?.plates||"",d?d.name:"",f.date,f.month||"",f.liters,f.cost,
        f.cost&&f.liters?(f.cost/f.liters).toFixed(2):"",f.km||"",f.location||""]);
    });
    const csv=rows.map(r=>r.map(v=>typeof v==="string"&&v.includes(",")? `"${v}"`:v).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="combustible_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();URL.revokeObjectURL(url);
  }
  function exportExcel(){
    let html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table border="1">';
    html+='<tr style="background:#1447E6;color:white;font-weight:bold"><th>ID</th><th>Unidad</th><th>Placas</th><th>Operador</th><th>Fecha</th><th>Mes</th><th>Litros</th><th>Costo MXN</th><th>Precio/L</th><th>Odómetro</th><th>Estación</th></tr>';
    fuel.forEach((f,i)=>{
      const u=units.find(u=>u.id===f.unit);
      const d=drivers.find(d=>d.id===f.driver);
      const bg=i%2===0?"#ffffff":"#f7f9fc";
      html+=`<tr style="background:${bg}"><td>${f.id}</td><td>${f.unit}</td><td>${u?.plates||""}</td><td>${d?d.name:""}</td><td>${f.date}</td><td>${f.month||""}</td><td>${f.liters}</td><td>${f.cost}</td><td>${f.cost&&f.liters?(f.cost/f.liters).toFixed(2):""}</td><td>${f.km||""}</td><td>${f.location||""}</td></tr>`;
    });
    html+=`<tr style="background:#EBF1FF;font-weight:bold"><td colspan="6">TOTALES</td><td>${totalL}</td><td>${totalC}</td><td>${totalL?(totalC/totalL).toFixed(2):""}</td><td colspan="2"></td></tr>`;
    html+='</table></body></html>';
    const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="combustible_"+new Date().toISOString().slice(0,10)+".xls";
    a.click();URL.revokeObjectURL(url);
  }

  // ── Chart data: por período ─────────────────────────────────────────────
  const MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const fuelMonths=[...new Set(fuel.map(f=>f.month).filter(Boolean))].sort();
  const fuelYears=[...new Set(fuelMonths.map(m=>m.slice(0,4)))].sort();
  const costByMonth=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1]+" "+m.slice(2,4),
    value:fuel.filter(f=>f.month===m).reduce((a,b)=>a+b.cost,0),
  }));
  const litersByMonth=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1]+" "+m.slice(2,4),
    value:fuel.filter(f=>f.month===m).reduce((a,b)=>a+b.liters,0),
  }));
  const costByYear=fuelYears.map(y=>({
    label:y,value:fuel.filter(f=>(f.month||"").startsWith(y)).reduce((a,b)=>a+b.cost,0),
  }));
  const litersByYear=fuelYears.map(y=>({
    label:y,value:fuel.filter(f=>(f.month||"").startsWith(y)).reduce((a,b)=>a+b.liters,0),
  }));
  const fuelCostData=fuelPeriod==="year"?costByYear:costByMonth;
  const fuelLiterData=fuelPeriod==="year"?litersByYear:litersByMonth;

  // ── Chart data: por tráiler ─────────────────────────────────────────────
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple,C.info,C.danger];
  const trailerFuel=units.map((u,i)=>{
    const recs=fuel.filter(f=>f.unit===u.id);
    const tL=recs.reduce((a,b)=>a+b.liters,0);
    const tC=recs.reduce((a,b)=>a+b.cost,0);
    const drv=drivers.find(d=>d.id===(typeof trips!=='undefined'?trips.filter(t=>t.unit===u.id&&t.status==="en curso").slice(-1)[0]?.driver:null)||null)||null;
    return {unit:u,drv,liters:tL,cost:tC,count:recs.length,
      ppl:tL>0?tC/tL:0,color:UNIT_COLORS[i%UNIT_COLORS.length],recs};
  });
  const trailerCostBar=trailerFuel.map(t=>({label:t.unit.plates,value:t.cost}));
  const trailerLiterBar=trailerFuel.map(t=>({label:t.unit.plates,value:t.liters}));
  const trailerCostDonut=trailerFuel.filter(t=>t.cost>0).map(t=>({label:t.unit.plates,value:Math.round(t.cost),color:t.color}));

  // Monthly breakdown per trailer (for line chart - pick busiest unit)
  const busiest=trailerFuel.sort((a,b)=>b.cost-a.cost)[0];
  const busiestLine=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1],
    value:fuel.filter(f=>f.unit===busiest?.unit.id&&f.month===m).reduce((a,b)=>a+b.cost,0),
  }));

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Toolbar ──────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',{style:{display:"flex",gap:6}},
        [{v:"charts",l:"📊 Gráficas"},{v:"table",l:"📋 Registros"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setFuelView(v),
            style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:7,cursor:"pointer",
              border:`1px solid ${fuelView===v?C.primary:C.border}`,
              background:fuelView===v?C.primaryLt:C.surface,color:fuelView===v?C.primary:C.textMid}},l)
        )
      ),
      h('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        fuelView==="charts"&&h('div',{style:{display:"flex",gap:4}},
          [{v:"periodo",l:"Por Período"},{v:"trailer",l:"Por Tráiler"}].map(({v,l})=>
            h('button',{key:v,onClick:()=>setFuelSubview(v),
              style:{padding:"6px 12px",fontSize:12,fontWeight:600,borderRadius:6,cursor:"pointer",
                border:`1px solid ${fuelSubview===v?C.warning:C.border}`,
                background:fuelSubview===v?C.warningBg:"#fff",color:fuelSubview===v?C.warning:C.textMid}},l)
          )
        ),
        fuelView==="charts"&&fuelSubview==="periodo"&&h('div',{style:{display:"flex",gap:4}},
          [{v:"month",l:"Mes"},{v:"year",l:"Año"}].map(({v,l})=>
            h('button',{key:v,onClick:()=>setFuelPeriod(v),
              style:{padding:"5px 10px",fontSize:12,fontWeight:600,borderRadius:6,cursor:"pointer",
                border:`1px solid ${fuelPeriod===v?C.info:C.border}`,
                background:fuelPeriod===v?C.infoBg:"#fff",color:fuelPeriod===v?C.info:C.textMid}},l)
          )
        ),
        h('div',{style:{display:"flex",gap:6}},
          h('button',{onClick:exportCSV,className:"btn-s",
            style:{padding:"7px 12px",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5,borderRadius:7}},"📄 CSV"),
          h('button',{onClick:exportExcel,
            style:{padding:"7px 12px",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5,
              borderRadius:7,cursor:"pointer",border:"1px solid #B3E6CE",background:C.successBg,color:C.success}},"📊 Excel"),
          h('button',{onClick:()=>setModal(true),className:"btn-p",
            style:{padding:"8px 13px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}},
            h(Ic,{n:"plus",s:13,c:"#fff"}),"Registrar")
        )
      )
    ),

    // KPI pills
    h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
      [["⛽ Litros",`${fmt(totalL)} L`,C.primary],["💰 Gasto",fmtM(totalC),C.warning],
       ["🔢 Cargas",fuel.length,C.info],["📊 $/L",`$${totalL?(totalC/totalL).toFixed(2):"—"}`,C.textMid]
      ].map(([l,v,col])=>
        h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 16px"}},
          h('div',{style:{fontSize:11,color:C.textLight,textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}},l),
          h('div',{style:{fontSize:17,fontWeight:700,color:col}},v)
        )
      )
    ),

    // ── CHARTS: Por Período ──────────────────────────────────────────────
    fuelView==="charts"&&fuelSubview==="periodo"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
        h(ChartPanel,{title:"Gasto en Combustible",sub:`Por ${fuelPeriod==="year"?"año":"mes"} (MXN)`,
          legend:[{label:"Gasto MXN",color:C.warning}]},
          h(BarChart,{data:fuelCostData,color:C.warning,height:180,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Litros Cargados",sub:`Por ${fuelPeriod==="year"?"año":"mes"}`,
          legend:[{label:"Litros",color:C.primary}]},
          h(BarChart,{data:fuelLiterData,color:C.primary,height:180,
            formatY:v=>v>=1000?`${(v/1000).toFixed(0)}kL`:`${v}L`})
        )
      ),
      h(ChartPanel,{title:"Tendencia de Gasto",sub:"Evolución mensual acumulada",
        legend:[{label:"Gasto MXN",color:C.warning}]},
        h(LineChart,{data:costByMonth,color:C.warning,height:150,
          formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
      )
    ),

    // ── CHARTS: Por Tráiler ──────────────────────────────────────────────
    fuelView==="charts"&&fuelSubview==="trailer"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
      // KPI cards por tráiler
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}},
        trailerFuel.map(t=>
          h('div',{key:t.unit.id,style:{background:C.surface,border:`1px solid ${C.border}`,
            borderLeft:`4px solid ${t.color}`,borderRadius:8,padding:"14px 16px"}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:800,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},t.unit.plates),
                h('div',{style:{fontSize:11.5,color:C.textLight}},t.unit.model)
              ),
              h('div',{style:{width:10,height:10,borderRadius:"50%",background:t.color,marginTop:3}})
            ),
            h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              [["Litros",t.liters>0?`${fmt(t.liters)}L`:"—",C.primary],
               ["Gasto",t.cost>0?fmtM(t.cost):"—",C.warning],
               ["Cargas",t.count,C.info],
               ["$/L",t.ppl>0?`$${t.ppl.toFixed(2)}`:"—",C.textMid]
              ].map(([l,v,col])=>
                h('div',{key:l,style:{background:C.surfaceAlt,borderRadius:6,padding:"7px 8px"}},
                  h('div',{style:{fontSize:10,color:C.textLight,marginBottom:2,textTransform:"uppercase",letterSpacing:".05em"}},l),
                  h('div',{style:{fontSize:13,fontWeight:700,color:col}},v)
                )
              )
            ),
            t.drv&&h('div',{style:{fontSize:11.5,color:C.textLight,marginTop:8,paddingTop:8,borderTop:`1px solid ${C.borderLt}`}},
              "👤 ",t.drv.name.split(" ").slice(0,2).join(" ")
            )
          )
        )
      ),
      // Gráficas
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
        h(ChartPanel,{title:"Gasto por Tráiler",sub:"Total MXN",
          legend:[{label:"Gasto MXN",color:C.warning}]},
          h(BarChart,{data:trailerCostBar,color:C.warning,height:200,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Litros por Tráiler",sub:"Total cargado",
          legend:[{label:"Litros",color:C.primary}]},
          h(BarChart,{data:trailerLiterBar,color:C.primary,height:200,
            formatY:v=>v>=1000?`${(v/1000).toFixed(0)}kL`:`${v}L`})
        )
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},
        h(ChartPanel,{title:`Evolución mensual — ${busiest?.unit.plates||""}`,sub:"Gasto del tráiler con mayor consumo",
          legend:[{label:"Gasto MXN",color:busiest?.color||C.warning}]},
          h(LineChart,{data:busiestLine,color:busiest?.color||C.warning,height:150,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Distribución del Gasto",sub:"Participación por tráiler"},
          h('div',{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}},
            h(DonutChart,{data:trailerCostDonut,size:96}),
            h('div',{style:{flex:1,display:"flex",flexDirection:"column",gap:7}},
              trailerCostDonut.map(d=>h('div',{key:d.label,style:{display:"flex",alignItems:"center",gap:8}},
                h('div',{style:{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}),
                h('div',{style:{flex:1,fontSize:12,color:C.textMid,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}},d.label),
                h('div',{style:{fontSize:11.5,fontWeight:700,color:C.text}},
                  `${trailerFuel.find(t=>t.unit.plates===d.label)?.cost>0?Math.round((d.value/totalC)*100):0}%`)
              ))
            )
          )
        )
      ),
      // Ranking tabla
      h(ChartPanel,{title:"Ranking de Consumo por Tráiler",sub:"Ordenado por gasto total"},
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:520}},
            h(THead,{cols:["#","Tráiler","Modelo","Operador","Cargas","Litros","Gasto Total","$/L","Participación"]}),
            h('tbody',null,
              [...trailerFuel].sort((a,b)=>b.cost-a.cost).map((t,i)=>{
                const pct=totalC>0?Math.round((t.cost/totalC)*100):0;
                return h('tr',{key:t.unit.id,className:"row-hover",
                  style:{borderBottom:i<trailerFuel.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.textLight}},`#${i+1}`),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{width:10,height:10,borderRadius:"50%",background:t.color,flexShrink:0}}),
                      h('span',{style:{fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},t.unit.plates)
                    )
                  ),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},t.unit.model),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},
                    t.drv?t.drv.name.split(" ").slice(0,2).join(" "):"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:600,color:C.info,textAlign:"center"}},t.count),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.text}},
                    t.liters>0?`${fmt(t.liters)} L`:"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:800,color:C.warning}},
                    t.cost>0?fmtM(t.cost):"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},
                    t.ppl>0?`$${t.ppl.toFixed(2)}`:"—"),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{flex:1,height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                        h('div',{style:{height:"100%",width:`${pct}%`,
                          background:`linear-gradient(90deg,${t.color},${t.color}99)`,borderRadius:3}})
                      ),
                      h('span',{style:{fontSize:11.5,fontWeight:700,color:t.color,flexShrink:0}},`${pct}%`)
                    )
                  )
                );
              })
            )
          )
        )
      )

    // ── TABLE VIEW ───────────────────────────────────────────────────────
    fuelView==="table"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},

              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.plates),
                h('div',{style:{fontSize:12,color:C.textMid}},u.model)
              ),
              h(Badge,{status:u.status})
            ),
            h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              [["Litros",`${fmt(tL)} L`,C.primary],["Costo",fmtM(tC),C.warning],
               ["Cargas",recs.length,C.info],["$/L",`$${tC&&tL?(tC/tL).toFixed(2):"—"}`,C.textMid]
              ].map(([l,v,col])=>
                h('div',{key:l,style:{background:C.surfaceAlt,borderRadius:6,padding:"7px 9px"}},
                  h('div',{style:{fontSize:10.5,color:C.textLight,marginBottom:2}},l),
                  h('div',{style:{fontSize:13,fontWeight:700,color:col}},v)
                )
              )
            )
          );
        })
      ),
      h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}},
        h('div',{style:{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Registro de Cargas"),
          h('span',{style:{fontSize:12.5,color:C.textMid}},fuel.length," registros")
        ),
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:680}},
            h(THead,{cols:["ID","Unidad","Operador","Fecha","Mes","Litros","Costo","$/L","Estación"]}),
            h('tbody',null,fuel.map((f,i)=>{
              const u=units.find(u=>u.id===f.unit);
              const d=drivers.find(d=>d.id===f.driver);
              return h('tr',{key:f.id,className:"row-hover",
                style:{borderBottom:i<fuel.length-1?`1px solid ${C.borderLt}`:"none"}},
                h('td',{style:{padding:"9px 14px",fontSize:12,fontFamily:"IBM Plex Mono,monospace",color:C.textLight}},f.id),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u?.plates||f.unit),
                h('td',{style:{padding:"9px 14px",fontSize:13,color:C.text}},d?d.name.split(" ").slice(0,2).join(" "):"—"),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},f.date),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid,fontFamily:"IBM Plex Mono,monospace"}},f.month||"—"),
                h('td',{style:{padding:"9px 14px",fontSize:13,fontWeight:600,color:C.text}},fmt(f.liters)," L"),
                h('td',{style:{padding:"9px 14px",fontSize:13,fontWeight:600,color:C.text}},fmtM(f.cost)),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},"$",(f.cost/f.liters).toFixed(2)),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},f.location)
              );
            }))
          )
        )
      )
    ),

    modal&&h(Modal,{title:"Registrar Carga de Combustible",onClose:()=>setModal(false)},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Unidad (Tracto)",value:form.unit,onChange:v=>upd("unit",v),half:true,required:true,
          opts:[{v:"",l:"Seleccionar"},...units.map(u=>({v:u.id,l:`${u.plates} — ${u.model}`}))]}),
        h(Field,{label:"Operador",value:form.driver,onChange:v=>upd("driver",v),half:true,
          opts:[{v:"",l:"Seleccionar"},...drivers.map(d=>({v:d.id,l:d.name}))]}),
        h(Field,{label:"Fecha",value:form.date,onChange:v=>upd("date",v),type:"date",half:true}),
        h(Field,{label:"Mes de operación",value:form.month,onChange:v=>upd("month",v),half:true,
          opts:["2025-01","2025-02","2025-03","2025-04","2025-05","2025-06"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Litros cargados",value:form.liters,onChange:v=>upd("liters",v),type:"number",half:true}),
        h(Field,{label:"Costo total (MXN)",value:form.cost,onChange:v=>upd("cost",v),type:"number",half:true}),
        h(Field,{label:"Estación de servicio",value:form.location,onChange:v=>upd("location",v)})
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
        h('button',{onClick:()=>setModal(false),className:"btn-s",style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},"Guardar")
      )
    )
  );
}

// ── MAINT ────────────────────────────────────────────────────────────────────
function Maint({maint,setMaint,units}){
  const {isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [view,setView]=useState("cards"); // cards | charts
  const ef={unit:"",type:"Preventivo",category:"Aceite",date:"",cost:"",description:"",status:"programado"};
  const [form,setForm]=useState(ef);
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  function save(){
    if(!form.unit||!form.description)return;
    setMaint([...maint,{...form,id:`M${String(maint.length+1).padStart(3,"0")}`,cost:+form.cost}]);
    setModal(false);setForm(ef);
  }
  const chg=(id,st)=>setMaint(maint.map(m=>m.id===id?{...m,status:st}:m));
  const CC={Frenos:C.danger,Aceite:C.warning,Llantas:C.primary,Motor:C.purple,Eléctrico:C.info,Suspensión:C.textMid};
  const CI={Frenos:"🛑",Aceite:"🛢️",Llantas:"⭕",Motor:"⚙️",Eléctrico:"⚡",Suspensión:"🔧"};
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple];

  // ── Chart data ────────────────────────────────────────────────────────────
  const totalCost=maint.reduce((a,b)=>a+(b.cost||0),0);

  // Cost per unit
  const costByUnit=units.map((u,i)=>{
    const recs=maint.filter(m=>m.unit===u.id);
    return {
      label:u.plates,
      model:u.model,
      value:recs.reduce((a,b)=>a+(b.cost||0),0),
      count:recs.length,
      color:UNIT_COLORS[i%UNIT_COLORS.length],
      preventivo:recs.filter(m=>m.type==="Preventivo").reduce((a,b)=>a+(b.cost||0),0),
      correctivo:recs.filter(m=>m.type==="Correctivo").reduce((a,b)=>a+(b.cost||0),0),
    };
  }).sort((a,b)=>b.value-a.value);

  // Cost by category
  const cats=["Aceite","Frenos","Llantas","Motor","Eléctrico","Suspensión"];
  const costByCat=cats.map(cat=>({
    label:cat,
    value:maint.filter(m=>m.category===cat).reduce((a,b)=>a+(b.cost||0),0),
    color:CC[cat]||C.textMid,
  })).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);

  // Preventivo vs Correctivo per unit
  const prevVsCorr=units.map((u,i)=>({
    label:u.plates,
    value:maint.filter(m=>m.unit===u.id&&m.type==="Preventivo").reduce((a,b)=>a+(b.cost||0),0),
    value2:maint.filter(m=>m.unit===u.id&&m.type==="Correctivo").reduce((a,b)=>a+(b.cost||0),0),
  }));

  // Donut: cost distribution by unit
  const unitDonut=costByUnit.filter(u=>u.value>0).map(u=>({label:u.label,value:u.value,color:u.color}));

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Top bar ─────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
        [["💰 Total",fmtM(totalCost),C.text],
         ["📋 Programados",maint.filter(m=>m.status==="programado").length,C.purple],
         ["⚙️ En Proceso",maint.filter(m=>m.status==="en proceso").length,C.warning],
         ["✅ Completados",maint.filter(m=>m.status==="completado").length,C.success]
        ].map(([l,v,col])=>
          h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 14px"}},
            h('div',{style:{fontSize:11,color:C.textLight,textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}},l),
            h('div',{style:{fontSize:17,fontWeight:700,color:col}},v)
          )
        )
      ),
      h('div',{style:{display:"flex",gap:8}},
        [{v:"cards",l:"🗂️ Servicios"},{v:"charts",l:"📊 Gráficas"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setView(v),
            style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:7,cursor:"pointer",
              border:`1px solid ${view===v?C.primary:C.border}`,
              background:view===v?C.primaryLt:C.surface,
              color:view===v?C.primary:C.textMid}},l)
        ),
        h('button',{onClick:()=>setModal(true),className:"btn-p",
          style:{padding:"8px 14px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
          h(Ic,{n:"plus",s:13,c:"#fff"}),"Registrar Servicio"
        )
      )
    ),

    // ── CHARTS VIEW ──────────────────────────────────────────────────────────
    view==="charts"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},

      // Row 1: bar por tracto + donut
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},
        h(ChartPanel,{title:"Costo de Mantenimiento por Tráiler",sub:"Gasto total acumulado MXN",
          legend:[{label:"Costo MXN",color:C.purple}]},
          h(BarChart,{data:costByUnit,color:C.purple,height:200,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Distribución por Tráiler",sub:"Participación en gasto total"},
          h('div',{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}},
            h(DonutChart,{data:unitDonut,size:100}),
            h('div',{style:{flex:1,display:"flex",flexDirection:"column",gap:7}},
              unitDonut.map(d=>{
                const pct=totalCost>0?Math.round((d.value/totalCost)*100):0;
                return h('div',{key:d.label,style:{display:"flex",alignItems:"center",gap:7}},
                  h('div',{style:{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}),
                  h('div',{style:{flex:1,fontSize:12,color:C.textMid,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}},d.label),
                  h('div',{style:{fontSize:11.5,fontWeight:700,color:C.text}},`${pct}%`)
                );
              })
            )
          )
        )
      ),

      // Row 2: preventivo vs correctivo + por categoría
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
        h(ChartPanel,{title:"Preventivo vs Correctivo por Tráiler",sub:"Desglose por tipo de servicio",
          legend:[{label:"Preventivo",color:C.success},{label:"Correctivo",color:C.danger}]},
          h(BarChart,{data:prevVsCorr,color:C.success,color2:C.danger,height:180,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Costo por Categoría",sub:"Todas las unidades"},
          h('div',{style:{display:"flex",flexDirection:"column",gap:8,paddingTop:4}},
            costByCat.length===0
              ?h('div',{style:{fontSize:13,color:C.textLight,textAlign:"center",padding:"16px 0"}},"Sin datos")
              :costByCat.map((cat,i)=>{
                const maxV=costByCat[0]?.value||1;
                return h('div',{key:cat.label},
                  h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}},
                    h('span',{style:{display:"flex",alignItems:"center",gap:5,color:C.textMid}},
                      CI[cat.label]||"🔧"," ",cat.label),
                    h('span',{style:{fontWeight:700,color:C.text}},fmtM(cat.value))
                  ),
                  h('div',{style:{height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                    h('div',{style:{height:"100%",width:`${(cat.value/maxV)*100}%`,
                      background:cat.color,borderRadius:3}})
                  )
                );
              })
          )
        )
      ),

      // Row 3: ranking table
      h(ChartPanel,{title:"Ranking de Costo por Tráiler",sub:"Detalle completo de inversión en mantenimiento"},
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:560}},
            h(THead,{cols:["#","Tráiler","Modelo","Servicios","Preventivo","Correctivo","Total","% del gasto"]}),
            h('tbody',null,
              costByUnit.map((u,i)=>{
                const pct=totalCost>0?Math.round((u.value/totalCost)*100):0;
                return h('tr',{key:u.label,className:"row-hover",
                  style:{borderBottom:i<costByUnit.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.textLight}},`#${i+1}`),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{width:10,height:10,borderRadius:"50%",background:u.color,flexShrink:0}}),
                      h('span',{style:{fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.label)
                    )
                  ),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},u.model),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:600,color:C.info,textAlign:"center"}},u.count),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.success,fontWeight:600}},fmtM(u.preventivo)),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.danger,fontWeight:600}},fmtM(u.correctivo)),
                  h('td',{style:{padding:"10px 14px",fontSize:14,fontWeight:800,color:C.purple}},fmtM(u.value)),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{flex:1,height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                        h('div',{style:{height:"100%",width:`${pct}%`,
                          background:`linear-gradient(90deg,${u.color},${u.color}99)`,borderRadius:3}})
                      ),
                      h('span',{style:{fontSize:11.5,fontWeight:700,color:u.color,flexShrink:0}},`${pct}%`)
                    )
                  )
                );
              })
            )
          )
        )
      )
    ),

    // ── CARDS VIEW ───────────────────────────────────────────────────────────
    view==="cards"&&h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}},
      maint.map(m=>{
        const unit=units.find(u=>u.id===m.unit);
        const cc=CC[m.category]||C.textMid;
        return h('div',{key:m.id,className:"card",style:{background:C.surface,border:`1px solid ${C.border}`,
          borderLeft:`3px solid ${cc}`,borderRadius:8,padding:"14px 16px"}},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h('div',{style:{display:"flex",gap:9,alignItems:"center"}},
              h('span',{style:{fontSize:20}},CI[m.category]||"🔧"),
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text}},m.category),
                h('div',{style:{fontSize:12,color:C.textMid}},unit?.plates||m.unit," · ",m.type)
              )
            ),
            h(Badge,{status:m.status})
          ),
          h('p',{style:{fontSize:12.5,color:C.textMid,lineHeight:1.5,marginBottom:10}},m.description),
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h('div',null,
              h('div',{style:{fontSize:11,color:C.textLight}},"Fecha · Costo"),
              h('div',{style:{fontSize:12.5,fontWeight:700,color:C.text}},m.date," · ",fmtM(m.cost))
            ),
            h('div',{style:{display:"flex",gap:6}},
              m.status==="programado"&&h('button',{onClick:()=>chg(m.id,"en proceso"),
                style:{background:C.warningBg,color:C.warning,border:`1px solid ${C.warningBd}`,
                  borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}},"Iniciar"),
              m.status==="en proceso"&&h('button',{onClick:()=>chg(m.id,"completado"),
                style:{background:C.successBg,color:C.success,border:`1px solid ${C.successBd}`,
                  borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}},"Completar")
            )
          )
        );
      })
    ),

    modal&&h(Modal,{title:"Registrar Servicio de Mantenimiento",onClose:()=>setModal(false)},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Unidad",value:form.unit,onChange:v=>upd("unit",v),half:true,required:true,
          opts:[{v:"",l:"Seleccionar"},...units.map(u=>({v:u.id,l:`${u.plates} — ${u.model}`}))]}),
        h(Field,{label:"Tipo",value:form.type,onChange:v=>upd("type",v),half:true,
          opts:["Preventivo","Correctivo"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Categoría",value:form.category,onChange:v=>upd("category",v),half:true,
          opts:["Aceite","Frenos","Llantas","Motor","Eléctrico","Suspensión"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Fecha",value:form.date,onChange:v=>upd("date",v),type:"date",half:true}),
        h(Field,{label:"Costo (MXN)",value:form.cost,onChange:v=>upd("cost",v),type:"number",half:true}),
        h(Field,{label:"Estado",value:form.status,onChange:v=>upd("status",v),half:true,
          opts:["programado","en proceso","completado"].map(x=>({v:x,l:ST[x]?.label||x}))}),
        h(Field,{label:"Descripción",value:form.description,onChange:v=>upd("description",v),required:true})
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
        h('button',{onClick:()=>setModal(false),className:"btn-s",
          style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},"Guardar")
      )
    )
  );
}

// ── Simulated live telemetry data ────────────────────────────────────────────
function useSimTelemetry(units){
  const [data,setData]=useState(()=>units.map(u=>({
    unitId:u.id,plates:u.plates,model:u.model,
    lat:20.6+Math.random()*4, lng:-103.3+Math.random()*4,
    speed:u.status==="en ruta"?Math.floor(60+Math.random()*40):0,
    rpm:u.status==="en ruta"?Math.floor(1400+Math.random()*600):u.status==="mantenimiento"?0:800,
    engineTemp:u.status==="mantenimiento"?98:Math.floor(82+Math.random()*12),
    oilPressure:Math.floor(45+Math.random()*20),
    fuelLevel:Math.floor(30+Math.random()*60),
    fuelLiters:Math.floor((30+Math.random()*60)*3.2),
    fuelCapacity:320,
    engineOn:u.status!=="disponible",
    odometer:u.km+Math.floor(Math.random()*50),
    engineHours:Math.floor(u.km/65),
    lastUpdate:new Date().toLocaleTimeString("es-MX"),
    alerts:[],
    histSpeed:[...Array(20)].map((_,i)=>u.status==="en ruta"?Math.floor(55+Math.random()*50):Math.floor(Math.random()*10)),
    histFuel:[...Array(20)].map((_,i)=>Math.floor(30+Math.random()*60)),
    histRpm:[...Array(20)].map((_,i)=>u.status==="en ruta"?Math.floor(1300+Math.random()*700):Math.floor(700+Math.random()*200)),
    route:[
      [20.66,-103.35],[20.68,-103.25],[20.72,-103.10],[20.76,-102.95],
      [20.82,-102.75],[20.90,-102.50],[21.10,-102.20],[21.30,-101.90],
    ],
    routeIdx:Math.floor(Math.random()*6),
    status:u.status,
  })));

  useEffect(()=>{
    const iv=setInterval(()=>{
      setData(prev=>prev.map(d=>{
        if(!d.engineOn) return {...d,lastUpdate:new Date().toLocaleTimeString("es-MX")};
        const newSpeed=d.status==="en ruta"?Math.max(0,Math.min(110,d.speed+(Math.random()-0.48)*8)):0;
        const newRpm=d.status==="en ruta"?Math.max(800,Math.min(2400,d.rpm+(Math.random()-0.48)*80)):820;
        const newTemp=Math.max(75,Math.min(105,d.engineTemp+(Math.random()-0.48)*0.8));
        const newFuel=Math.max(5,d.fuelLevel-(d.status==="en ruta"?Math.random()*0.15:0.01));
        const newFuelL=Math.round(newFuel*d.fuelCapacity/100);
        const newIdx=(d.routeIdx+( d.status==="en ruta"&&Math.random()>0.7?1:0))%(d.route.length);
        const alerts=[];
        if(newTemp>100) alerts.push({t:"danger",m:"⚠ Temperatura motor alta: "+newTemp.toFixed(0)+"°C"});
        if(newFuel<15) alerts.push({t:"danger",m:"⛽ Nivel bajo de combustible: "+newFuel.toFixed(0)+"%"});
        if(newSpeed>100) alerts.push({t:"warn",m:"🚨 Exceso de velocidad: "+newSpeed.toFixed(0)+" km/h"});
        if(d.oilPressure<40) alerts.push({t:"warn",m:"🔧 Presión de aceite baja"});
        return{...d,
          speed:Math.round(newSpeed),rpm:Math.round(newRpm),
          engineTemp:+newTemp.toFixed(1),fuelLevel:+newFuel.toFixed(1),
          fuelLiters:newFuelL,routeIdx:newIdx,
          lat:d.route[newIdx][0]+( Math.random()-0.5)*0.002,
          lng:d.route[newIdx][1]+(Math.random()-0.5)*0.002,
          histSpeed:[...d.histSpeed.slice(1),Math.round(newSpeed)],
          histFuel:[...d.histFuel.slice(1),Math.round(newFuel)],
          histRpm:[...d.histRpm.slice(1),Math.round(newRpm)],
          alerts,lastUpdate:new Date().toLocaleTimeString("es-MX"),
          odometer:d.odometer+(d.status==="en ruta"?+(newSpeed/3600).toFixed(4):0),
        };
      }));
    },1800);
    return()=>clearInterval(iv);
  },[]);
  return data;
}

// Mini sparkline SVG
function Spark({data,color,height=32,width=80}){
  if(!data||data.length<2) return null;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*width).toFixed(1)},${(height-(v-min)/range*height).toFixed(1)}`).join(" ");
  const area=`M${pts.split(" ")[0]} L${pts.split(" ").slice(1).join(" L")} L${width},${height} L0,${height} Z`;
  return h('svg',{viewBox:`0 0 ${width} ${height}`,style:{width,height,display:"block"}},
    h('path',{d:area,fill:color+"22"}),
    h('polyline',{points:pts,fill:"none",stroke:color,strokeWidth:1.5,strokeLinejoin:"round"})
  );
}

// Gauge arc SVG
function Gauge({value,max,color,size=80,label,unit}){
  const pct=Math.min(value/max,1);
  const r=32,cx=40,cy=44;
  const startAngle=-210, sweepAngle=240;
  const toRad=d=>d*Math.PI/180;
  const arcX=(a,rad)=>cx+rad*Math.cos(toRad(a));
  const arcY=(a,rad)=>cy+rad*Math.sin(toRad(a));
  const endAngle=startAngle+sweepAngle*pct;
  const largeArc=sweepAngle*pct>180?1:0;
  const bgPath=`M${arcX(startAngle,r)},${arcY(startAngle,r)} A${r},${r} 0 1,1 ${arcX(startAngle+sweepAngle,r)},${arcY(startAngle+sweepAngle,r)}`;
  const fgPath=pct>0?`M${arcX(startAngle,r)},${arcY(startAngle,r)} A${r},${r} 0 ${largeArc},1 ${arcX(endAngle,r)},${arcY(endAngle,r)}`:"";
  return h('div',{style:{textAlign:"center"}},
    h('svg',{viewBox:"0 0 80 60",style:{width:size,height:size*0.75,display:"block",margin:"0 auto"}},
      h('path',{d:bgPath,fill:"none",stroke:C.borderLt,strokeWidth:6,strokeLinecap:"round"}),
      fgPath&&h('path',{d:fgPath,fill:"none",stroke:color,strokeWidth:6,strokeLinecap:"round"}),
      h('text',{x:cx,y:cy-2,textAnchor:"middle",fontSize:13,fontWeight:"700",fill:color,fontFamily:"IBM Plex Mono,monospace"},value),
      h('text',{x:cx,y:cy+10,textAnchor:"middle",fontSize:7,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},unit)
    ),
    h('div',{style:{fontSize:10.5,color:C.textLight,marginTop:-4}},label)
  );
}

}

    return{...d,drops};

// ── RENTABILIDAD POR TRÁILER ──────────────────────────────────────────────────
function Rentabilidad({units,trips,fuel,maint,drivers}){
  const {isMobile,isTablet}=useBP();
  const [period,setPeriod]=useState("all"); // all | month
  const [selMonth,setSelMonth]=useState("");
  const [editTrip,setEditTrip]=useState(null); // trip id to edit revenue/fees
  const [editForm,setEditForm]=useState({revenue:"",driverFee:"",fines:""});

  // All months available
  const allMonths=[...new Set(trips.map(t=>t.month||t.departDate?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!selMonth&&allMonths.length) setTimeout(()=>setSelMonth(allMonths[0]),0);

  // Filter trips by period
  const filteredTrips=period==="all"?trips
    :trips.filter(t=>(t.month||t.departDate?.slice(0,7))===selMonth);

  // Per-unit P&L
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple];
  const unitPL=units.map((u,i)=>{
    const uTrips=filteredTrips.filter(t=>t.unit===u.id&&t.status==="finalizado");
    const uFuel=period==="all"?fuel.filter(f=>f.unit===u.id)
      :fuel.filter(f=>f.unit===u.id&&(f.month||"")===selMonth);
    const uMaint=maint.filter(m=>m.unit===u.id&&m.status==="completado");

    const revenue=uTrips.reduce((a,b)=>a+(b.revenue||0),0);
    const fuelCost=uFuel.reduce((a,b)=>a+b.cost,0);
    const maintCost=period==="all"?uMaint.reduce((a,b)=>a+(b.cost||0),0)
      :uMaint.filter(m=>m.date?.slice(0,7)===selMonth).reduce((a,b)=>a+(b.cost||0),0);
    const driverFees=uTrips.reduce((a,b)=>a+(b.driverFee||0),0);
    const fines=uTrips.reduce((a,b)=>a+(b.fines||0),0);
    const totalCosts=fuelCost+maintCost+driverFees+fines;
    const profit=revenue-totalCosts;
    const margin=revenue>0?Math.round((profit/revenue)*100):0;
    const color=UNIT_COLORS[i%UNIT_COLORS.length];
    return{unit:u,revenue,fuelCost,maintCost,driverFees,fines,totalCosts,profit,margin,
      trips:uTrips.length,color,
      roi:totalCosts>0?Math.round((profit/totalCosts)*100):0};
  });

  const totals={
    revenue:unitPL.reduce((a,b)=>a+b.revenue,0),
    fuelCost:unitPL.reduce((a,b)=>a+b.fuelCost,0),
    maintCost:unitPL.reduce((a,b)=>a+b.maintCost,0),
    driverFees:unitPL.reduce((a,b)=>a+b.driverFees,0),
    fines:unitPL.reduce((a,b)=>a+b.fines,0),
    totalCosts:unitPL.reduce((a,b)=>a+b.totalCosts,0),
    profit:unitPL.reduce((a,b)=>a+b.profit,0),
  };
  const totalMargin=totals.revenue>0?Math.round((totals.profit/totals.revenue)*100):0;

  // Chart data
  const plBarData=unitPL.map(u=>({label:u.unit.plates,value:u.revenue,value2:u.totalCosts}));
  const profitBar=unitPL.map(u=>({label:u.unit.plates,value:Math.max(u.profit,0),
    color:u.profit>=0?C.success:C.danger}));
  const costBreakBar=unitPL.map(u=>({label:u.unit.plates,value:u.fuelCost,value2:u.maintCost}));

  // Trip list for selected unit
  const [selUnit,setSelUnit]=useState(null);
  const selUnitTrips=selUnit
    ?filteredTrips.filter(t=>t.unit===selUnit&&t.status==="finalizado")
    :[];

  function saveEditTrip(){
    // update trip in parent via local ref — need setTrips but we don't have it here
    // We'll mark it visually; in real app this would call setTrips
    setEditTrip(null);
  }

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Header ────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}},
      h('div',null,
        h('div',{style:{fontSize:16,fontWeight:800,color:C.text,letterSpacing:"-.01em"}},"💹 Rentabilidad por Tráiler"),
        h('div',{style:{fontSize:12.5,color:C.textLight,marginTop:2}},
          "Ingresos, costos reales y ganancia neta por unidad")
      ),
      h('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        [{v:"all",l:"Todo el período"},{v:"month",l:"Por mes"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setPeriod(v),
            style:{padding:"7px 14px",fontSize:12.5,fontWeight:600,borderRadius:7,cursor:"pointer",

// ── CIERRE DE MES ────────────────────────────────────────────────────────────
function Cierre({trips,fuel,units,drivers}){
  const {isMobile,isTablet}=useBP();
  const MONTHS=useMemo(()=>{
    const ms=new Set();
    trips.forEach(t=>t.departDate&&ms.add(t.departDate.slice(0,7)));
    fuel.forEach(f=>f.month&&ms.add(f.month));
    return [...ms].sort().reverse();
  },[trips,fuel]);
  const [sel,setSel]=useState(MONTHS[0]||"2025-01");
  const [tab,setTab]=useState("resumen");
  const [closed,setClosed]=useState([]);
  const mLbl=m=>{const[y,mo]=m.split("-");return`${MONTHS_ES[+mo-1]} ${y}`;};
  const mTrips=trips.filter(t=>t.departDate?.slice(0,7)===sel);
  const mFuel=fuel.filter(f=>f.month===sel);
  const isClosed=closed.includes(sel);

  const uSum=units.map(u=>{
    const uT=mTrips.filter(t=>t.unit===u.id);
    const uF=mFuel.filter(f=>f.unit===u.id);
    return{unit:u,driver:drivers.find(d=>d.assignedUnit===u.id),
      tripCount:uT.filter(t=>t.status==="finalizado").length,
      km:uT.reduce((a,b)=>a+(b.km||0),0),
      fuelL:uF.reduce((a,b)=>a+b.liters,0),
      fuelCost:uF.reduce((a,b)=>a+b.cost,0),
      fuelCnt:uF.length
    };
  }).filter(s=>s.tripCount>0||s.fuelL>0);

  const tot={
    trips:mTrips.filter(t=>t.status==="finalizado").length,
    km:uSum.reduce((a,b)=>a+b.km,0),
    fuelL:uSum.reduce((a,b)=>a+b.fuelL,0),
    fuelCost:uSum.reduce((a,b)=>a+b.fuelCost,0),
    clients:new Set(mTrips.map(t=>t.client)).size,
  };

  return h('div',{style:{animation:"fadeUp .25s ease"}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,gap:12,flexWrap:"wrap"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:12}},
        h('div',{style:{width:40,height:40,background:isClosed?C.successBg:C.primaryLt,border:`1px solid ${isClosed?C.successBd:"#93BFFC"}`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},isClosed?"✅":"📅"),
        h('div',null,
          h('div',{style:{fontSize:17,fontWeight:700,color:C.text}},"Cierre Mensual"),
          h('div',{style:{fontSize:13,color:C.textMid}},"Resumen por tracto: viajes y combustible")
        ),
        isClosed&&h('span',{style:{background:C.successBg,border:`1px solid ${C.successBd}`,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,color:C.success}},"✔ Mes cerrado")
      ),
      h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
        h('select',{value:sel,onChange:e=>setSel(e.target.value),className:"inp",style:{width:"auto",appearance:"none",fontWeight:600,fontSize:14,paddingRight:24}},
          MONTHS.map(m=>h('option',{key:m,value:m},mLbl(m)))
        ),
        !isClosed&&h('button',{onClick:()=>setClosed([...closed,sel]),className:"btn-p",style:{padding:"9px 16px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
          h(Ic,{n:"check",s:13,c:"#fff"}),"Cerrar Mes"
        )
      )
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"repeat(3,1fr)":"repeat(5,1fr)",gap:12,marginBottom:18}},
      h(KpiCard,{label:"Viajes",value:tot.trips,sub:"finalizados",icon:"🗺️",accent:C.primary}),
      h(KpiCard,{label:"Kilómetros",value:`${fmt(tot.km)} km`,sub:"recorridos",icon:"🚛",accent:C.info}),
      h(KpiCard,{label:"Litros",value:`${fmt(tot.fuelL)} L`,sub:"cargados",icon:"⛽",accent:C.warning}),
      h(KpiCard,{label:"Gasto Comb.",value:fmtM(tot.fuelCost),sub:"total del mes",icon:"💰",accent:C.danger}),
      h(KpiCard,{label:"Clientes",value:tot.clients,sub:"atendidos",icon:"👥",accent:C.success})
    ),
    h('div',{className:"tabscroll",style:{borderBottom:`1px solid ${C.border}`,marginBottom:18}},
      [{v:"resumen",l:"Resumen por Tracto"},{v:"viajes",l:"Viajes del Mes"},{v:"combustible",l:"Combustible"}].map(t=>
        h('button',{key:t.v,onClick:()=>setTab(t.v),className:`tab${tab===t.v?" on":""}` },t.l)
      )
    ),
    tab==="resumen"&&h('div',null,
      h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",marginBottom:16}},
        h('div',{style:{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt,display:"flex",justifyContent:"space-between"}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Resumen Operativo — ",mLbl(sel)),
          isClosed&&h('span',{style:{fontSize:12,color:C.success,fontWeight:600}},"✔ Cierre registrado")
        ),
        uSum.length===0
          ?h('div',{style:{textAlign:"center",padding:"40px 0",color:C.textLight,fontSize:13}},"Sin registros para ",mLbl(sel))
          :h('div',{className:"tscroll"},
            h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:780}},
              h(THead,{cols:["Tracto","Modelo","Operador","Viajes","Km","Cargas","Litros","Gasto","$/L","Rend."]}),
              h('tbody',null,uSum.map((s,i)=>{
                const rend=s.fuelL>0&&s.km>0?(s.km/s.fuelL).toFixed(2):"—";
                const ppl=s.fuelL>0&&s.fuelCost>0?(s.fuelCost/s.fuelL).toFixed(2):"—";
                return h('tr',{key:s.unit.id,className:"row-hover",style:{borderBottom:i<uSum.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},s.unit.plates),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},s.unit.model),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.text}},s.driver?s.driver.name.split(" ").slice(0,2).join(" "):"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.primary,textAlign:"center"}},s.tripCount),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.text}},fmt(s.km)," km"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.info,textAlign:"center"}},s.fuelCnt),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.text}},fmt(s.fuelL)," L"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.danger}},fmtM(s.fuelCost)),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},ppl!=="—"?`$${ppl}`:"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:600,color:rend!=="—"&&+rend<3.8?C.danger:C.success}},rend!=="—"?`${rend} km/L`:"—")
                );
              })),
              h('tfoot',null,h('tr',{style:{background:C.surfaceAlt,borderTop:`2px solid ${C.border}`}},
                h('td',{colSpan:3,style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.text}},"TOTALES"),
                h('td',{style:{padding:"10px 14px",fontSize:14,fontWeight:800,color:C.primary,textAlign:"center"}},tot.trips),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:700,fontFamily:"IBM Plex Mono,monospace"}},fmt(tot.km)," km"),
                h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.info,textAlign:"center"}},uSum.reduce((a,b)=>a+b.fuelCnt,0)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:700,fontFamily:"IBM Plex Mono,monospace"}},fmt(tot.fuelL)," L"),
                h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:800,color:C.danger}},fmtM(tot.fuelCost)),

          active==="fuel"&&h(Fuel,{fuel,setFuel,units,drivers}),
          active==="maint"&&h(Maint,{maint,setMaint,units}),
          active==="rentabilidad"&&h(Rentabilidad,{units,trips,fuel,maint,drivers}),
          active==="cierre"&&h(Cierre,{trips,fuel,units,drivers}),
          active==="gps"&&h(ModGPS,{units,drivers,trips}),
          active==="motor"&&h(ModMotor,{units,drivers}),
          active==="fuelSensor"&&h(ModFuelSensor,{units,drivers,fuel}),
          active==="map"&&h(MapRoutes,{trips,units,drivers}),
          active==="users"&&h(Users,{company})
        )
      ),
      h('footer',{style:{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"7px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
        h('span',{style:{fontSize:11,color:C.textLight}},"© 2025 FleetOS Fleet Management OS"),
        h('span',{style:{fontSize:11,color:C.textLight}},"v3.1.0 · FleetOS")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
}
</script>
</body>
</html>
