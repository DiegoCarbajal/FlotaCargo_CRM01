  const {isMobile,isTablet}=useBP();
  const [period,setPeriod]=useState("all"); // all | month
  const [selMonth,setSelMonth]=useState("");
  const [editTrip,setEditTrip]=useState(null); // trip id to edit revenue/fees
  const [editForm,setEditForm]=useState({revenue:"",driverFee:"",fines:""});

  // All months available
  const allMonths=[...new Set(trips.map(t=>t.month||t.departDate?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!selMonth&&allMonths.length) setTimeout(()=>setSelMonth(allMonths[0]),0);

  // Filter trips by period
  const filteredTrips=period==="all"?trips
    :trips.filter(t=>(t.month||t.departDate?.slice(0,7))===selMonth);

  // Per-unit P&L
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple];
  const unitPL=units.map((u,i)=>{
    const uTrips=filteredTrips.filter(t=>t.unit===u.id&&t.status==="finalizado");
    const uFuel=period==="all"?fuel.filter(f=>f.unit===u.id)
      :fuel.filter(f=>f.unit===u.id&&(f.month||"")===selMonth);
    const uMaint=maint.filter(m=>m.unit===u.id&&m.status==="completado");

    const revenue=uTrips.reduce((a,b)=>a+(b.revenue||0),0);
    const fuelCost=uFuel.reduce((a,b)=>a+b.cost,0);
    const maintCost=period==="all"?uMaint.reduce((a,b)=>a+(b.cost||0),0)
      :uMaint.filter(m=>m.date?.slice(0,7)===selMonth).reduce((a,b)=>a+(b.cost||0),0);
    const driverFees=uTrips.reduce((a,b)=>a+(b.driverFee||0),0);
    const fines=uTrips.reduce((a,b)=>a+(b.fines||0),0);
    const totalCosts=fuelCost+maintCost+driverFees+fines;
    const profit=revenue-totalCosts;
    const margin=revenue>0?Math.round((profit/revenue)*100):0;
    const color=UNIT_COLORS[i%UNIT_COLORS.length];
    return{unit:u,revenue,fuelCost,maintCost,driverFees,fines,totalCosts,profit,margin,
      trips:uTrips.length,color,
      roi:totalCosts>0?Math.round((profit/totalCosts)*100):0};
  });

  const totals={
    revenue:unitPL.reduce((a,b)=>a+b.revenue,0),
    fuelCost:unitPL.reduce((a,b)=>a+b.fuelCost,0),
    maintCost:unitPL.reduce((a,b)=>a+b.maintCost,0),
    driverFees:unitPL.reduce((a,b)=>a+b.driverFees,0),
    fines:unitPL.reduce((a,b)=>a+b.fines,0),
    totalCosts:unitPL.reduce((a,b)=>a+b.totalCosts,0),
    profit:unitPL.reduce((a,b)=>a+b.profit,0),
  };
  const totalMargin=totals.revenue>0?Math.round((totals.profit/totals.revenue)*100):0;

  // Chart data
  const plBarData=unitPL.map(u=>({label:u.unit.plates,value:u.revenue,value2:u.totalCosts}));
  const profitBar=unitPL.map(u=>({label:u.unit.plates,value:Math.max(u.profit,0),
    color:u.profit>=0?C.success:C.danger}));
  const costBreakBar=unitPL.map(u=>({label:u.unit.plates,value:u.fuelCost,value2:u.maintCost}));

  // Trip list for selected unit
  const [selUnit,setSelUnit]=useState(null);
  const selUnitTrips=selUnit
    ?filteredTrips.filter(t=>t.unit===selUnit&&t.status==="finalizado")
    :[];

  function saveEditTrip(){
    // update trip in parent via local ref — need setTrips but we don't have it here
    // We'll mark it visually; in real app this would call setTrips
    setEditTrip(null);
  }

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Header ────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}},
      h('div',null,
        h('div',{style:{fontSize:16,fontWeight:800,color:C.text,letterSpacing:"-.01em"}},"💹 Rentabilidad por Tráiler"),
        h('div',{style:{fontSize:12.5,color:C.textLight,marginTop:2}},
          "Ingresos, costos reales y ganancia neta por unidad")
      ),
      h('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        [{v:"all",l:"Todo el período"},{v:"month",l:"Por mes"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setPeriod(v),
            style:{padding:"7px 14px",fontSize:12.5,fontWeight:600,borderRadius:7,cursor:"pointer",
              border:`1px solid ${period===v?C.primary:C.border}`,
              background:period===v?C.primaryLt:C.surface,
              color:period===v?C.primary:C.textMid}},l)
        ),
        period==="month"&&h('select',{value:selMonth,onChange:e=>setSelMonth(e.target.value),
          className:"inp",style:{padding:"6px 10px",fontSize:12.5,width:"auto",minWidth:120}},
          allMonths.map(m=>{
            const[y,mo]=m.split("-");
            const MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            return h('option',{key:m,value:m},MN[+mo-1]+" "+y);
          })
        )
      )
    ),

    // ── Global KPIs ───────────────────────────────────────────────────────
    h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:12}},
      [
        {l:"💰 Ingresos Totales",v:fmtM(totals.revenue),c:C.success,
          sub:`${filteredTrips.filter(t=>t.status==="finalizado").length} viajes finalizados`},
        {l:"📊 Costos Totales",v:fmtM(totals.totalCosts),c:C.danger,
          sub:`Comb+Mant+Oper+Multas`},
        {l:"💵 Ganancia Neta",v:fmtM(totals.profit),
          c:totals.profit>=0?C.success:C.danger,
          sub:`Margen: ${totalMargin}%`},
        {l:"📈 ROI Flota",v:`${totals.totalCosts>0?Math.round((totals.profit/totals.totalCosts)*100):0}%`,
          c:totals.profit>=0?C.primary:C.danger,
          sub:"Retorno sobre inversión"},
      ].map(({l,v,c,sub})=>
        h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}},
          h('div',{style:{fontSize:11,color:C.textLight,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}},l),
          h('div',{style:{fontSize:22,fontWeight:800,color:c,letterSpacing:"-.02em",marginBottom:3}},v),
          h('div',{style:{fontSize:11.5,color:C.textLight}},sub)
        )
      )
    ),

    // ── Cost breakdown pills ──────────────────────────────────────────────
    h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px"}},
      h('div',{style:{fontSize:12.5,fontWeight:700,color:C.text,marginBottom:12}},"Desglose de Costos — Flota Completa"),
      h('div',{style:{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}},
        [
          {l:"⛽ Combustible",v:totals.fuelCost,c:C.warning,pct:totals.totalCosts?Math.round(totals.fuelCost/totals.totalCosts*100):0},
          {l:"🔧 Mantenimiento",v:totals.maintCost,c:C.purple,pct:totals.totalCosts?Math.round(totals.maintCost/totals.totalCosts*100):0},
          {l:"👤 Operadores",v:totals.driverFees,c:C.primary,pct:totals.totalCosts?Math.round(totals.driverFees/totals.totalCosts*100):0},
          {l:"🚨 Multas",v:totals.fines,c:C.danger,pct:totals.totalCosts?Math.round(totals.fines/totals.totalCosts*100):0},
        ].map(({l,v,c,pct})=>
          h('div',{key:l,style:{background:C.surfaceAlt,border:`1px solid ${C.border}`,
            borderRadius:7,padding:"10px 14px",flex:"1 1 140px",minWidth:130}},
            h('div',{style:{fontSize:11.5,color:C.textLight,marginBottom:3}},l),
            h('div',{style:{fontSize:16,fontWeight:700,color:c}},fmtM(v)),
            h('div',{style:{height:3,background:C.borderLt,borderRadius:2,overflow:"hidden",marginTop:6}},
              h('div',{style:{height:"100%",width:`${pct}%`,background:c,borderRadius:2}})
            ),
            h('div',{style:{fontSize:10.5,color:C.textLight,marginTop:3}},`${pct}% del costo`)
          )
        )
      )
    ),

    // ── Charts row ────────────────────────────────────────────────────────
    h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
      h(ChartPanel,{title:"Ingresos vs Costos por Tráiler",sub:"Comparativa directa",
        legend:[{label:"Ingresos",color:C.success},{label:"Costos",color:C.danger}]},
        h(BarChart,{data:plBarData,color:C.success,color2:C.danger,height:200,
          formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
      ),
      h(ChartPanel,{title:"Ganancia Neta por Tráiler",sub:"Verde = rentable, rojo = pérdida",
        legend:[{label:"Ganancia neta MXN",color:C.success}]},
        h(BarChart,{data:profitBar,color:C.success,height:200,
          formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
      )
    ),
    h(ChartPanel,{title:"Combustible vs Mantenimiento por Tráiler",sub:"Los dos costos más controlables",
      legend:[{label:"Combustible",color:C.warning},{label:"Mantenimiento",color:C.purple}]},
      h(BarChart,{data:costBreakBar,color:C.warning,color2:C.purple,height:160,
        formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
    ),

    // ── Per-unit cards ────────────────────────────────────────────────────
    h('div',{style:{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}},"Detalle por Unidad"),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}},
      unitPL.map(u=>
        h('div',{key:u.unit.id,
          style:{background:C.surface,border:`1.5px solid ${selUnit===u.unit.id?u.color:C.border}`,
            borderTop:`3px solid ${u.color}`,borderRadius:8,padding:"16px 18px",
            cursor:"pointer",transition:"all .15s"},
          onClick:()=>setSelUnit(selUnit===u.unit.id?null:u.unit.id)},
          // Header
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}},
            h('div',null,
              h('div',{style:{fontSize:15,fontWeight:800,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.unit.plates),
              h('div',{style:{fontSize:12,color:C.textLight}},u.unit.model," · ",u.trips," viajes")
            ),
            h('div',{style:{textAlign:"right"}},
              h('div',{style:{fontSize:11,color:C.textLight,marginBottom:2}},"Ganancia neta"),
              h('div',{style:{fontSize:20,fontWeight:800,
                color:u.profit>=0?C.success:C.danger,letterSpacing:"-.02em"}},
                fmtM(u.profit)),
              h('div',{style:{fontSize:11.5,fontWeight:600,
                color:u.margin>=0?C.success:C.danger}},
                `Margen: ${u.margin}%`)
            )
          ),
          // P&L rows
          h('div',{style:{display:"flex",flexDirection:"column",gap:0}},
            [
              {l:"💰 Ingresos",v:u.revenue,c:C.success,bold:true},
              {l:"  ⛽ Combustible",v:-u.fuelCost,c:C.warning,bold:false},
              {l:"  🔧 Mantenimiento",v:-u.maintCost,c:C.purple,bold:false},
              {l:"  👤 Pago operadores",v:-u.driverFees,c:C.primary,bold:false},
              {l:"  🚨 Multas",v:-u.fines,c:C.danger,bold:false},
              {l:"= Ganancia neta",v:u.profit,c:u.profit>=0?C.success:C.danger,bold:true},
            ].map(({l,v,c,bold},i,arr)=>
              h('div',{key:l,style:{display:"flex",justifyContent:"space-between",
                padding:"6px 0",
                borderTop:i===arr.length-1?`1px solid ${C.border}`:"none",
                borderBottom:`1px solid ${C.borderLt}`}},
                h('span',{style:{fontSize:12.5,color:C.textMid,fontWeight:bold?700:400}},l),
                h('span',{style:{fontSize:12.5,fontWeight:bold?800:600,color:c,fontFamily:"IBM Plex Mono,monospace"}},
                  `${v>=0?"+":""}${fmtM(Math.abs(v))}`)
              )
            )
          ),
          // Margin bar
          h('div',{style:{marginTop:12}},
            h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:4}},
              h('span',{style:{color:C.textLight}},"Margen de ganancia"),
              h('span',{style:{fontWeight:700,color:u.margin>=0?C.success:C.danger}},`${u.margin}%`)
            ),
            h('div',{style:{height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
              h('div',{style:{height:"100%",width:`${Math.max(0,Math.min(100,u.margin))}%`,
                background:u.margin>=20?C.success:u.margin>=10?C.warning:C.danger,
                borderRadius:3}})
            )
          ),
          // Expand: trip list
          selUnit===u.unit.id&&selUnitTrips.length>0&&h('div',{style:{
            marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}},
            h('div',{style:{fontSize:12,fontWeight:700,color:C.text,marginBottom:8}},
              "Viajes finalizados (",selUnitTrips.length,")"),
            h('div',{style:{display:"flex",flexDirection:"column",gap:6}},
              selUnitTrips.map(t=>{
                const tProfit=(t.revenue||0)-(t.fuelEst*21||0)-(t.driverFee||0)-(t.fines||0);
                return h('div',{key:t.id,style:{background:C.surfaceAlt,borderRadius:6,padding:"9px 11px",
                  border:`1px solid ${C.border}`}},
                  h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                    h('span',{style:{fontSize:12,fontWeight:700,color:C.text}},t.origin," → ",t.destination),
                    h('span',{style:{fontSize:11.5,color:C.textLight}},t.departDate)
                  ),
                  h('div',{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}},
                    [["Ingreso",fmtM(t.revenue||0),C.success],
                     ["Operador",fmtM(t.driverFee||0),C.primary],
                     ["Multas",fmtM(t.fines||0),t.fines>0?C.danger:C.textLight],
                     ["Utilidad",fmtM(tProfit),tProfit>=0?C.success:C.danger],
                    ].map(([l,v,col])=>
                      h('div',{key:l,style:{textAlign:"center"}},
                        h('div',{style:{fontSize:10,color:C.textLight}},l),
                        h('div',{style:{fontSize:12,fontWeight:700,color:col}},v)
                      )
                    )
                  )
                );
              })
            )
          ),
          selUnit===u.unit.id&&selUnitTrips.length===0&&h('div',{style:{
            marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`,
            textAlign:"center",fontSize:13,color:C.textLight,padding:"12px 0"}},"Sin viajes finalizados en este período")
        )
      )
    ),

    // ── Full P&L table ────────────────────────────────────────────────────
    h(ChartPanel,{title:"Estado de Resultados por Tráiler",sub:"Resumen completo de P&L"},
      h('div',{className:"tscroll"},
        h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:700}},
          h(THead,{cols:["Tráiler","Ingresos","Combustible","Mantenimiento","Operadores","Multas","Total Costos","Ganancia","Margen","ROI"]}),
          h('tbody',null,
            unitPL.map((u,i)=>
              h('tr',{key:u.unit.id,className:"row-hover",
                style:{borderBottom:i<unitPL.length-1?`1px solid ${C.borderLt}`:"none"}},
                h('td',{style:{padding:"10px 14px"}},
                  h('div',{style:{display:"flex",alignItems:"center",gap:7}},
                    h('div',{style:{width:10,height:10,borderRadius:"50%",background:u.color}}),
                    h('span',{style:{fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.unit.plates)
                  )
                ),
                h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.success}},fmtM(u.revenue)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.warning}},fmtM(u.fuelCost)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.purple}},fmtM(u.maintCost)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.primary}},fmtM(u.driverFees)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,color:u.fines>0?C.danger:C.textLight}},fmtM(u.fines)),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:600,color:C.text}},fmtM(u.totalCosts)),
                h('td',{style:{padding:"10px 14px",fontSize:14,fontWeight:800,color:u.profit>=0?C.success:C.danger}},
                  fmtM(u.profit)),
                h('td',{style:{padding:"10px 14px"}},
                  h('div',{style:{display:"flex",alignItems:"center",gap:6}},
                    h('div',{style:{flex:1,height:5,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                      h('div',{style:{height:"100%",width:`${Math.max(0,Math.min(100,u.margin))}%`,
                        background:u.margin>=20?C.success:u.margin>=10?C.warning:C.danger,borderRadius:3}})
                    ),
                    h('span',{style:{fontSize:11.5,fontWeight:700,flexShrink:0,
                      color:u.margin>=20?C.success:u.margin>=10?C.warning:C.danger}},
                      `${u.margin}%`)
                  )
                ),
                h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:700,
                  color:u.roi>=0?C.primary:C.danger}},`${u.roi}%`)
              )
            ),
            // Totals row
            h('tr',{style:{background:C.surfaceAlt,borderTop:`2px solid ${C.border}`}},
              h('td',{style:{padding:"11px 14px",fontSize:13,fontWeight:700,color:C.text}},"TOTALES"),
              h('td',{style:{padding:"11px 14px",fontSize:13,fontWeight:800,color:C.success}},fmtM(totals.revenue)),
              h('td',{style:{padding:"11px 14px",fontSize:12.5,fontWeight:600,color:C.warning}},fmtM(totals.fuelCost)),
              h('td',{style:{padding:"11px 14px",fontSize:12.5,fontWeight:600,color:C.purple}},fmtM(totals.maintCost)),
              h('td',{style:{padding:"11px 14px",fontSize:12.5,fontWeight:600,color:C.primary}},fmtM(totals.driverFees)),
              h('td',{style:{padding:"11px 14px",fontSize:12.5,fontWeight:600,color:totals.fines>0?C.danger:C.textLight}},fmtM(totals.fines)),
              h('td',{style:{padding:"11px 14px",fontSize:12.5,fontWeight:700,color:C.text}},fmtM(totals.totalCosts)),
              h('td',{style:{padding:"11px 14px",fontSize:15,fontWeight:800,
                color:totals.profit>=0?C.success:C.danger}},fmtM(totals.profit)),
              h('td',{style:{padding:"11px 14px",fontSize:13,fontWeight:800,
                color:totalMargin>=20?C.success:totalMargin>=10?C.warning:C.danger}},`${totalMargin}%`),
              h('td',{style:{padding:"11px 14px"}})
            )
          )
        )
      )
    )
  );
}

// ── CIERRE DE MES ────────────────────────────────────────────────────────────
function Cierre({trips,fuel,units,drivers}){
  const {isMobile,isTablet}=useBP();
  const MONTHS=useMemo(()=>{
    const ms=new Set();
    trips.forEach(t=>t.departDate&&ms.add(t.departDate.slice(0,7)));
    fuel.forEach(f=>f.month&&ms.add(f.month));
    return [...ms].sort().reverse();
  },[trips,fuel]);
  const [sel,setSel]=useState(MONTHS[0]||"2025-01");
  const [tab,setTab]=useState("resumen");
  const [closed,setClosed]=useState([]);
  const mLbl=m=>{const[y,mo]=m.split("-");return`${MONTHS_ES[+mo-1]} ${y}`;};
  const mTrips=trips.filter(t=>t.departDate?.slice(0,7)===sel);
  const mFuel=fuel.filter(f=>f.month===sel);
  const isClosed=closed.includes(sel);

  const uSum=units.map(u=>{
    const uT=mTrips.filter(t=>t.unit===u.id);
    const uF=mFuel.filter(f=>f.unit===u.id);
    return{unit:u,driver:drivers.find(d=>d.assignedUnit===u.id),
      tripCount:uT.filter(t=>t.status==="finalizado").length,
      km:uT.reduce((a,b)=>a+(b.km||0),0),
      fuelL:uF.reduce((a,b)=>a+b.liters,0),
      fuelCost:uF.reduce((a,b)=>a+b.cost,0),
      fuelCnt:uF.length
    };
  }).filter(s=>s.tripCount>0||s.fuelL>0);

  const tot={
    trips:mTrips.filter(t=>t.status==="finalizado").length,
    km:uSum.reduce((a,b)=>a+b.km,0),
    fuelL:uSum.reduce((a,b)=>a+b.fuelL,0),
    fuelCost:uSum.reduce((a,b)=>a+b.fuelCost,0),
    clients:new Set(mTrips.map(t=>t.client)).size,
  };

  return h('div',{style:{animation:"fadeUp .25s ease"}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,gap:12,flexWrap:"wrap"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:12}},
        h('div',{style:{width:40,height:40,background:isClosed?C.successBg:C.primaryLt,border:`1px solid ${isClosed?C.successBd:"#93BFFC"}`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},isClosed?"✅":"📅"),
        h('div',null,
          h('div',{style:{fontSize:17,fontWeight:700,color:C.text}},"Cierre Mensual"),
          h('div',{style:{fontSize:13,color:C.textMid}},"Resumen por tracto: viajes y combustible")
        ),
        isClosed&&h('span',{style:{background:C.successBg,border:`1px solid ${C.successBd}`,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,color:C.success}},"✔ Mes cerrado")
      ),
      h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
        h('select',{value:sel,onChange:e=>setSel(e.target.value),className:"inp",style:{width:"auto",appearance:"none",fontWeight:600,fontSize:14,paddingRight:24}},
          MONTHS.map(m=>h('option',{key:m,value:m},mLbl(m)))
        ),
        !isClosed&&h('button',{onClick:()=>setClosed([...closed,sel]),className:"btn-p",style:{padding:"9px 16px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
          h(Ic,{n:"check",s:13,c:"#fff"}),"Cerrar Mes"
        )
      )
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"repeat(3,1fr)":"repeat(5,1fr)",gap:12,marginBottom:18}},
      h(KpiCard,{label:"Viajes",value:tot.trips,sub:"finalizados",icon:"🗺️",accent:C.primary}),
      h(KpiCard,{label:"Kilómetros",value:`${fmt(tot.km)} km`,sub:"recorridos",icon:"🚛",accent:C.info}),
      h(KpiCard,{label:"Litros",value:`${fmt(tot.fuelL)} L`,sub:"cargados",icon:"⛽",accent:C.warning}),
      h(KpiCard,{label:"Gasto Comb.",value:fmtM(tot.fuelCost),sub:"total del mes",icon:"💰",accent:C.danger}),

              n.id==="dashboard"&&alerts.length>0&&h('span',{style:{background:"#DC2626",color:"#fff",fontSize:10,fontWeight:700,borderRadius:4,padding:"1px 6px"}},alerts.length)
            )
          )
        ))
      ),
      h('div',{style:{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,.07)"}},
        h('div',{style:{display:"flex",alignItems:"center",gap:8}},
          h('div',{style:{width:30,height:30,borderRadius:6,background:C.primary+"25",color:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}},user.avatar),
          h('div',{style:{flex:1,overflow:"hidden"}},
            h('div',{style:{fontSize:11.5,fontWeight:600,color:"rgba(255,255,255,.85)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},user.name),
            h('div',{style:{fontSize:9.5,color:"rgba(255,255,255,.35)"}},user.role)
          ),
          h('button',{onClick:()=>setSession(null),style:{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.3)",display:"flex",padding:4,borderRadius:5},
            onMouseEnter:e=>e.currentTarget.style.color="#EF4444",onMouseLeave:e=>e.currentTarget.style.color="rgba(255,255,255,.3)"},
            h(Ic,{n:"logout",s:14})
          )
        )
      )
    ),
    // Content
    h('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},
      h('header',{style:{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 16px 0 18px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
        h('div',{style:{display:"flex",alignItems:"center",gap:10}},
          isTablet&&h('button',{onClick:()=>setSideOpen(!sideOpen),style:{background:"none",border:"none",cursor:"pointer",color:C.textMid,display:"flex",padding:4,borderRadius:6}},
            h('svg',{width:20,height:20,fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round"},
              h('line',{x1:3,y1:6,x2:17,y2:6}),h('line',{x1:3,y1:11,x2:17,y2:11}),h('line',{x1:3,y1:16,x2:17,y2:16})
            )
          ),
          h('div',null,
            h('h1',{style:{fontSize:15,fontWeight:700,color:C.text,letterSpacing:"-.02em"}},TITLES[active]||active),
            !isMobile&&h('div',{style:{fontSize:11,color:C.textLight}},new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"}))
          )
        ),
        h('div',{style:{display:"flex",alignItems:"center",gap:8}},
          !isMobile&&h('div',{style:{display:"flex",alignItems:"center",gap:6,background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:20,padding:"4px 12px"}},
            h('div',{style:{width:6,height:6,borderRadius:"50%",background:C.success,animation:"pulse 2s infinite"}}),
            h('span',{style:{fontSize:12,color:C.textMid,fontWeight:500}},units.filter(u=>u.status==="en ruta").length," en ruta")
          ),
          alerts.length>0&&h('div',{style:{display:"flex",alignItems:"center",gap:5,background:C.dangerBg,border:`1px solid ${C.dangerBd}`,borderRadius:20,padding:"4px 11px",cursor:"pointer"},onClick:()=>nav("dashboard")},
            h(Ic,{n:"bell",s:12,c:C.danger}),
            h('span',{style:{fontSize:12,color:C.danger,fontWeight:600}},alerts.length," alertas")
          ),
          h('div',{style:{width:30,height:30,borderRadius:7,background:C.primaryLt,color:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}},user.avatar)
        )
      ),
      h('main',{style:{flex:1,overflowY:"auto",padding:isMobile?"12px 12px":"20px 24px"}},
        h('div',{style:{maxWidth:1360,margin:"0 auto"}},
          active==="dashboard"&&h(Dashboard,{units,drivers,trips,fuel,maint}),
          active==="units"&&h(Units,{units,setUnits,drivers}),
          active==="drivers"&&h(Drivers,{drivers,setDrivers,units}),
          active==="trips"&&h(Trips,{trips,setTrips,units,drivers}),
          active==="fuel"&&h(Fuel,{fuel,setFuel,units,drivers}),
          active==="maint"&&h(Maint,{maint,setMaint,units}),
          active==="rentabilidad"&&h(Rentabilidad,{units,trips,fuel,maint,drivers}),
          active==="cierre"&&h(Cierre,{trips,fuel,units,drivers}),
          active==="gps"&&h(ModGPS,{units,drivers,trips}),
          active==="motor"&&h(ModMotor,{units,drivers}),
          active==="fuelSensor"&&h(ModFuelSensor,{units,drivers,fuel}),
          active==="map"&&h(MapRoutes,{trips,units,drivers}),
          active==="users"&&h(Users,{company})
        )
      ),
      h('footer',{style:{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"7px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
        h('span',{style:{fontSize:11,color:C.textLight}},"© 2025 FleetOS Fleet Management OS"),
        h('span',{style:{fontSize:11,color:C.textLight}},"v3.1.0 · FleetOS")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
}
</script>
