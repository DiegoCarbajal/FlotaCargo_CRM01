::-webkit-scrollbar-thumb{background:#C5CDD9;border-radius:3px}
input,select,textarea,button{font-family:'IBM Plex Sans',sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-item{transition:all .15s ease;cursor:pointer}
.nav-item:hover{background:rgba(255,255,255,.08)!important;color:#fff!important}
.nav-item.active{background:#1447E6!important;color:#fff!important}
.card{transition:border-color .15s ease,box-shadow .15s ease}
.card:hover{border-color:#93BFFC!important;box-shadow:0 2px 12px rgba(20,71,230,.07)!important}

.btn-p:hover{background:#0F3CC7}
.btn-s{background:#fff;color:#3D4F6B;border:1px solid #D8DDE6;cursor:pointer;border-radius:7px;font-family:'IBM Plex Sans',sans-serif;transition:all .15s}
.btn-s:hover{background:#F5F7FA;border-color:#B0BAC8}
.row-hover:hover{background:#F7F9FC!important}
.inp{background:#fff;border:1px solid #D8DDE6;color:#0D1B2A;border-radius:6px;padding:9px 12px;font-size:13.5px;width:100%;outline:none;font-family:'IBM Plex Sans',sans-serif;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:#1447E6;box-shadow:0 0 0 3px rgba(20,71,230,.1)}
.tab{background:none;border:none;cursor:pointer;padding:8px 14px;font-size:13px;font-weight:500;color:#6B7A90;border-bottom:2px solid transparent;white-space:nowrap;font-family:'IBM Plex Sans',sans-serif;transition:all .15s}
.tab.on{color:#1447E6;border-bottom-color:#1447E6}
.tab:hover{color:#1447E6}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex}
.tabscroll::-webkit-scrollbar{display:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;animation:fadeIn .2s ease}
@media(max-width:640px){.hide-mobile{display:none!important}}

(function(){

     'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js'],
  ];
  var idx=0;
  function tryLoad(i){
    if(i>=cdns.length){
      document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:16px;background:#0D1B2A;color:#fff"><div style="font-size:32px">🚛</div><div style="font-size:18px;font-weight:700">FleetOS</div><div style="font-size:14px;color:rgba(255,255,255,.6);text-align:center;max-width:360px">No se pudo cargar la aplicación.<br>Necesita conexión a internet la primera vez que abre el archivo.<br><br>Si ya tiene internet, intente recargar (F5).</div><button onclick="location.reload()" style="margin-top:8px;padding:10px 24px;background:#1447E6;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">Recargar</button></div>';
      return;
    }
    var s1=document.createElement('script');
    s1.src=cdns[i][0];
    s1.crossOrigin='anonymous';
    s1.onerror=function(){tryLoad(i+1);};
    s1.onload=function(){
      var s2=document.createElement('script');
      s2.src=cdns[i][1];
      s2.crossOrigin='anonymous';
      s2.onerror=function(){tryLoad(i+1);};
      s2.onload=function(){ startApp(); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  }
  tryLoad(0);
})();
</script>

  );
}

function Dashboard({units,drivers,trips,fuel,maint}){
  const {isMobile,isTablet}=useBP();
  const active=units.filter(u=>u.status==="en ruta").length;
  const done=trips.filter(t=>t.status==="finalizado").length;
  const fuelCost=fuel.reduce((a,b)=>a+b.cost,0);
  const maintCost=maint.reduce((a,b)=>a+(b.cost||0),0);
  const avgEff=(units.reduce((a,b)=>a+b.fuelEff,0)/units.length).toFixed(1);
  const alerts=[
    ...units.filter(u=>days(u.docExpiry)<30).map(u=>({t:"danger",m:`Documentación de ${u.plates} vence en ${days(u.docExpiry)} días.`})),
    ...units.filter(u=>u.nextMaintKm-u.km<10000).map(u=>({t:"warn",m:`${u.plates} requiere mantenimiento en ${fmt(u.nextMaintKm-u.km)} km.`})),
    ...drivers.filter(d=>days(d.licExpiry)<60).map(d=>({t:"warn",m:`Licencia de ${d.name.split(" ").slice(0,2).join(" ")} vence en ${days(d.licExpiry)} días.`})),

    {l:"Cancelado",v:trips.filter(t=>t.status==="cancelado").length,c:C.danger},

  const cols=isMobile?"1fr 1fr":isTablet?"repeat(3,1fr)":"repeat(5,1fr)";

      h(KpiCard,{label:"Combustible",value:fmtM(fuelCost),sub:"gasto total",icon:"⛽",accent:C.warning}),
      h(KpiCard,{label:"Mantenimiento",value:fmtM(maintCost),sub:"costo total",icon:"🔧",accent:C.purple}),
      h(KpiCard,{label:"Rendimiento",value:`${avgEff} km/L`,sub:"flota completa",icon:"📊",accent:C.info})
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},

  const {isMobile}=useBP();

  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [insModal,setInsModal]=useState(null); // unit id for insurance modal
  const ef={plates:"",model:"",year:"2024",trailerType:"Caja Seca",status:"disponible",km:"0",nextMaintKm:"50000",docExpiry:"",fuelEff:"4.0",insuranceName:"",insuranceExpiry:"",insurancePdf:null};
  const [form,setForm]=useState(ef);
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  function openEdit(u){
    setForm({...u,km:String(u.km),nextMaintKm:String(u.nextMaintKm),year:String(u.year),fuelEff:String(u.fuelEff)});
    setEditId(u.id);setModal(true);
  }
  function save(){
    if(!form.plates||!form.model)return;
    if(editId){
      setUnits(units.map(u=>u.id===editId?{...u,...form,year:+form.year,km:+form.km,nextMaintKm:+form.nextMaintKm,fuelEff:+form.fuelEff}:u));
    } else {
      setUnits([...units,{...form,id:`U${String(units.length+1).padStart(3,"0")}`,year:+form.year,km:+form.km,nextMaintKm:+form.nextMaintKm,fuelEff:+form.fuelEff}]);
    }
    setModal(false);setEditId(null);setForm(ef);
  }

  function handlePdfUpload(uid,file){
    if(!file||file.type!=="application/pdf")return;
    const reader=new FileReader();
    reader.onload=e=>{
      const dataUrl=e.target.result;
      setUnits(prev=>prev.map(u=>u.id===uid?{...u,insurancePdf:dataUrl,insurancePdfName:file.name}:u));
    };
    reader.readAsDataURL(file);
  }

  function handleInsuranceSave(uid,insName,insExpiry){
    setUnits(prev=>prev.map(u=>u.id===uid?{...u,insuranceName:insName,insuranceExpiry:insExpiry}:u));
    setInsModal(null);

        const kmL=u.nextMaintKm-u.km;
        const pct=Math.min(100,((u.km-(u.nextMaintKm-50000))/50000)*100);

              h('button',{onClick:()=>{setInsModal(u.id);setInsForm({name:u.insuranceName||"",expiry:u.insuranceExpiry||""});},
                style:{fontSize:11,fontWeight:600,color:C.primary,background:C.primaryLt,border:`1px solid ${C.primary}30`,borderRadius:4,padding:"2px 8px",cursor:"pointer"}},
                u.insuranceName?"Editar":"+ Agregar"

            u.insuranceName

                )
              : h('span',{style:{fontSize:12,color:C.textLight,fontStyle:"italic"}},"Sin seguro registrado"),
            u.insuranceExpiry&&h('div',{style:{fontSize:12,marginBottom:6}},
              h('span',{style:{color:C.textLight}},"Vigencia: "),

              (insExpired||insExpiring)&&h('span',{style:{marginLeft:5,fontSize:11,color:insExpired?C.danger:C.warning}},
                insExpired?"⚠ VENCIDO":`⚠ Vence en ${days(u.insuranceExpiry)} días`
              )
            ),
            // PDF upload / view
            h('div',{style:{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}},
              u.insurancePdf
                ? h('div',{style:{display:"flex",gap:6,alignItems:"center",flex:1,minWidth:0}},
                    h('span',{style:{fontSize:11.5,color:C.success,display:"flex",alignItems:"center",gap:4}},
                      "📄 ",h('span',{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}},u.insurancePdfName||"Póliza.pdf")
                    ),
                    h('a',{href:u.insurancePdf,target:"_blank",download:u.insurancePdfName||"poliza.pdf",
                      style:{fontSize:11,fontWeight:600,color:C.primary,background:C.primaryLt,border:`1px solid ${C.primary}30`,borderRadius:4,padding:"2px 8px",cursor:"pointer",textDecoration:"none"}},
                      "Ver PDF"
                    ),
                    h('button',{onClick:()=>setUnits(prev=>prev.map(x=>x.id===u.id?{...x,insurancePdf:null,insurancePdfName:null}:x)),
                      style:{fontSize:11,color:C.danger,background:C.dangerBg,border:`1px solid ${C.dangerBd}`,borderRadius:4,padding:"2px 7px",cursor:"pointer"}},
                      "✕"
                    )
                  )
                : h('label',{style:{display:"flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,color:C.textMid,background:C.surfaceAlt,border:`1px dashed ${C.border}`,borderRadius:5,padding:"5px 10px",cursor:"pointer",userSelect:"none"}},
                    "📎 Subir Póliza PDF",
                    h('input',{type:"file",accept:".pdf",style:{display:"none"},onChange:e=>handlePdfUpload(u.id,e.target.files[0])})
                  )
            )
          ),
          (docA||(insExpiring&&!insExpired)||(insExpired))&&h('div',{style:{marginTop:8,display:"flex",flexDirection:"column",gap:4}},
            docA&&h('div',{style:{background:C.dangerBg,border:`1px solid ${C.dangerBd}`,borderRadius:5,padding:"5px 9px",display:"flex",gap:5,alignItems:"center",fontSize:11.5,color:C.danger}},
              h(Ic,{n:"warn",s:12,c:C.danger}),"Documentación vence en ",days(u.docExpiry)," días"
            ),
            insExpired&&h('div',{style:{background:C.dangerBg,border:`1px solid ${C.dangerBd}`,borderRadius:5,padding:"5px 9px",display:"flex",gap:5,alignItems:"center",fontSize:11.5,color:C.danger}},
              h(Ic,{n:"warn",s:12,c:C.danger}),"Seguro VENCIDO"
            ),
            (insExpiring&&!insExpired)&&h('div',{style:{background:C.warningBg,border:`1px solid ${C.warningBd}`,borderRadius:5,padding:"5px 9px",display:"flex",gap:5,alignItems:"center",fontSize:11.5,color:C.warning}},
              h(Ic,{n:"warn",s:12,c:C.warning}),"Seguro vence en ",days(u.insuranceExpiry)," días"
            )
          )
        );
      })
    ),
    modal&&h(Modal,{title:editId?"Editar Unidad":"Registrar Nueva Unidad",onClose:()=>{setModal(false);setEditId(null);setForm(ef);}},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Placas",value:form.plates,onChange:v=>upd("plates",v),half:true,required:true}),
        h(Field,{label:"Modelo",value:form.model,onChange:v=>upd("model",v),half:true,required:true}),
        h(Field,{label:"Año",value:form.year,onChange:v=>upd("year",v),type:"number",half:true}),
        h(Field,{label:"Tipo Trailer",value:form.trailerType,onChange:v=>upd("trailerType",v),half:true,opts:["Caja Seca","Refrigerado","Plataforma","Tanque","Lowboy","Volteo"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Estado",value:form.status,onChange:v=>upd("status",v),half:true,opts:["disponible","en ruta","mantenimiento"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Km Actual",value:form.km,onChange:v=>upd("km",v),type:"number",half:true}),
        h(Field,{label:"Km Próx. Mantenimiento",value:form.nextMaintKm,onChange:v=>upd("nextMaintKm",v),type:"number",half:true}),
        h(Field,{label:"Rendimiento km/L",value:form.fuelEff,onChange:v=>upd("fuelEff",v),type:"number",half:true}),
        h(Field,{label:"Vencimiento Docs",value:form.docExpiry,onChange:v=>upd("docExpiry",v),type:"date",half:true}),
        h(Field,{label:"Aseguradora",value:form.insuranceName||"",onChange:v=>upd("insuranceName",v),half:true}),
        h(Field,{label:"Vigencia Seguro",value:form.insuranceExpiry||"",onChange:v=>upd("insuranceExpiry",v),type:"date",half:true})
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
        h('button',{onClick:()=>{setModal(false);setEditId(null);setForm(ef);},className:"btn-s",style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},editId?"Guardar Cambios":"Registrar")
      )
    ),
    // Insurance quick-edit modal
    insModal&&insUnit&&h(Modal,{title:`Seguro — ${insUnit.plates}`,sub:"Registre la aseguradora y vigencia de la póliza",onClose:()=>setInsModal(null)},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Aseguradora",value:insForm.name,onChange:v=>setInsForm(p=>({...p,name:v})),required:true}),
        h(Field,{label:"Vigencia (vencimiento)",value:insForm.expiry,onChange:v=>setInsForm(p=>({...p,expiry:v})),type:"date",half:true})
      ),
      h('div',{style:{marginBottom:16,padding:"12px 14px",background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:7}},
        h('div',{style:{fontSize:12,fontWeight:600,color:C.textMid,marginBottom:6}},"📎 Póliza PDF"),
        insUnit.insurancePdf
          ? h('div',{style:{display:"flex",gap:8,alignItems:"center"}},
              h('span',{style:{fontSize:12.5,color:C.success}},"✅ ",insUnit.insurancePdfName||"Póliza cargada"),

              h('button',{onClick:()=>setUnits(prev=>prev.map(x=>x.id===insUnit.id?{...x,insurancePdf:null,insurancePdfName:null}:x)),style:{fontSize:12,color:C.danger,background:"none",border:"none",cursor:"pointer"}},"Eliminar")
            )
          : h('label',{style:{display:"inline-flex",alignItems:"center",gap:6,fontSize:12.5,fontWeight:600,color:C.textMid,background:"#fff",border:`1px dashed ${C.border}`,borderRadius:6,padding:"8px 14px",cursor:"pointer"}},
              "📎 Seleccionar PDF",
              h('input',{type:"file",accept:".pdf",style:{display:"none"},onChange:e=>handlePdfUpload(insUnit.id,e.target.files[0])})
            )
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h('button',{onClick:()=>setInsModal(null),className:"btn-s",style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:()=>handleInsuranceSave(insModal,insForm.name,insForm.expiry),className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},"Guardar Seguro")
      )
    )
  );
}

// ── DRIVERS ──────────────────────────────────────────────────────────────────
function Drivers({drivers,setDrivers,units}){
  const {isMobile,isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [detailId,setDetailId]=useState(null);     // driver detail panel
  const [incModal,setIncModal]=useState(null);      // add incident for driver id
  const ef={name:"",license:"",licExpiry:"",phone:"",rfc:"",address:""};
  const [form,setForm]=useState(ef);
  const [incForm,setIncForm]=useState({type:"Infracción de tránsito",date:"",desc:"",sev:"warn"});
  const [filtEstatus,setFiltEstatus]=useState("activo");
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));

  function openNew(){
    setForm(ef);setEditId(null);setModal(true);
  }
  function openEdit(d){
    setForm({name:d.name,license:d.license,licExpiry:d.licExpiry,phone:d.phone||"",
      rfc:d.rfc||"",address:d.address||"",estatus:d.estatus||"activo"});
    setEditId(d.id);setModal(true);
  }
  function save(){
    if(!form.name||!form.license)return;
    if(editId){
      setDrivers(drivers.map(d=>d.id===editId?{...d,...form}:d));
    } else {
      setDrivers([...drivers,{...form,id:`D${String(drivers.length+1).padStart(3,"0")}`,
        trips:0,fuelScore:85,licPdf:null,licPdfName:null,incidents:[],estatus:form.estatus||"activo"}]);
    }
    setModal(false);setEditId(null);setForm(ef);
  }

  function handleLicPdf(driverId,file){
    if(!file||file.type!=="application/pdf")return;
    const reader=new FileReader();
    reader.onload=e=>{
      setDrivers(prev=>prev.map(d=>d.id===driverId
        ?{...d,licPdf:e.target.result,licPdfName:file.name}:d));
    };
    reader.readAsDataURL(file);
  }

  function addIncident(driverId){
    if(!incForm.date||!incForm.desc)return;
    setDrivers(prev=>prev.map(d=>{
      if(d.id!==driverId)return d;
      const newInc={...incForm,id:`I${Date.now()}`};
      const newIncs=[...(d.incidents||[]),newInc];
      // Recalculate fuelScore: base 100 - penalties
      const penalties=newIncs.reduce((a,i)=>a+(i.sev==="danger"?10:5),0);
      return{...d,incidents:newIncs,fuelScore:Math.max(10,100-penalties)};
    }));
    setIncModal(null);
    setIncForm({type:"Infracción de tránsito",date:"",desc:"",sev:"warn"});
  }

  function removeIncident(driverId,incId){
    setDrivers(prev=>prev.map(d=>{
      if(d.id!==driverId)return d;
      const newIncs=(d.incidents||[]).filter(i=>i.id!==incId);
      const penalties=newIncs.reduce((a,i)=>a+(i.sev==="danger"?10:5),0);
      return{...d,incidents:newIncs,fuelScore:Math.max(10,100-penalties)};
    }));
  }

  const detailDriver=detailId?drivers.find(d=>d.id===detailId):null;
  const SEV_COLOR={danger:C.danger,warn:C.warning};
  const SEV_BG={danger:C.dangerBg,warn:C.warningBg};
  const SEV_BD={danger:C.dangerBd,warn:C.warningBd};

  const shownDrivers=filtEstatus==="todos"?drivers:drivers.filter(d=>(d.estatus||"activo")===filtEstatus);

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Topbar ────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
        [{v:"activo",l:`✅ Activos (${drivers.filter(d=>(d.estatus||"activo")==="activo").length})`},
         {v:"baja",l:`❌ Baja (${drivers.filter(d=>d.estatus==="baja").length})`},
         {v:"todos",l:`👥 Todos (${drivers.length})`}
        ].map(({v,l})=>
          h('button',{key:v,onClick:()=>setFiltEstatus(v),
            style:{padding:"6px 14px",fontSize:12.5,fontWeight:600,borderRadius:6,cursor:"pointer",
              border:`1px solid ${filtEstatus===v?C.primary:C.border}`,
              background:filtEstatus===v?C.primaryLt:C.surface,
              color:filtEstatus===v?C.primary:C.textMid}},l)
        )
      ),
      h('button',{onClick:openNew,className:"btn-p",
        style:{padding:"8px 14px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
        h(Ic,{n:"plus",s:13,c:"#fff"}),isMobile?"Agregar":"Registrar Operador"
      )
    ),

    // ── Cards grid ────────────────────────────────────────────────────────
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:14}},
      shownDrivers.map(d=>{
        const licExpiring=d.licExpiry&&days(d.licExpiry)<60;
        const licExpired=d.licExpiry&&days(d.licExpiry)<0;
        const incs=d.incidents||[];
        const danger=incs.filter(i=>i.sev==="danger").length;
        const isDetail=detailId===d.id;
        const isActivo=(d.estatus||"activo")==="activo";
        return h('div',{key:d.id,style:{background:C.surface,
          border:`1.5px solid ${isDetail?C.primary:C.border}`,
          borderRadius:8,overflow:"hidden",transition:"border-color .15s",
          opacity:isActivo?1:0.65}},

          // Card header
          h('div',{style:{padding:"16px 18px"}},
            h('div',{style:{display:"flex",gap:12,alignItems:"flex-start",marginBottom:12}},
              h('div',{style:{width:44,height:44,borderRadius:10,
                background:d.fuelScore>85?C.primaryLt:d.fuelScore>70?C.warningBg:C.dangerBg,
                color:d.fuelScore>85?C.primary:d.fuelScore>70?C.warning:C.danger,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,flexShrink:0}},
                d.name.split(" ").slice(0,2).map(n=>n[0]).join("")
              ),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text,marginBottom:1}},d.name),
                h('div',{style:{fontSize:12,color:C.textMid,fontFamily:"IBM Plex Mono,monospace"}},d.license),
                h('div',{style:{display:"flex",alignItems:"center",gap:6}},
                h('span',{style:{display:"inline-flex",alignItems:"center",gap:4,
                  padding:"2px 9px",borderRadius:10,fontSize:11.5,fontWeight:700,
                  background:isActivo?"#ECFDF5":"#FEF2F2",
                  color:isActivo?"#065F46":"#991B1B",
                  border:`1px solid ${isActivo?"#6EE7B7":"#FCA5A5"}`}},
                  isActivo?"● Activo":"● Baja"
                ),
                !isActivo&&h('span',{style:{fontSize:11,color:C.textLight,fontStyle:"italic"}},"Historial conservado")
              )
              ),
              h('div',{style:{display:"flex",gap:5,flexShrink:0}},
                h('button',{onClick:()=>openEdit(d),
                  style:{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:5,
                    padding:"4px 8px",cursor:"pointer",fontSize:11.5,fontWeight:600,color:C.textMid}},
                  "✏️"),
                h('button',{
                  onClick:()=>setDrivers(drivers.map(x=>x.id===d.id?{...x,estatus:isActivo?"baja":"activo"}:x)),
                  title:isActivo?"Dar de baja":"Reactivar",
                  style:{background:isActivo?C.dangerBg:C.successBg,
                    border:`1px solid ${isActivo?C.dangerBd:C.successBd}`,borderRadius:5,
                    padding:"4px 8px",cursor:"pointer",fontSize:11.5,fontWeight:600,
                    color:isActivo?C.danger:C.success}},
                  isActivo?"🚫":"✅"),
                h('button',{onClick:()=>setDetailId(isDetail?null:d.id),
                  style:{background:isDetail?C.primaryLt:C.surfaceAlt,
                    border:`1px solid ${isDetail?C.primary+"50":C.border}`,borderRadius:5,
                    padding:"4px 8px",cursor:"pointer",fontSize:11.5,fontWeight:600,
                    color:isDetail?C.primary:C.textMid}},
                  isDetail?"▲ Cerrar":"▼ Ver más")
              )
            ),

            // Metrics row
            h('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}},
              [["Viajes",d.trips,C.primary],
               ["Incidentes",incs.length,incs.length===0?C.success:danger>0?C.danger:C.warning],
               ["Score",`${d.fuelScore}%`,d.fuelScore>85?C.success:d.fuelScore>70?C.warning:C.danger]
              ].map(([l,v,col])=>
                h('div',{key:l,style:{background:C.surfaceAlt,borderRadius:6,padding:"8px 10px",textAlign:"center"}},
                  h('div',{style:{fontSize:15,fontWeight:700,color:col}},v),
                  h('div',{style:{fontSize:10.5,color:C.textLight,marginTop:2}},l)
                )
              )
            ),

            // Score bar
            h('div',{style:{marginBottom:10}},
              h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:4}},
                h('span',{style:{color:C.textLight}},"Puntuación de manejo"),
                h('span',{style:{fontWeight:600,color:C.text}},d.fuelScore,"/100")
              ),
              h('div',{style:{height:5,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                h('div',{style:{height:"100%",width:`${d.fuelScore}%`,
                  background:d.fuelScore>85?C.success:d.fuelScore>70?C.warning:C.danger,borderRadius:3}})
              )
            ),

            // License PDF + vigencia
            h('div',{style:{background:C.surfaceAlt,borderRadius:7,padding:"10px 12px"}},
              h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
                h('span',{style:{fontSize:11.5,fontWeight:600,color:C.textMid}},"📄 Licencia"),
                d.licExpiry&&h('span',{style:{fontSize:11.5,fontWeight:700,
                  color:licExpired?C.danger:licExpiring?C.warning:C.success}},
                  licExpired?"⛔ VENCIDA":
                  licExpiring?`⚠ Vence en ${days(d.licExpiry)} días`:
                  `✓ Vigente hasta ${d.licExpiry}`
                )
              ),
              h('div',{style:{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}},
                d.licPdf
                  ?h('div',{style:{display:"flex",gap:6,alignItems:"center",flex:1,minWidth:0}},
                      h('span',{style:{fontSize:12,color:C.success,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}},
                        "📎 ",d.licPdfName||"licencia.pdf"),
                      h('a',{href:d.licPdf,target:"_blank",download:d.licPdfName||"licencia.pdf",
                        style:{fontSize:11.5,fontWeight:600,color:C.primary,
                          background:C.primaryLt,border:`1px solid ${C.primary}30`,
                          borderRadius:4,padding:"2px 8px",cursor:"pointer",textDecoration:"none",whiteSpace:"nowrap"}},
                        "Ver PDF"),
                      h('button',{onClick:()=>setDrivers(prev=>prev.map(x=>x.id===d.id?{...x,licPdf:null,licPdfName:null}:x)),
                        style:{fontSize:11,color:C.danger,background:C.dangerBg,
                          border:`1px solid ${C.dangerBd}`,borderRadius:4,padding:"2px 7px",cursor:"pointer",whiteSpace:"nowrap"}},
                        "✕")
                    )
                  :h('label',{style:{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,
                      color:C.textMid,background:"#fff",border:`1px dashed ${C.border}`,
                      borderRadius:5,padding:"5px 10px",cursor:"pointer",userSelect:"none"}},
                      "📎 Adjuntar PDF",
                      h('input',{type:"file",accept:".pdf",style:{display:"none"},
                        onChange:e=>handleLicPdf(d.id,e.target.files[0])})
                    )
              )
            ),

            // Alerts
            (licExpired||licExpiring)&&h('div',{style:{
              marginTop:8,padding:"6px 10px",
              background:licExpired?C.dangerBg:C.warningBg,
              border:`1px solid ${licExpired?C.dangerBd:C.warningBd}`,
              borderRadius:5,fontSize:12,color:licExpired?C.danger:C.warning,
              display:"flex",alignItems:"center",gap:6}},
              h(Ic,{n:"warn",s:12,c:licExpired?C.danger:C.warning}),
              licExpired?"Licencia VENCIDA — renovar inmediatamente":`Licencia vence en ${days(d.licExpiry)} días`
            )
          ),

          // ── Detail panel (expandable) ────────────────────────────────
          isDetail&&h('div',{style:{borderTop:`1px solid ${C.border}`,
            background:C.surfaceAlt,padding:"14px 18px"}},

            // Info extra
            h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
  [["📞 Teléfono",d.phone||"—"],["🆔 RFC",d.rfc||"—"],
               ["📍 Dirección",d.address||"—"],["📅 Lic. Vence",d.licExpiry||"—"],
               ["🚛 Unidades","Asignada por viaje"],["📊 Estatus",(d.estatus||"activo")==="activo"?"Activo":"Baja"]
              ].map(([l,v])=>
                h('div',{key:l,style:{background:C.surface,borderRadius:6,padding:"8px 10px"}},
                  h('div',{style:{fontSize:10.5,color:C.textLight,marginBottom:2}},l),
                  h('div',{style:{fontSize:12.5,fontWeight:600,color:C.text,

// Bar chart — data:[{label,value,value2?}], colors, height, formatY
function BarChart({data,color="#1447E6",color2,height=180,formatY,title,subtitle}){
  if(!data||!data.length) return h('div',{style:{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,fontSize:13}},"Sin datos");
  const max=Math.max(...data.flatMap(d=>[d.value,d.value2||0]),1);
  const PAD={l:48,r:8,t:16,b:36};
  const W=400, H=height+PAD.t+PAD.b;
  const chartW=W-PAD.l-PAD.r, chartH=height;
  const barW=data.length>1?(chartW/data.length)*0.55:40;
  const gap=(chartW/data.length);
  const fmtV=formatY||(v=>v>=1000000?`${(v/1000000).toFixed(1)}M`:v>=1000?`${(v/1000).toFixed(0)}k`:String(v));
  // Y grid lines
  const yTicks=4;
  return h('div',{style:{width:"100%",position:"relative"}},
    h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:"auto",display:"block",overflow:"visible"}},
      // Y grid + labels
      [...Array(yTicks+1)].map((_,i)=>{
        const val=Math.round((max/yTicks)*i);
        const y=PAD.t+chartH-(chartH/yTicks)*i;
        return h('g',{key:`yg${i}`},
          h('line',{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.borderLt,strokeWidth:.8}),
          h('text',{x:PAD.l-5,y:y+4,textAnchor:"end",fontSize:9,fill:C.textLight,fontFamily:"IBM Plex Mono,monospace"},
            fmtV(val))
        );
      }),
      // Bars + x labels
      data.map((d,i)=>{
        const cx=PAD.l+gap*i+gap/2;
        const bh1=d.value>0?(d.value/max)*chartH:0;
        const bh2=d.value2>0?(d.value2/max)*chartH:0;
        const dual=color2&&d.value2!==undefined;
        const bw=dual?barW*.46:barW;
        return h('g',{key:`b${i}`},
          // Bar 1
          h('rect',{
            x:cx-(dual?barW/2:bw/2), y:PAD.t+chartH-bh1,
            width:bw, height:Math.max(bh1,0), rx:3,
            fill:color, opacity:.9
          }),
          // Bar 2 (optional)
          dual&&h('rect',{
            x:cx+2, y:PAD.t+chartH-bh2,
            width:bw, height:Math.max(bh2,0), rx:3,
            fill:color2, opacity:.85
          }),
          // Value label on top
          d.value>0&&h('text',{
            x:cx-(dual?barW/4:0),y:PAD.t+chartH-bh1-4,
            textAnchor:"middle",fontSize:8.5,fill:color,fontWeight:"600",
            fontFamily:"IBM Plex Sans,sans-serif"
          },fmtV(d.value)),
          // X label
          h('text',{x:cx,y:PAD.t+chartH+14,textAnchor:"middle",
            fontSize:data.length>8?7.5:9,fill:C.textLight,
            fontFamily:"IBM Plex Sans,sans-serif"},
            d.label.length>5?d.label.slice(0,5):d.label)
        );
      }),
      // X axis
      h('line',{x1:PAD.l,y1:PAD.t+chartH,x2:W-PAD.r,y2:PAD.t+chartH,stroke:C.border,strokeWidth:1})
    )
  );
}

// Line chart
function LineChart({data,color="#1447E6",color2,height=180,formatY,smooth}){
  if(!data||data.length<2) return h('div',{style:{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.textLight,fontSize:13}},"Sin datos suficientes");
  const max=Math.max(...data.flatMap(d=>[d.value,d.value2||0]),1);
  const PAD={l:48,r:8,t:16,b:36};
  const W=400, H=height+PAD.t+PAD.b;
  const chartW=W-PAD.l-PAD.r, chartH=height;
  const fmtV=formatY||(v=>v>=1000000?`${(v/1000000).toFixed(1)}M`:v>=1000?`${(v/1000).toFixed(0)}k`:String(v));
  const px=(i)=>PAD.l+(i/(data.length-1))*chartW;
  const py=(v)=>PAD.t+chartH-(v/max)*chartH;
  // Build SVG path
  function makePath(key){
    return data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d[key]||0).toFixed(1)}`).join(" ");
  }
  function makeArea(key){
    const pts=data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d[key]||0).toFixed(1)}`).join(" ");
    return `${pts} L${px(data.length-1).toFixed(1)},${(PAD.t+chartH).toFixed(1)} L${PAD.l},${(PAD.t+chartH).toFixed(1)} Z`;
  }
  const yTicks=4;
  return h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:"auto",display:"block",overflow:"visible"}},
    h('defs',null,
      h('linearGradient',{id:`lg1${color.replace("#","")}`,x1:"0%",y1:"0%",x2:"0%",y2:"100%"},
        h('stop',{offset:"0%",stopColor:color,stopOpacity:.25}),
        h('stop',{offset:"100%",stopColor:color,stopOpacity:.02})
      ),
      color2&&h('linearGradient',{id:`lg2${color2.replace("#","")}`,x1:"0%",y1:"0%",x2:"0%",y2:"100%"},
        h('stop',{offset:"0%",stopColor:color2,stopOpacity:.2}),
        h('stop',{offset:"100%",stopColor:color2,stopOpacity:.02})
      )
    ),
    // Grid
    [...Array(yTicks+1)].map((_,i)=>{
      const val=Math.round((max/yTicks)*i);
      const y=PAD.t+chartH-(chartH/yTicks)*i;
      return h('g',{key:`yg${i}`},
        h('line',{x1:PAD.l,y1:y,x2:W-PAD.r,y2:y,stroke:C.borderLt,strokeWidth:.8}),
        h('text',{x:PAD.l-5,y:y+4,textAnchor:"end",fontSize:9,fill:C.textLight,fontFamily:"IBM Plex Mono,monospace"},fmtV(val))
      );
    }),
    // Area fill
    h('path',{d:makeArea("value"),fill:`url(#lg1${color.replace("#","")})`}),
    color2&&h('path',{d:makeArea("value2"),fill:`url(#lg2${color2.replace("#","")})`}),
    // Lines
    h('path',{d:makePath("value"),fill:"none",stroke:color,strokeWidth:2,strokeLinejoin:"round"}),
    color2&&h('path',{d:makePath("value2"),fill:"none",stroke:color2,strokeWidth:2,strokeLinejoin:"round",strokeDasharray:"5,3"}),
    // Dots + x labels
    data.map((d,i)=>h('g',{key:`p${i}`},
      h('circle',{cx:px(i),cy:py(d.value),r:3,fill:"#fff",stroke:color,strokeWidth:1.8}),
      color2&&h('circle',{cx:px(i),cy:py(d.value2||0),r:3,fill:"#fff",stroke:color2,strokeWidth:1.8}),
      h('text',{x:px(i),y:PAD.t+chartH+14,textAnchor:"middle",
        fontSize:data.length>8?7.5:9,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},
        d.label.length>5?d.label.slice(0,5):d.label)
    )),
    h('line',{x1:PAD.l,y1:PAD.t+chartH,x2:W-PAD.r,y2:PAD.t+chartH,stroke:C.border,strokeWidth:1})
  );
}

// Donut chart
function DonutChart({data,size=120}){
  if(!data||!data.length) return null;
  const total=data.reduce((a,b)=>a+b.value,0)||1;
  const R=46,r=28,cx=60,cy=60;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sweep=(d.value/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle), y1=cy+R*Math.sin(angle);
    angle+=sweep;
    const x2=cx+R*Math.cos(angle), y2=cy+R*Math.sin(angle);
    const ix1=cx+r*Math.cos(angle-sweep), iy1=cy+r*Math.sin(angle-sweep);
    const ix2=cx+r*Math.cos(angle), iy2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return{...d,path:`M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${large},0 ${ix1},${iy1} Z`};
  });
  return h('svg',{viewBox:"0 0 120 120",style:{width:size,height:size}},
    slices.map((s,i)=>h('path',{key:i,d:s.path,fill:s.color,stroke:"#fff",strokeWidth:1})),
    h('text',{x:cx,y:cy-4,textAnchor:"middle",fontSize:14,fontWeight:"700",fill:C.text,fontFamily:"IBM Plex Sans,sans-serif"},total),
    h('text',{x:cx,y:cy+11,textAnchor:"middle",fontSize:8,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},"total")
  );
}

function Trips({trips,setTrips,units,drivers}){

  const [form,setForm]=useState(ef);

      setTrips([...trips,{...form,id:`V${String(trips.length+1).padStart(3,"0")}`,weight:+form.weight,km:+form.km,fuelEst:+form.fuelEst}]);
    }
    setModal(false);setEditId(null);setForm(ef);
  }
  const chg=(id,st)=>setTrips(trips.map(t=>t.id===id?{...t,status:st}:t));
  const opts=["all","programado","en curso","finalizado","cancelado"];
  const shown=filt==="all"?trips:trips.filter(t=>t.status===filt);

  // ── Chart data: periodo ─────────────────────────────────────────────────
  const MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const allMonths=[...new Set(trips.map(t=>t.month||t.departDate?.slice(0,7)).filter(Boolean))].sort();
  const allYears=[...new Set(allMonths.map(m=>m.slice(0,4)))].sort();
  const byMonth=allMonths.map(m=>({
    label:MN[+m.slice(5,7)-1]+" "+m.slice(2,4),
    value:trips.filter(t=>(t.month||t.departDate?.slice(0,7))===m&&t.status==="finalizado").length,
    value2:trips.filter(t=>(t.month||t.departDate?.slice(0,7))===m&&t.status==="cancelado").length,
  }));
  const byYear=allYears.map(y=>({
    label:y,
    value:trips.filter(t=>((t.month||t.departDate?.slice(0,7))||"").startsWith(y)&&t.status==="finalizado").length,
    value2:trips.filter(t=>((t.month||t.departDate?.slice(0,7))||"").startsWith(y)&&t.status==="cancelado").length,
  }));
  const kmByMonth=allMonths.map(m=>({
    label:MN[+m.slice(5,7)-1],
    value:trips.filter(t=>(t.month||t.departDate?.slice(0,7))===m).reduce((a,b)=>a+(b.km||0),0),
  }));
  const statusDonut=[
    {label:"Finalizado",value:trips.filter(t=>t.status==="finalizado").length,color:C.success},

  const chartData=period==="year"?byYear:byMonth;

    :kmByMonth;

  // ── Chart data: por tráiler ─────────────────────────────────────────────
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple,C.info,C.danger];

    return {unit:u,drv,done,totalKm,canceled,total:uTrips.length,color:UNIT_COLORS[i%UNIT_COLORS.length]};
  });
  const trailerBarData=trailerTrips.map(t=>({label:t.unit.plates,value:t.done,value2:t.canceled,color:t.color}));
  const trailerKmData=trailerTrips.map(t=>({label:t.unit.plates,value:t.totalKm}));

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

// ── FUEL ────────────────────────────────────────────────────────────────────
function Fuel({fuel,setFuel,units,drivers}){
  const {isMobile,isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [fuelView,setFuelView]=useState("charts");
  const [fuelSubview,setFuelSubview]=useState("periodo");
  const [fuelPeriod,setFuelPeriod]=useState("month");
  const ef={unit:"",driver:"",date:"",liters:"",cost:"",location:"",km:"",month:"2025-01"};
  const [form,setForm]=useState(ef);
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  function save(){
    if(!form.unit||!form.liters)return;
    setFuel([...fuel,{...form,id:`F${String(fuel.length+1).padStart(3,"0")}`,liters:+form.liters,cost:+form.cost,km:+form.km}]);
    setModal(false);setForm(ef);
  }
  const totalL=fuel.reduce((a,b)=>a+b.liters,0);
  const totalC=fuel.reduce((a,b)=>a+b.cost,0);

  function exportCSV(){
    const rows=[["ID","Unidad","Placas","Operador","Fecha","Mes","Litros","Costo MXN","Precio/L","Odómetro","Estación"]];
    fuel.forEach(f=>{
      const u=units.find(u=>u.id===f.unit);
      const d=drivers.find(d=>d.id===f.driver);
      rows.push([f.id,f.unit,u?.plates||"",d?d.name:"",f.date,f.month||"",f.liters,f.cost,
        f.cost&&f.liters?(f.cost/f.liters).toFixed(2):"",f.km||"",f.location||""]);
    });
    const csv=rows.map(r=>r.map(v=>typeof v==="string"&&v.includes(",")? `"${v}"`:v).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="combustible_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();URL.revokeObjectURL(url);
  }
  function exportExcel(){
    let html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><table border="1">';
    html+='<tr style="background:#1447E6;color:white;font-weight:bold"><th>ID</th><th>Unidad</th><th>Placas</th><th>Operador</th><th>Fecha</th><th>Mes</th><th>Litros</th><th>Costo MXN</th><th>Precio/L</th><th>Odómetro</th><th>Estación</th></tr>';
    fuel.forEach((f,i)=>{
      const u=units.find(u=>u.id===f.unit);
      const d=drivers.find(d=>d.id===f.driver);
      const bg=i%2===0?"#ffffff":"#f7f9fc";
      html+=`<tr style="background:${bg}"><td>${f.id}</td><td>${f.unit}</td><td>${u?.plates||""}</td><td>${d?d.name:""}</td><td>${f.date}</td><td>${f.month||""}</td><td>${f.liters}</td><td>${f.cost}</td><td>${f.cost&&f.liters?(f.cost/f.liters).toFixed(2):""}</td><td>${f.km||""}</td><td>${f.location||""}</td></tr>`;
    });
    html+=`<tr style="background:#EBF1FF;font-weight:bold"><td colspan="6">TOTALES</td><td>${totalL}</td><td>${totalC}</td><td>${totalL?(totalC/totalL).toFixed(2):""}</td><td colspan="2"></td></tr>`;
    html+='</table></body></html>';
    const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    a.download="combustible_"+new Date().toISOString().slice(0,10)+".xls";
    a.click();URL.revokeObjectURL(url);
  }

  // ── Chart data: por período ─────────────────────────────────────────────
  const MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const fuelMonths=[...new Set(fuel.map(f=>f.month).filter(Boolean))].sort();
  const fuelYears=[...new Set(fuelMonths.map(m=>m.slice(0,4)))].sort();
  const costByMonth=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1]+" "+m.slice(2,4),
    value:fuel.filter(f=>f.month===m).reduce((a,b)=>a+b.cost,0),
  }));
  const litersByMonth=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1]+" "+m.slice(2,4),
    value:fuel.filter(f=>f.month===m).reduce((a,b)=>a+b.liters,0),
  }));
  const costByYear=fuelYears.map(y=>({
    label:y,value:fuel.filter(f=>(f.month||"").startsWith(y)).reduce((a,b)=>a+b.cost,0),
  }));
  const litersByYear=fuelYears.map(y=>({
    label:y,value:fuel.filter(f=>(f.month||"").startsWith(y)).reduce((a,b)=>a+b.liters,0),
  }));
  const fuelCostData=fuelPeriod==="year"?costByYear:costByMonth;
  const fuelLiterData=fuelPeriod==="year"?litersByYear:litersByMonth;

  // ── Chart data: por tráiler ─────────────────────────────────────────────
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple,C.info,C.danger];
  const trailerFuel=units.map((u,i)=>{
    const recs=fuel.filter(f=>f.unit===u.id);
    const tL=recs.reduce((a,b)=>a+b.liters,0);
    const tC=recs.reduce((a,b)=>a+b.cost,0);
    const drv=drivers.find(d=>d.id===(typeof trips!=='undefined'?trips.filter(t=>t.unit===u.id&&t.status==="en curso").slice(-1)[0]?.driver:null)||null)||null;
    return {unit:u,drv,liters:tL,cost:tC,count:recs.length,
      ppl:tL>0?tC/tL:0,color:UNIT_COLORS[i%UNIT_COLORS.length],recs};
  });
  const trailerCostBar=trailerFuel.map(t=>({label:t.unit.plates,value:t.cost}));
  const trailerLiterBar=trailerFuel.map(t=>({label:t.unit.plates,value:t.liters}));
  const trailerCostDonut=trailerFuel.filter(t=>t.cost>0).map(t=>({label:t.unit.plates,value:Math.round(t.cost),color:t.color}));

  // Monthly breakdown per trailer (for line chart - pick busiest unit)
  const busiest=trailerFuel.sort((a,b)=>b.cost-a.cost)[0];
  const busiestLine=fuelMonths.map(m=>({
    label:MN[+m.slice(5,7)-1],
    value:fuel.filter(f=>f.unit===busiest?.unit.id&&f.month===m).reduce((a,b)=>a+b.cost,0),
  }));

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Toolbar ──────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',{style:{display:"flex",gap:6}},
        [{v:"charts",l:"📊 Gráficas"},{v:"table",l:"📋 Registros"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setFuelView(v),

              background:fuelView===v?C.primaryLt:C.surface,color:fuelView===v?C.primary:C.textMid}},l)
        )
      ),
      h('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        fuelView==="charts"&&h('div',{style:{display:"flex",gap:4}},
          [{v:"periodo",l:"Por Período"},{v:"trailer",l:"Por Tráiler"}].map(({v,l})=>
            h('button',{key:v,onClick:()=>setFuelSubview(v),
              style:{padding:"6px 12px",fontSize:12,fontWeight:600,borderRadius:6,cursor:"pointer",

                background:fuelSubview===v?C.warningBg:"#fff",color:fuelSubview===v?C.warning:C.textMid}},l)
          )
        ),
        fuelView==="charts"&&fuelSubview==="periodo"&&h('div',{style:{display:"flex",gap:4}},
          [{v:"month",l:"Mes"},{v:"year",l:"Año"}].map(({v,l})=>
            h('button',{key:v,onClick:()=>setFuelPeriod(v),
              style:{padding:"5px 10px",fontSize:12,fontWeight:600,borderRadius:6,cursor:"pointer",
                border:`1px solid ${fuelPeriod===v?C.info:C.border}`,
                background:fuelPeriod===v?C.infoBg:"#fff",color:fuelPeriod===v?C.info:C.textMid}},l)
          )
        ),
        h('div',{style:{display:"flex",gap:6}},
          h('button',{onClick:exportCSV,className:"btn-s",
            style:{padding:"7px 12px",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5,borderRadius:7}},"📄 CSV"),
          h('button',{onClick:exportExcel,
            style:{padding:"7px 12px",fontSize:12.5,fontWeight:600,display:"flex",alignItems:"center",gap:5,
              borderRadius:7,cursor:"pointer",border:"1px solid #B3E6CE",background:C.successBg,color:C.success}},"📊 Excel"),
          h('button',{onClick:()=>setModal(true),className:"btn-p",
            style:{padding:"8px 13px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}},
            h(Ic,{n:"plus",s:13,c:"#fff"}),"Registrar")
        )
      )
    ),

    // KPI pills
    h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
      [["⛽ Litros",`${fmt(totalL)} L`,C.primary],["💰 Gasto",fmtM(totalC),C.warning],
       ["🔢 Cargas",fuel.length,C.info],["📊 $/L",`$${totalL?(totalC/totalL).toFixed(2):"—"}`,C.textMid]
      ].map(([l,v,col])=>
        h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 16px"}},

          legend:[{label:"Gasto MXN",color:C.warning}]},
          h(BarChart,{data:fuelCostData,color:C.warning,height:180,

      h(ChartPanel,{title:"Tendencia de Gasto",sub:"Evolución mensual acumulada",

      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}},

      ),
      // Gráficas
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
        h(ChartPanel,{title:"Gasto por Tráiler",sub:"Total MXN",
          legend:[{label:"Gasto MXN",color:C.warning}]},
          h(BarChart,{data:trailerCostBar,color:C.warning,height:200,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})

        h(ChartPanel,{title:"Litros por Tráiler",sub:"Total cargado",
