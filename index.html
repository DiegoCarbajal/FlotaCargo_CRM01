        )
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},
        h(ChartPanel,{title:`Evolución mensual — ${busiest?.unit.plates||""}`,sub:"Gasto del tráiler con mayor consumo",
          legend:[{label:"Gasto MXN",color:busiest?.color||C.warning}]},
          h(LineChart,{data:busiestLine,color:busiest?.color||C.warning,height:150,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Distribución del Gasto",sub:"Participación por tráiler"},
          h('div',{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}},
            h(DonutChart,{data:trailerCostDonut,size:96}),
            h('div',{style:{flex:1,display:"flex",flexDirection:"column",gap:7}},
              trailerCostDonut.map(d=>h('div',{key:d.label,style:{display:"flex",alignItems:"center",gap:8}},
                h('div',{style:{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}),
                h('div',{style:{flex:1,fontSize:12,color:C.textMid,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}},d.label),
                h('div',{style:{fontSize:11.5,fontWeight:700,color:C.text}},
                  `${trailerFuel.find(t=>t.unit.plates===d.label)?.cost>0?Math.round((d.value/totalC)*100):0}%`)
              ))
            )
          )
        )
      ),
      // Ranking tabla
      h(ChartPanel,{title:"Ranking de Consumo por Tráiler",sub:"Ordenado por gasto total"},
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:520}},
            h(THead,{cols:["#","Tráiler","Modelo","Operador","Cargas","Litros","Gasto Total","$/L","Participación"]}),
            h('tbody',null,
              [...trailerFuel].sort((a,b)=>b.cost-a.cost).map((t,i)=>{
                const pct=totalC>0?Math.round((t.cost/totalC)*100):0;
                return h('tr',{key:t.unit.id,className:"row-hover",
                  style:{borderBottom:i<trailerFuel.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.textLight}},`#${i+1}`),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{width:10,height:10,borderRadius:"50%",background:t.color,flexShrink:0}}),
                      h('span',{style:{fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},t.unit.plates)
                    )
                  ),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},t.unit.model),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},
                    t.drv?t.drv.name.split(" ").slice(0,2).join(" "):"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:600,color:C.info,textAlign:"center"}},t.count),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.text}},
                    t.liters>0?`${fmt(t.liters)} L`:"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:800,color:C.warning}},
                    t.cost>0?fmtM(t.cost):"—"),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},
                    t.ppl>0?`$${t.ppl.toFixed(2)}`:"—"),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{flex:1,height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                        h('div',{style:{height:"100%",width:`${pct}%`,
                          background:`linear-gradient(90deg,${t.color},${t.color}99)`,borderRadius:3}})
                      ),
                      h('span',{style:{fontSize:11.5,fontWeight:700,color:t.color,flexShrink:0}},`${pct}%`)
                    )
                  )
                );
              })
            )
          )
        )
      )
    ),

    // ── TABLE VIEW ───────────────────────────────────────────────────────
    fuelView==="table"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}},
        units.map(u=>{
          const recs=fuel.filter(f=>f.unit===u.id);
          if(!recs.length)return null;
          const tL=recs.reduce((a,b)=>a+b.liters,0);
          const tC=recs.reduce((a,b)=>a+b.cost,0);
          return h('div',{key:u.id,className:"card",style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.plates),
                h('div',{style:{fontSize:12,color:C.textMid}},u.model)
              ),
              h(Badge,{status:u.status})
            ),
            h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              [["Litros",`${fmt(tL)} L`,C.primary],["Costo",fmtM(tC),C.warning],
               ["Cargas",recs.length,C.info],["$/L",`$${tC&&tL?(tC/tL).toFixed(2):"—"}`,C.textMid]
              ].map(([l,v,col])=>
                h('div',{key:l,style:{background:C.surfaceAlt,borderRadius:6,padding:"7px 9px"}},
                  h('div',{style:{fontSize:10.5,color:C.textLight,marginBottom:2}},l),
                  h('div',{style:{fontSize:13,fontWeight:700,color:col}},v)
                )
              )
            )
          );
        })
      ),
      h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}},
        h('div',{style:{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Registro de Cargas"),
          h('span',{style:{fontSize:12.5,color:C.textMid}},fuel.length," registros")
        ),
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:680}},
            h(THead,{cols:["ID","Unidad","Operador","Fecha","Mes","Litros","Costo","$/L","Estación"]}),
            h('tbody',null,fuel.map((f,i)=>{
              const u=units.find(u=>u.id===f.unit);
              const d=drivers.find(d=>d.id===f.driver);
              return h('tr',{key:f.id,className:"row-hover",
                style:{borderBottom:i<fuel.length-1?`1px solid ${C.borderLt}`:"none"}},
                h('td',{style:{padding:"9px 14px",fontSize:12,fontFamily:"IBM Plex Mono,monospace",color:C.textLight}},f.id),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u?.plates||f.unit),
                h('td',{style:{padding:"9px 14px",fontSize:13,color:C.text}},d?d.name.split(" ").slice(0,2).join(" "):"—"),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},f.date),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid,fontFamily:"IBM Plex Mono,monospace"}},f.month||"—"),
                h('td',{style:{padding:"9px 14px",fontSize:13,fontWeight:600,color:C.text}},fmt(f.liters)," L"),
                h('td',{style:{padding:"9px 14px",fontSize:13,fontWeight:600,color:C.text}},fmtM(f.cost)),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},"$",(f.cost/f.liters).toFixed(2)),
                h('td',{style:{padding:"9px 14px",fontSize:12.5,color:C.textMid}},f.location)
              );
            }))
          )
        )
      )
    ),

    modal&&h(Modal,{title:"Registrar Carga de Combustible",onClose:()=>setModal(false)},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Unidad (Tracto)",value:form.unit,onChange:v=>upd("unit",v),half:true,required:true,
          opts:[{v:"",l:"Seleccionar"},...units.map(u=>({v:u.id,l:`${u.plates} — ${u.model}`}))]}),
        h(Field,{label:"Operador",value:form.driver,onChange:v=>upd("driver",v),half:true,
          opts:[{v:"",l:"Seleccionar"},...drivers.map(d=>({v:d.id,l:d.name}))]}),
        h(Field,{label:"Fecha",value:form.date,onChange:v=>upd("date",v),type:"date",half:true}),
        h(Field,{label:"Mes de operación",value:form.month,onChange:v=>upd("month",v),half:true,
          opts:["2025-01","2025-02","2025-03","2025-04","2025-05","2025-06"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Litros cargados",value:form.liters,onChange:v=>upd("liters",v),type:"number",half:true}),
        h(Field,{label:"Costo total (MXN)",value:form.cost,onChange:v=>upd("cost",v),type:"number",half:true}),
        h(Field,{label:"Estación de servicio",value:form.location,onChange:v=>upd("location",v)})
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
        h('button',{onClick:()=>setModal(false),className:"btn-s",style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},"Guardar")
      )
    )
  );
}

// ── MAINT ────────────────────────────────────────────────────────────────────
function Maint({maint,setMaint,units}){
  const {isTablet}=useBP();
  const [modal,setModal]=useState(false);
  const [view,setView]=useState("cards"); // cards | charts
  const ef={unit:"",type:"Preventivo",category:"Aceite",date:"",cost:"",description:"",status:"programado"};
  const [form,setForm]=useState(ef);
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  function save(){
    if(!form.unit||!form.description)return;
    setMaint([...maint,{...form,id:`M${String(maint.length+1).padStart(3,"0")}`,cost:+form.cost}]);
    setModal(false);setForm(ef);
  }
  const chg=(id,st)=>setMaint(maint.map(m=>m.id===id?{...m,status:st}:m));
  const CC={Frenos:C.danger,Aceite:C.warning,Llantas:C.primary,Motor:C.purple,Eléctrico:C.info,Suspensión:C.textMid};
  const CI={Frenos:"🛑",Aceite:"🛢️",Llantas:"⭕",Motor:"⚙️",Eléctrico:"⚡",Suspensión:"🔧"};
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple];

  // ── Chart data ────────────────────────────────────────────────────────────
  const totalCost=maint.reduce((a,b)=>a+(b.cost||0),0);

  // Cost per unit
  const costByUnit=units.map((u,i)=>{
    const recs=maint.filter(m=>m.unit===u.id);
    return {
      label:u.plates,
      model:u.model,
      value:recs.reduce((a,b)=>a+(b.cost||0),0),
      count:recs.length,
      color:UNIT_COLORS[i%UNIT_COLORS.length],
      preventivo:recs.filter(m=>m.type==="Preventivo").reduce((a,b)=>a+(b.cost||0),0),
      correctivo:recs.filter(m=>m.type==="Correctivo").reduce((a,b)=>a+(b.cost||0),0),
    };
  }).sort((a,b)=>b.value-a.value);

  // Cost by category
  const cats=["Aceite","Frenos","Llantas","Motor","Eléctrico","Suspensión"];
  const costByCat=cats.map(cat=>({
    label:cat,
    value:maint.filter(m=>m.category===cat).reduce((a,b)=>a+(b.cost||0),0),
    color:CC[cat]||C.textMid,
  })).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);

  // Preventivo vs Correctivo per unit
  const prevVsCorr=units.map((u,i)=>({
    label:u.plates,
    value:maint.filter(m=>m.unit===u.id&&m.type==="Preventivo").reduce((a,b)=>a+(b.cost||0),0),
    value2:maint.filter(m=>m.unit===u.id&&m.type==="Correctivo").reduce((a,b)=>a+(b.cost||0),0),
  }));

  // Donut: cost distribution by unit
  const unitDonut=costByUnit.filter(u=>u.value>0).map(u=>({label:u.label,value:u.value,color:u.color}));

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Top bar ─────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
        [["💰 Total",fmtM(totalCost),C.text],
         ["📋 Programados",maint.filter(m=>m.status==="programado").length,C.purple],
         ["⚙️ En Proceso",maint.filter(m=>m.status==="en proceso").length,C.warning],
         ["✅ Completados",maint.filter(m=>m.status==="completado").length,C.success]
        ].map(([l,v,col])=>
          h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"9px 14px"}},
            h('div',{style:{fontSize:11,color:C.textLight,textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}},l),
            h('div',{style:{fontSize:17,fontWeight:700,color:col}},v)
          )
        )
      ),
      h('div',{style:{display:"flex",gap:8}},
        [{v:"cards",l:"🗂️ Servicios"},{v:"charts",l:"📊 Gráficas"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setView(v),
            style:{padding:"7px 14px",fontSize:13,fontWeight:600,borderRadius:7,cursor:"pointer",
              border:`1px solid ${view===v?C.primary:C.border}`,
              background:view===v?C.primaryLt:C.surface,
              color:view===v?C.primary:C.textMid}},l)
        ),
        h('button',{onClick:()=>setModal(true),className:"btn-p",
          style:{padding:"8px 14px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
          h(Ic,{n:"plus",s:13,c:"#fff"}),"Registrar Servicio"
        )
      )
    ),

    // ── CHARTS VIEW ──────────────────────────────────────────────────────────
    view==="charts"&&h('div',{style:{display:"flex",flexDirection:"column",gap:14}},

      // Row 1: bar por tracto + donut
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},
        h(ChartPanel,{title:"Costo de Mantenimiento por Tráiler",sub:"Gasto total acumulado MXN",
          legend:[{label:"Costo MXN",color:C.purple}]},
          h(BarChart,{data:costByUnit,color:C.purple,height:200,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Distribución por Tráiler",sub:"Participación en gasto total"},
          h('div',{style:{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}},
            h(DonutChart,{data:unitDonut,size:100}),
            h('div',{style:{flex:1,display:"flex",flexDirection:"column",gap:7}},
              unitDonut.map(d=>{
                const pct=totalCost>0?Math.round((d.value/totalCost)*100):0;
                return h('div',{key:d.label,style:{display:"flex",alignItems:"center",gap:7}},
                  h('div',{style:{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}),
                  h('div',{style:{flex:1,fontSize:12,color:C.textMid,fontFamily:"IBM Plex Mono,monospace",fontWeight:600}},d.label),
                  h('div',{style:{fontSize:11.5,fontWeight:700,color:C.text}},`${pct}%`)
                );
              })
            )
          )
        )
      ),

      // Row 2: preventivo vs correctivo + por categoría
      h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
        h(ChartPanel,{title:"Preventivo vs Correctivo por Tráiler",sub:"Desglose por tipo de servicio",
          legend:[{label:"Preventivo",color:C.success},{label:"Correctivo",color:C.danger}]},
          h(BarChart,{data:prevVsCorr,color:C.success,color2:C.danger,height:180,
            formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
        ),
        h(ChartPanel,{title:"Costo por Categoría",sub:"Todas las unidades"},
          h('div',{style:{display:"flex",flexDirection:"column",gap:8,paddingTop:4}},
            costByCat.length===0
              ?h('div',{style:{fontSize:13,color:C.textLight,textAlign:"center",padding:"16px 0"}},"Sin datos")
              :costByCat.map((cat,i)=>{
                const maxV=costByCat[0]?.value||1;
                return h('div',{key:cat.label},
                  h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}},
                    h('span',{style:{display:"flex",alignItems:"center",gap:5,color:C.textMid}},
                      CI[cat.label]||"🔧"," ",cat.label),
                    h('span',{style:{fontWeight:700,color:C.text}},fmtM(cat.value))
                  ),
                  h('div',{style:{height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                    h('div',{style:{height:"100%",width:`${(cat.value/maxV)*100}%`,
                      background:cat.color,borderRadius:3}})
                  )
                );
              })
          )
        )
      ),

      // Row 3: ranking table
      h(ChartPanel,{title:"Ranking de Costo por Tráiler",sub:"Detalle completo de inversión en mantenimiento"},
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:560}},
            h(THead,{cols:["#","Tráiler","Modelo","Servicios","Preventivo","Correctivo","Total","% del gasto"]}),
            h('tbody',null,
              costByUnit.map((u,i)=>{
                const pct=totalCost>0?Math.round((u.value/totalCost)*100):0;
                return h('tr',{key:u.label,className:"row-hover",
                  style:{borderBottom:i<costByUnit.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.textLight}},`#${i+1}`),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{width:10,height:10,borderRadius:"50%",background:u.color,flexShrink:0}}),
                      h('span',{style:{fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},u.label)
                    )
                  ),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},u.model),
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:600,color:C.info,textAlign:"center"}},u.count),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.success,fontWeight:600}},fmtM(u.preventivo)),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.danger,fontWeight:600}},fmtM(u.correctivo)),
                  h('td',{style:{padding:"10px 14px",fontSize:14,fontWeight:800,color:C.purple}},fmtM(u.value)),
                  h('td',{style:{padding:"10px 14px"}},
                    h('div',{style:{display:"flex",alignItems:"center",gap:8}},
                      h('div',{style:{flex:1,height:6,background:C.borderLt,borderRadius:3,overflow:"hidden"}},
                        h('div',{style:{height:"100%",width:`${pct}%`,
                          background:`linear-gradient(90deg,${u.color},${u.color}99)`,borderRadius:3}})
                      ),
                      h('span',{style:{fontSize:11.5,fontWeight:700,color:u.color,flexShrink:0}},`${pct}%`)
                    )
                  )
                );
              })
            )
          )
        )
      )
    ),

    // ── CARDS VIEW ───────────────────────────────────────────────────────────
    view==="cards"&&h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}},
      maint.map(m=>{
        const unit=units.find(u=>u.id===m.unit);
        const cc=CC[m.category]||C.textMid;
        return h('div',{key:m.id,className:"card",style:{background:C.surface,border:`1px solid ${C.border}`,
          borderLeft:`3px solid ${cc}`,borderRadius:8,padding:"14px 16px"}},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h('div',{style:{display:"flex",gap:9,alignItems:"center"}},
              h('span',{style:{fontSize:20}},CI[m.category]||"🔧"),
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text}},m.category),
                h('div',{style:{fontSize:12,color:C.textMid}},unit?.plates||m.unit," · ",m.type)
              )
            ),
            h(Badge,{status:m.status})
          ),
          h('p',{style:{fontSize:12.5,color:C.textMid,lineHeight:1.5,marginBottom:10}},m.description),
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h('div',null,
              h('div',{style:{fontSize:11,color:C.textLight}},"Fecha · Costo"),
              h('div',{style:{fontSize:12.5,fontWeight:700,color:C.text}},m.date," · ",fmtM(m.cost))
            ),
            h('div',{style:{display:"flex",gap:6}},
              m.status==="programado"&&h('button',{onClick:()=>chg(m.id,"en proceso"),
                style:{background:C.warningBg,color:C.warning,border:`1px solid ${C.warningBd}`,
                  borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}},"Iniciar"),
              m.status==="en proceso"&&h('button',{onClick:()=>chg(m.id,"completado"),
                style:{background:C.successBg,color:C.success,border:`1px solid ${C.successBd}`,
                  borderRadius:5,padding:"4px 9px",fontSize:11.5,fontWeight:600,cursor:"pointer"}},"Completar")
            )
          )
        );
      })
    ),

    modal&&h(Modal,{title:"Registrar Servicio de Mantenimiento",onClose:()=>setModal(false)},
      h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}},
        h(Field,{label:"Unidad",value:form.unit,onChange:v=>upd("unit",v),half:true,required:true,
          opts:[{v:"",l:"Seleccionar"},...units.map(u=>({v:u.id,l:`${u.plates} — ${u.model}`}))]}),
        h(Field,{label:"Tipo",value:form.type,onChange:v=>upd("type",v),half:true,
          opts:["Preventivo","Correctivo"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Categoría",value:form.category,onChange:v=>upd("category",v),half:true,
          opts:["Aceite","Frenos","Llantas","Motor","Eléctrico","Suspensión"].map(x=>({v:x,l:x}))}),
        h(Field,{label:"Fecha",value:form.date,onChange:v=>upd("date",v),type:"date",half:true}),
        h(Field,{label:"Costo (MXN)",value:form.cost,onChange:v=>upd("cost",v),type:"number",half:true}),
        h(Field,{label:"Estado",value:form.status,onChange:v=>upd("status",v),half:true,
          opts:["programado","en proceso","completado"].map(x=>({v:x,l:ST[x]?.label||x}))}),
        h(Field,{label:"Descripción",value:form.description,onChange:v=>upd("description",v),required:true})
      ),
      h('div',{style:{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}},
        h('button',{onClick:()=>setModal(false),className:"btn-s",
          style:{padding:"9px 18px",fontSize:13,fontWeight:600}},"Cancelar"),
        h('button',{onClick:save,className:"btn-p",style:{padding:"9px 20px",fontSize:13,fontWeight:600}},"Guardar")
      )
    )
  );
}

// ── MAP (Leaflet / OpenStreetMap) ────────────────────────────────────────────
function MapRoutes({trips,units,drivers}){
  const {isTablet,isMobile}=useBP();
  const mapRef=useRef(null);
  const leafletMapRef=useRef(null);
  const markersRef=useRef([]);
  const routeLinesRef=useRef([]);
  const [from,setFrom]=useState("Guadalajara");
  const [to,setTo]=useState("Monterrey");
  const [eff,setEff]=useState("4.0");
  const [selTrip,setSelTrip]=useState(null);
  const [mapReady,setMapReady]=useState(false);
  const [routeInfo,setRouteInfo]=useState(null);
  const [loadingRoute,setLoadingRoute]=useState(false);

  const CITIES={
    "Guadalajara":    [20.6597,-103.3496],
    "Monterrey":      [25.6866,-100.3161],
    "Ciudad de México":[19.4326,-99.1332],
    "Tijuana":        [32.5149,-117.0382],
    "Cancún":         [21.1619,-86.8515],
    "Colima":         [19.2452,-103.7241],
    "Manzanillo":     [19.0513,-104.3154],
    "León":           [21.1221,-101.6824],
    "Torreón":        [25.5428,-103.4068],
    "Chihuahua":      [28.6353,-106.0889],
    "Hermosillo":     [29.0729,-110.9559],
    "Culiacán":       [24.7994,-107.3879],
    "Veracruz":       [19.1738,-96.1342],
    "Oaxaca":         [17.0732,-96.7266],
    "Acapulco":       [16.8531,-99.8237],
    "Mérida":         [20.9674,-89.5926],
    "Puebla":         [19.0414,-98.2063],
  };
  const DISTS={
    "Guadalajara|Monterrey":890,"Monterrey|Guadalajara":890,
    "Ciudad de México|Cancún":1620,"Cancún|Ciudad de México":1620,
    "Colima|Tijuana":2350,"Tijuana|Colima":2350,
    "Manzanillo|Ciudad de México":720,"Ciudad de México|Manzanillo":720,
    "Guadalajara|Ciudad de México":540,"Ciudad de México|Guadalajara":540,
    "Monterrey|Ciudad de México":940,"Ciudad de México|Monterrey":940,
    "Guadalajara|León":120,"León|Guadalajara":120,
    "Guadalajara|Colima":180,"Colima|Guadalajara":180,
  };
  const distKm=DISTS[`${from}|${to}`]||DISTS[`${to}|${from}`]||600;
  const rFuel=Math.round(distKm/parseFloat(eff||4));
  const rHrs=Math.round(distKm/75);
  const activeTrips=trips.filter(t=>["en curso","programado"].includes(t.status));
  const cityList=Object.keys(CITIES);

  const STATUS_COLORS={"en curso":"#1447E6","programado":"#5C2BBD","finalizado":"#0A7C4B","cancelado":"#C0152E"};

  // Initialize Leaflet map
  useEffect(()=>{
    if(!mapRef.current||leafletMapRef.current)return;
    if(!window.L){
      // Load Leaflet dynamically
      const cssLink=document.createElement('link');
      cssLink.rel='stylesheet';
      cssLink.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(cssLink);
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      script.onload=()=>initMap();
      document.head.appendChild(script);
    } else {
      initMap();
    }
  },[]);

  function initMap(){
    if(!mapRef.current||leafletMapRef.current)return;
    const L=window.L;
    const map=L.map(mapRef.current,{zoomControl:true,scrollWheelZoom:true}).setView([23.5,-102],6);
    // Use Stadia Alidade Smooth Dark for clear road visibility
    L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom:18,
    }).addTo(map);
    leafletMapRef.current=map;
    setMapReady(true);
  }

  // Draw trips on map
  useEffect(()=>{
    if(!mapReady||!window.L)return;
    const L=window.L;
    const map=leafletMapRef.current;
    // Clear old layers
    routeLinesRef.current.forEach(l=>map.removeLayer(l));
    markersRef.current.forEach(m=>map.removeLayer(m));
    routeLinesRef.current=[];
    markersRef.current=[];

    // Draw city markers
    Object.entries(CITIES).forEach(([name,coords])=>{
      const hasTrip=trips.some(t=>t.origin===name||t.destination===name);
      if(!hasTrip)return;
      const icon=L.divIcon({
        html:`<div style="width:14px;height:14px;background:#1447E6;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
        className:'',iconAnchor:[6,6]
      });
      const marker=L.marker(coords,{icon}).addTo(map);
      marker.bindPopup(`<b>${name}</b>`);
      markersRef.current.push(marker);
    });

    // Draw trip lines
    trips.forEach(trip=>{
      const o=CITIES[trip.origin],d=CITIES[trip.destination];
      if(!o||!d)return;
      const color=STATUS_COLORS[trip.status]||'#94A3B8';
      const line=L.polyline([o,d],{
        color,weight:trip.status==="en curso"?5:3,
        opacity:0.9,dashArray:trip.status==="programado"?"10,6":null
      }).addTo(map);
      const drv=drivers.find(dr=>dr.id===trip.driver);
      const unit=units.find(u=>u.id===trip.unit);
      line.bindPopup(`
        <div style="font-family:IBM Plex Sans,sans-serif;min-width:180px">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${trip.origin} → ${trip.destination}</div>
          <div style="font-size:12px;color:#6B7A90;margin-bottom:2px">${unit?.plates||''} · ${drv?drv.name.split(' ').slice(0,2).join(' '):''}</div>
          <div style="font-size:12px;margin-bottom:2px"><b>Carga:</b> ${trip.cargoType}</div>
          <div style="font-size:12px;margin-bottom:2px"><b>Distancia:</b> ${trip.km?.toLocaleString('es-MX')} km</div>
          <div style="display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;background:${color}22;color:${color};border:1px solid ${color}44">${trip.status}</div>
        </div>
      `);
      routeLinesRef.current.push(line);
      // Truck emoji for active trips
      if(trip.status==="en curso"){
        const mid=[(o[0]+d[0])/2,(o[1]+d[1])/2];
        const truckIcon=L.divIcon({html:'<div style="font-size:18px;line-height:1">🚛</div>',className:'',iconAnchor:[9,9]});
        const truck=L.marker(mid,{icon:truckIcon}).addTo(map);
        markersRef.current.push(truck);
      }
    });
  },[mapReady,trips]);

  // Pan map when a trip is selected
  useEffect(()=>{
    if(!selTrip||!mapReady||!window.L)return;
    const o=CITIES[selTrip.origin],d=CITIES[selTrip.destination];
    if(!o||!d)return;
    const L=window.L;
    leafletMapRef.current.fitBounds(L.latLngBounds([o,d]),{padding:[40,40]});
  },[selTrip,mapReady]);

  // Pan to route when from/to changes
  useEffect(()=>{
    if(!mapReady||!window.L)return;
    const o=CITIES[from],d=CITIES[to];
    if(!o||!d)return;
    const L=window.L;
    leafletMapRef.current.fitBounds(L.latLngBounds([o,d]),{padding:[60,60]});
  },[from,to,mapReady]);

  function openInGoogleMaps(){
    window.open(`https://www.google.com/maps/dir/${encodeURIComponent(CITIES[from]?.join(','))}/${encodeURIComponent(CITIES[to]?.join(','))}/?travelmode=driving`,'_blank');
  }
  function openTripInMaps(trip){
    const o=CITIES[trip.origin],d=CITIES[trip.destination];
    if(o&&d)window.open(`https://www.google.com/maps/dir/${o.join(',')}/${d.join(',')}/?travelmode=driving`,'_blank');
  }

  return h('div',{style:{display:"flex",flexDirection:"column",gap:14,animation:"fadeUp .25s ease"}},

    // Calculadora
    h('div',{style:{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,padding:"16px 20px"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}},
        h('div',{style:{fontSize:13,fontWeight:700,color:C.text}},"📍 Planificador de Ruta"),
        h('button',{onClick:openInGoogleMaps,style:{padding:"7px 14px",fontSize:12.5,fontWeight:600,borderRadius:6,cursor:"pointer",border:`1px solid ${C.primary}`,background:C.primaryLt,color:C.primary,display:"flex",alignItems:"center",gap:6}},
          "↗ Abrir en Google Maps"
        )
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr":isTablet?"1fr 1fr":"1fr 1fr 130px",gap:12,marginBottom:14}},
        h('div',null,
          h('label',{style:{display:"block",fontSize:11.5,fontWeight:600,color:C.textMid,marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}},"Origen"),
          h('select',{value:from,onChange:e=>setFrom(e.target.value),className:"inp",style:{appearance:"none"}},
            cityList.map(c=>h('option',{key:c,value:c},c))
          )
        ),
        h('div',null,
          h('label',{style:{display:"block",fontSize:11.5,fontWeight:600,color:C.textMid,marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}},"Destino"),
          h('select',{value:to,onChange:e=>setTo(e.target.value),className:"inp",style:{appearance:"none"}},
            cityList.map(c=>h('option',{key:c,value:c},c))
          )
        ),
        h('div',null,
          h('label',{style:{display:"block",fontSize:11.5,fontWeight:600,color:C.textMid,marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}},"km/L"),
          h('input',{type:"number",value:eff,onChange:e=>setEff(e.target.value),className:"inp",step:"0.1",min:"1"})
        )
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"1fr 1fr":"repeat(4,1fr)",gap:10}},
        [["🛣️ Distancia",`${distKm.toLocaleString("es-MX")} km`,C.primary],
         ["⏱️ Tiempo",`~${rHrs} hrs`,C.info],
         ["⛽ Combustible",`${rFuel.toLocaleString("es-MX")} L`,C.warning],
         ["💰 Costo est.",new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(rFuel*21),C.success]
        ].map(([l,v,col])=>
          h('div',{key:l,style:{background:col+"0A",border:`1px solid ${col}25`,borderRadius:7,padding:"10px 12px"}},
            h('div',{style:{fontSize:11,color:C.textMid,marginBottom:3}},l),
            h('div',{style:{fontSize:16,fontWeight:700,color:col}},v)
          )
        )
      )
    ),

    // Mapa + sidebar
    h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 280px",gap:14,alignItems:"start"}},

      h('div',{style:{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}},
        h('div',{style:{padding:"11px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Mapa de Operaciones"),
          h('div',{style:{display:"flex",gap:10,flexWrap:"wrap"}},
            [["en curso","#1447E6"],["programado","#5C2BBD"],["finalizado","#0A7C4B"],["cancelado","#C0152E"]].map(([s,col])=>
              h('div',{key:s,style:{display:"flex",alignItems:"center",gap:4,fontSize:11.5,color:C.textMid}},
                h('div',{style:{width:18,height:3,background:col,borderRadius:2}}),
                h('span',null,ST[s]?.label||s)
              )
            )
          )
        ),
        h('div',{ref:mapRef,style:{width:"100%",height:420,background:"#e8ecef"}}),
        !mapReady&&h('div',{style:{position:"relative",marginTop:-420,height:420,display:"flex",alignItems:"center",justifyContent:"center",background:"#f7f9fc",zIndex:10}},
          h('div',{style:{textAlign:"center",color:C.textLight}},
            h('div',{style:{fontSize:28,marginBottom:8}},"🗺️"),
            h('div',{style:{fontSize:13}},"Cargando mapa...")
          )
        )
      ),

      h('div',{style:{background:"#fff",border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}},
        h('div',{style:{padding:"11px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Viajes Activos"),
          h('span',{style:{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:10,padding:"1px 8px",fontSize:12,color:C.textMid}},activeTrips.length)
        ),
        h('div',{style:{padding:"8px 10px",maxHeight:isTablet?260:400,overflowY:"auto"}},
          activeTrips.length===0&&h('div',{style:{textAlign:"center",padding:"24px 0",color:C.textLight,fontSize:13}},"Sin viajes activos"),
          activeTrips.map(trip=>{
            const drv=drivers.find(d=>d.id===trip.driver);
            const unit=units.find(u=>u.id===trip.unit);
            const isSel=selTrip?.id===trip.id;
            const col=STATUS_COLORS[trip.status]||C.textLight;
            return h('div',{key:trip.id,
              style:{padding:"10px 11px",background:isSel?"#EBF1FF":C.surfaceAlt,border:`1px solid ${isSel?"#93BFFC":C.border}`,borderRadius:7,marginBottom:6,cursor:"pointer",transition:"all .15s"},
              onClick:()=>{setSelTrip(isSel?null:trip);if(!isSel){setFrom(trip.origin);setTo(trip.destination);}}},
              h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                h('span',{style:{fontSize:11.5,fontWeight:700,color:C.textMid,fontFamily:"monospace"}},trip.id),
                h(Badge,{status:trip.status})

// ── Simulated live telemetry data ────────────────────────────────────────────
function useSimTelemetry(units){
  const [data,setData]=useState(()=>units.map(u=>({
    unitId:u.id,plates:u.plates,model:u.model,
    lat:20.6+Math.random()*4, lng:-103.3+Math.random()*4,
    speed:u.status==="en ruta"?Math.floor(60+Math.random()*40):0,
    rpm:u.status==="en ruta"?Math.floor(1400+Math.random()*600):u.status==="mantenimiento"?0:800,
    engineTemp:u.status==="mantenimiento"?98:Math.floor(82+Math.random()*12),
    oilPressure:Math.floor(45+Math.random()*20),
    fuelLevel:Math.floor(30+Math.random()*60),
    fuelLiters:Math.floor((30+Math.random()*60)*3.2),
    fuelCapacity:320,
    engineOn:u.status!=="disponible",
    odometer:u.km+Math.floor(Math.random()*50),
    engineHours:Math.floor(u.km/65),
    lastUpdate:new Date().toLocaleTimeString("es-MX"),
    alerts:[],
    histSpeed:[...Array(20)].map((_,i)=>u.status==="en ruta"?Math.floor(55+Math.random()*50):Math.floor(Math.random()*10)),
    histFuel:[...Array(20)].map((_,i)=>Math.floor(30+Math.random()*60)),
    histRpm:[...Array(20)].map((_,i)=>u.status==="en ruta"?Math.floor(1300+Math.random()*700):Math.floor(700+Math.random()*200)),
    route:[
      [20.66,-103.35],[20.68,-103.25],[20.72,-103.10],[20.76,-102.95],
      [20.82,-102.75],[20.90,-102.50],[21.10,-102.20],[21.30,-101.90],
    ],
    routeIdx:Math.floor(Math.random()*6),
    status:u.status,
  })));

  useEffect(()=>{
    const iv=setInterval(()=>{
      setData(prev=>prev.map(d=>{
        if(!d.engineOn) return {...d,lastUpdate:new Date().toLocaleTimeString("es-MX")};
        const newSpeed=d.status==="en ruta"?Math.max(0,Math.min(110,d.speed+(Math.random()-0.48)*8)):0;
        const newRpm=d.status==="en ruta"?Math.max(800,Math.min(2400,d.rpm+(Math.random()-0.48)*80)):820;
        const newTemp=Math.max(75,Math.min(105,d.engineTemp+(Math.random()-0.48)*0.8));
        const newFuel=Math.max(5,d.fuelLevel-(d.status==="en ruta"?Math.random()*0.15:0.01));
        const newFuelL=Math.round(newFuel*d.fuelCapacity/100);
        const newIdx=(d.routeIdx+( d.status==="en ruta"&&Math.random()>0.7?1:0))%(d.route.length);
        const alerts=[];
        if(newTemp>100) alerts.push({t:"danger",m:"⚠ Temperatura motor alta: "+newTemp.toFixed(0)+"°C"});
        if(newFuel<15) alerts.push({t:"danger",m:"⛽ Nivel bajo de combustible: "+newFuel.toFixed(0)+"%"});
        if(newSpeed>100) alerts.push({t:"warn",m:"🚨 Exceso de velocidad: "+newSpeed.toFixed(0)+" km/h"});
        if(d.oilPressure<40) alerts.push({t:"warn",m:"🔧 Presión de aceite baja"});
        return{...d,
          speed:Math.round(newSpeed),rpm:Math.round(newRpm),
          engineTemp:+newTemp.toFixed(1),fuelLevel:+newFuel.toFixed(1),
          fuelLiters:newFuelL,routeIdx:newIdx,
          lat:d.route[newIdx][0]+( Math.random()-0.5)*0.002,
          lng:d.route[newIdx][1]+(Math.random()-0.5)*0.002,
          histSpeed:[...d.histSpeed.slice(1),Math.round(newSpeed)],
          histFuel:[...d.histFuel.slice(1),Math.round(newFuel)],
          histRpm:[...d.histRpm.slice(1),Math.round(newRpm)],
          alerts,lastUpdate:new Date().toLocaleTimeString("es-MX"),
          odometer:d.odometer+(d.status==="en ruta"?+(newSpeed/3600).toFixed(4):0),
        };
      }));
    },1800);
    return()=>clearInterval(iv);
  },[]);
  return data;
}

// Mini sparkline SVG
function Spark({data,color,height=32,width=80}){
  if(!data||data.length<2) return null;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1)*width).toFixed(1)},${(height-(v-min)/range*height).toFixed(1)}`).join(" ");
  const area=`M${pts.split(" ")[0]} L${pts.split(" ").slice(1).join(" L")} L${width},${height} L0,${height} Z`;
  return h('svg',{viewBox:`0 0 ${width} ${height}`,style:{width,height,display:"block"}},
    h('path',{d:area,fill:color+"22"}),
    h('polyline',{points:pts,fill:"none",stroke:color,strokeWidth:1.5,strokeLinejoin:"round"})
  );
}

// Gauge arc SVG
function Gauge({value,max,color,size=80,label,unit}){
  const pct=Math.min(value/max,1);
  const r=32,cx=40,cy=44;
  const startAngle=-210, sweepAngle=240;
  const toRad=d=>d*Math.PI/180;
  const arcX=(a,rad)=>cx+rad*Math.cos(toRad(a));
  const arcY=(a,rad)=>cy+rad*Math.sin(toRad(a));
  const endAngle=startAngle+sweepAngle*pct;
  const largeArc=sweepAngle*pct>180?1:0;
  const bgPath=`M${arcX(startAngle,r)},${arcY(startAngle,r)} A${r},${r} 0 1,1 ${arcX(startAngle+sweepAngle,r)},${arcY(startAngle+sweepAngle,r)}`;
  const fgPath=pct>0?`M${arcX(startAngle,r)},${arcY(startAngle,r)} A${r},${r} 0 ${largeArc},1 ${arcX(endAngle,r)},${arcY(endAngle,r)}`:"";
  return h('div',{style:{textAlign:"center"}},
    h('svg',{viewBox:"0 0 80 60",style:{width:size,height:size*0.75,display:"block",margin:"0 auto"}},
      h('path',{d:bgPath,fill:"none",stroke:C.borderLt,strokeWidth:6,strokeLinecap:"round"}),
      fgPath&&h('path',{d:fgPath,fill:"none",stroke:color,strokeWidth:6,strokeLinecap:"round"}),
      h('text',{x:cx,y:cy-2,textAnchor:"middle",fontSize:13,fontWeight:"700",fill:color,fontFamily:"IBM Plex Mono,monospace"},value),
      h('text',{x:cx,y:cy+10,textAnchor:"middle",fontSize:7,fill:C.textLight,fontFamily:"IBM Plex Sans,sans-serif"},unit)
    ),
    h('div',{style:{fontSize:10.5,color:C.textLight,marginTop:-4}},label)
  );
}

          {l:"Próx. Cambio Aceite",v:`${Math.max(0,5000-selData.engineHours%5000)} hrs`,c:C.purple,i:"🛢️"},
        ].map(({l,v,c,i})=>
          h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"12px 14px"}},
            h('div',{style:{fontSize:18,marginBottom:6}},i),

            h('div',{style:{fontSize:15,fontWeight:700,color:c}},v)
          )
        )
      )
    )
  );
}

// ── SENSOR DE COMBUSTIBLE ────────────────────────────────────────────────────
function ModFuelSensor({units,drivers,fuel}){
  const {isMobile,isTablet}=useBP();
  const tel=useSimTelemetry(units);
  const [sel,setSel]=useState(null);
  const selData=sel?tel.find(t=>t.unitId===sel):null;

  // Detect anomalies: sudden fuel drops
  const anomalies=tel.map(d=>{
    const drops=d.histFuel.reduce((acc,v,i)=>{
      if(i>0&&d.histFuel[i-1]-v>8) acc.push({idx:i,drop:(d.histFuel[i-1]-v).toFixed(1)});
      return acc;
    },[]);
    return{...d,drops};
  }).filter(d=>d.drops.length>0);

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:14}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}},
      h('div',null,
        h('div',{style:{fontSize:16,fontWeight:700,color:C.text}},"⛽ Sensor de Nivel de Combustible"),
        h('div',{style:{fontSize:12.5,color:C.textLight}},"Monitoreo en tiempo real · Detección de fugas y robo")
      )
    ),

    // Fleet overview cards
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:12}},
      tel.map(d=>{
        const pct=d.fuelLevel;
        const color=pct<15?C.danger:pct<30?C.warning:C.success;
        const drv=null; // operador asignado por viaje
        return h('div',{key:d.unitId,onClick:()=>setSel(sel===d.unitId?null:d.unitId),
          style:{background:C.surface,border:`1.5px solid ${sel===d.unitId?C.primary:C.border}`,
            borderRadius:8,padding:"14px 16px",cursor:"pointer",transition:"all .15s"}},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
            h('div',null,
              h('div',{style:{fontSize:14,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},d.plates),
              h('div',{style:{fontSize:11.5,color:C.textLight}},d.model.split(" ").slice(0,2).join(" "))
            ),
            h('div',{style:{textAlign:"right"}},
              h('div',{style:{fontSize:20,fontWeight:800,color}}),
              h('div',{style:{fontSize:22,fontWeight:800,color,lineHeight:1}},pct.toFixed(0)+"%"),
              h('div',{style:{fontSize:10.5,color:C.textLight}},`${d.fuelLiters}/${d.fuelCapacity} L`)
            )
          ),
          // Tank bar
          h('div',{style:{height:10,background:C.borderLt,borderRadius:5,overflow:"hidden",marginBottom:8}},
            h('div',{style:{height:"100%",width:`${pct}%`,
              background:pct<15?`linear-gradient(90deg,${C.danger},#ff6b6b)`:pct<30?`linear-gradient(90deg,${C.warning},#fbbf24)`:`linear-gradient(90deg,${C.success},#34d399)`,
              borderRadius:5,transition:"width .5s"}})
          ),
          h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11.5}},
            h('span',{style:{color:C.textLight}},"Capacidad: ",d.fuelCapacity," L"),
            h('span',{style:{color,fontWeight:600}},
              pct<15?"⚠ BAJO":pct<30?"⚡ Pronto cargar":"✓ Normal")
          ),
          drv&&h('div',{style:{fontSize:11,color:C.textLight,marginTop:6,paddingTop:6,borderTop:`1px solid ${C.borderLt}`}},
            "👤 ",drv.name.split(" ").slice(0,2).join(" ")
          )
        );
      })
    ),

    // Selected unit detail
    selData&&h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"2fr 1fr",gap:14}},
      h(ChartPanel,{title:`Historial de Nivel — ${selData.plates}`,sub:"Últimas 20 lecturas en tiempo real",
        legend:[{label:"Nivel %",color:selData.fuelLevel<15?C.danger:selData.fuelLevel<30?C.warning:C.success}]},
        h(LineChart,{
          data:selData.histFuel.map((v,i)=>({label:String(i),value:v})),
          color:selData.fuelLevel<15?C.danger:selData.fuelLevel<30?C.warning:C.success,
          height:160,formatY:v=>v+"%"})
      ),
      h(ChartPanel,{title:"Estadísticas del Tanque",sub:selData.plates},
        h('div',{style:{display:"flex",flexDirection:"column",gap:10,paddingTop:4}},
          [
            {l:"Nivel actual",v:`${selData.fuelLevel.toFixed(1)}%`,c:selData.fuelLevel<15?C.danger:C.success},
            {l:"Litros disponibles",v:`${selData.fuelLiters} L`,c:C.primary},
            {l:"Capacidad total",v:`${selData.fuelCapacity} L`,c:C.textMid},
            {l:"Consumo estimado/hr",v:selData.status==="en ruta"?"~38 L/hr":"~2 L/hr",c:C.warning},
            {l:"Autonomía aprox.",v:selData.status==="en ruta"
              ?`${Math.round(selData.fuelLiters/38)} hrs`
              :`${Math.round(selData.fuelLiters/38*65)} km`,c:C.info},
          ].map(({l,v,c})=>
            h('div',{key:l,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",
              borderBottom:`1px solid ${C.borderLt}`,fontSize:13}},
              h('span',{style:{color:C.textMid}},l),
              h('span',{style:{fontWeight:700,color:c}},v)
            )
          )
        )
      )
    ),

    // Anomaly detection
    h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}},
      h('div',{style:{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"🔍 Detección de Anomalías"),
        h('span',{style:{background:anomalies.length>0?C.dangerBg:C.successBg,
          border:`1px solid ${anomalies.length>0?C.dangerBd:C.successBd}`,
          borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:600,
          color:anomalies.length>0?C.danger:C.success}},
          anomalies.length>0?`${anomalies.length} alertas`:"Sin anomalías")
      ),
      h('div',{style:{padding:"14px 16px"}},
        anomalies.length===0
          ?h('div',{style:{textAlign:"center",padding:"16px 0",color:C.textLight,fontSize:13}},"✓ Sin caídas bruscas de combustible detectadas")
          :anomalies.map(d=>
            h('div',{key:d.unitId,style:{padding:"10px 14px",background:C.dangerBg,border:`1px solid ${C.dangerBd}`,
              borderRadius:7,marginBottom:8,display:"flex",gap:12,alignItems:"center"}},
              h('div',{style:{fontSize:20}},"🚨"),
              h('div',{style:{flex:1}},
                h('div',{style:{fontSize:13,fontWeight:700,color:C.danger}},d.plates," — Caída brusca detectada"),
                h('div',{style:{fontSize:12,color:C.danger,marginTop:2}},
                  `Bajó ${d.drops[0]?.drop}% en una sola lectura — posible fuga o robo de combustible`)
              ),
              h('div',{style:{fontSize:11.5,color:C.textLight}},d.lastUpdate)
            )
          )
      )
    ),

    // Fleet summary
    h(ChartPanel,{title:"Nivel de Combustible por Tráiler",sub:"Estado actual de toda la flota",
      legend:[{label:"Nivel %",color:C.primary}]},
      h(BarChart,{
        data:tel.map(d=>({label:d.plates,value:Math.round(d.fuelLevel),
          color:d.fuelLevel<15?C.danger:d.fuelLevel<30?C.warning:C.success})),
        color:C.primary,height:160,formatY:v=>v+"%"})
    )
  );
}


// ── RENTABILIDAD POR TRÁILER ──────────────────────────────────────────────────
function Rentabilidad({units,trips,fuel,maint,drivers}){
  const {isMobile,isTablet}=useBP();
  const [period,setPeriod]=useState("all"); // all | month
  const [selMonth,setSelMonth]=useState("");
  const [editTrip,setEditTrip]=useState(null); // trip id to edit revenue/fees
  const [editForm,setEditForm]=useState({revenue:"",driverFee:"",fines:""});

  // All months available
  const allMonths=[...new Set(trips.map(t=>t.month||t.departDate?.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!selMonth&&allMonths.length) setTimeout(()=>setSelMonth(allMonths[0]),0);

  // Filter trips by period
  const filteredTrips=period==="all"?trips
    :trips.filter(t=>(t.month||t.departDate?.slice(0,7))===selMonth);

  // Per-unit P&L
  const UNIT_COLORS=[C.primary,C.success,C.warning,C.purple];
  const unitPL=units.map((u,i)=>{
    const uTrips=filteredTrips.filter(t=>t.unit===u.id&&t.status==="finalizado");
    const uFuel=period==="all"?fuel.filter(f=>f.unit===u.id)
      :fuel.filter(f=>f.unit===u.id&&(f.month||"")===selMonth);
    const uMaint=maint.filter(m=>m.unit===u.id&&m.status==="completado");

    const revenue=uTrips.reduce((a,b)=>a+(b.revenue||0),0);
    const fuelCost=uFuel.reduce((a,b)=>a+b.cost,0);
    const maintCost=period==="all"?uMaint.reduce((a,b)=>a+(b.cost||0),0)
      :uMaint.filter(m=>m.date?.slice(0,7)===selMonth).reduce((a,b)=>a+(b.cost||0),0);
    const driverFees=uTrips.reduce((a,b)=>a+(b.driverFee||0),0);
    const fines=uTrips.reduce((a,b)=>a+(b.fines||0),0);
    const totalCosts=fuelCost+maintCost+driverFees+fines;
    const profit=revenue-totalCosts;
    const margin=revenue>0?Math.round((profit/revenue)*100):0;
    const color=UNIT_COLORS[i%UNIT_COLORS.length];
    return{unit:u,revenue,fuelCost,maintCost,driverFees,fines,totalCosts,profit,margin,
      trips:uTrips.length,color,
      roi:totalCosts>0?Math.round((profit/totalCosts)*100):0};
  });

  const totals={
    revenue:unitPL.reduce((a,b)=>a+b.revenue,0),
    fuelCost:unitPL.reduce((a,b)=>a+b.fuelCost,0),
    maintCost:unitPL.reduce((a,b)=>a+b.maintCost,0),
    driverFees:unitPL.reduce((a,b)=>a+b.driverFees,0),
    fines:unitPL.reduce((a,b)=>a+b.fines,0),
    totalCosts:unitPL.reduce((a,b)=>a+b.totalCosts,0),
    profit:unitPL.reduce((a,b)=>a+b.profit,0),
  };
  const totalMargin=totals.revenue>0?Math.round((totals.profit/totals.revenue)*100):0;

  // Chart data
  const plBarData=unitPL.map(u=>({label:u.unit.plates,value:u.revenue,value2:u.totalCosts}));
  const profitBar=unitPL.map(u=>({label:u.unit.plates,value:Math.max(u.profit,0),
    color:u.profit>=0?C.success:C.danger}));
  const costBreakBar=unitPL.map(u=>({label:u.unit.plates,value:u.fuelCost,value2:u.maintCost}));

  // Trip list for selected unit
  const [selUnit,setSelUnit]=useState(null);
  const selUnitTrips=selUnit
    ?filteredTrips.filter(t=>t.unit===selUnit&&t.status==="finalizado")
    :[];

  function saveEditTrip(){
    // update trip in parent via local ref — need setTrips but we don't have it here
    // We'll mark it visually; in real app this would call setTrips
    setEditTrip(null);
  }

  return h('div',{style:{animation:"fadeUp .25s ease",display:"flex",flexDirection:"column",gap:16}},

    // ── Header ────────────────────────────────────────────────────────────
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}},
      h('div',null,
        h('div',{style:{fontSize:16,fontWeight:800,color:C.text,letterSpacing:"-.01em"}},"💹 Rentabilidad por Tráiler"),
        h('div',{style:{fontSize:12.5,color:C.textLight,marginTop:2}},
          "Ingresos, costos reales y ganancia neta por unidad")
      ),
      h('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
        [{v:"all",l:"Todo el período"},{v:"month",l:"Por mes"}].map(({v,l})=>
          h('button',{key:v,onClick:()=>setPeriod(v),
            style:{padding:"7px 14px",fontSize:12.5,fontWeight:600,borderRadius:7,cursor:"pointer",
              border:`1px solid ${period===v?C.primary:C.border}`,
              background:period===v?C.primaryLt:C.surface,
              color:period===v?C.primary:C.textMid}},l)
        ),
        period==="month"&&h('select',{value:selMonth,onChange:e=>setSelMonth(e.target.value),
          className:"inp",style:{padding:"6px 10px",fontSize:12.5,width:"auto",minWidth:120}},
          allMonths.map(m=>{
            const[y,mo]=m.split("-");
            const MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            return h('option',{key:m,value:m},MN[+mo-1]+" "+y);
          })
        )
      )
    ),

    // ── Global KPIs ───────────────────────────────────────────────────────
    h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:12}},
      [
        {l:"💰 Ingresos Totales",v:fmtM(totals.revenue),c:C.success,
          sub:`${filteredTrips.filter(t=>t.status==="finalizado").length} viajes finalizados`},
        {l:"📊 Costos Totales",v:fmtM(totals.totalCosts),c:C.danger,
          sub:`Comb+Mant+Oper+Multas`},
        {l:"💵 Ganancia Neta",v:fmtM(totals.profit),
          c:totals.profit>=0?C.success:C.danger,
          sub:`Margen: ${totalMargin}%`},
        {l:"📈 ROI Flota",v:`${totals.totalCosts>0?Math.round((totals.profit/totals.totalCosts)*100):0}%`,
          c:totals.profit>=0?C.primary:C.danger,
          sub:"Retorno sobre inversión"},
      ].map(({l,v,c,sub})=>
        h('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}},
          h('div',{style:{fontSize:11,color:C.textLight,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}},l),
          h('div',{style:{fontSize:22,fontWeight:800,color:c,letterSpacing:"-.02em",marginBottom:3}},v),
          h('div',{style:{fontSize:11.5,color:C.textLight}},sub)
        )
      )
    ),

    // ── Cost breakdown pills ──────────────────────────────────────────────
    h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 18px"}},
      h('div',{style:{fontSize:12.5,fontWeight:700,color:C.text,marginBottom:12}},"Desglose de Costos — Flota Completa"),
      h('div',{style:{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}},
        [
          {l:"⛽ Combustible",v:totals.fuelCost,c:C.warning,pct:totals.totalCosts?Math.round(totals.fuelCost/totals.totalCosts*100):0},
          {l:"🔧 Mantenimiento",v:totals.maintCost,c:C.purple,pct:totals.totalCosts?Math.round(totals.maintCost/totals.totalCosts*100):0},
          {l:"👤 Operadores",v:totals.driverFees,c:C.primary,pct:totals.totalCosts?Math.round(totals.driverFees/totals.totalCosts*100):0},
          {l:"🚨 Multas",v:totals.fines,c:C.danger,pct:totals.totalCosts?Math.round(totals.fines/totals.totalCosts*100):0},
        ].map(({l,v,c,pct})=>
          h('div',{key:l,style:{background:C.surfaceAlt,border:`1px solid ${C.border}`,

            h('div',{style:{fontSize:11.5,color:C.textLight,marginBottom:3}},l),
            h('div',{style:{fontSize:16,fontWeight:700,color:c}},fmtM(v)),
            h('div',{style:{height:3,background:C.borderLt,borderRadius:2,overflow:"hidden",marginTop:6}},

            ),
            h('div',{style:{fontSize:10.5,color:C.textLight,marginTop:3}},`${pct}% del costo`)

    ),

    // ── Charts row ────────────────────────────────────────────────────────
    h('div',{style:{display:"grid",gridTemplateColumns:isTablet?"1fr":"1fr 1fr",gap:14}},
      h(ChartPanel,{title:"Ingresos vs Costos por Tráiler",sub:"Comparativa directa",
        legend:[{label:"Ingresos",color:C.success},{label:"Costos",color:C.danger}]},
        h(BarChart,{data:plBarData,color:C.success,color2:C.danger,height:200,
          formatY:v=>v>=1000?`$${(v/1000).toFixed(0)}k`:`$${v}`})
      ),
      h(ChartPanel,{title:"Ganancia Neta por Tráiler",sub:"Verde = rentable, rojo = pérdida",
        legend:[{label:"Ganancia neta MXN",color:C.success}]},
        h(BarChart,{data:profitBar,color:C.success,height:200,

    h(ChartPanel,{title:"Combustible vs Mantenimiento por Tráiler",sub:"Los dos costos más controlables",

    h('div',{style:{fontSize:13,fontWeight:700,color:C.text,marginBottom:2}},"Detalle por Unidad"),
    h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}},

        h('div',{key:u.unit.id,

// ── CIERRE DE MES ────────────────────────────────────────────────────────────
function Cierre({trips,fuel,units,drivers}){
  const {isMobile,isTablet}=useBP();
  const MONTHS=useMemo(()=>{
    const ms=new Set();
    trips.forEach(t=>t.departDate&&ms.add(t.departDate.slice(0,7)));
    fuel.forEach(f=>f.month&&ms.add(f.month));
    return [...ms].sort().reverse();
  },[trips,fuel]);
  const [sel,setSel]=useState(MONTHS[0]||"2025-01");
  const [tab,setTab]=useState("resumen");
  const [closed,setClosed]=useState([]);
  const mLbl=m=>{const[y,mo]=m.split("-");return`${MONTHS_ES[+mo-1]} ${y}`;};
  const mTrips=trips.filter(t=>t.departDate?.slice(0,7)===sel);
  const mFuel=fuel.filter(f=>f.month===sel);
  const isClosed=closed.includes(sel);

  const uSum=units.map(u=>{
    const uT=mTrips.filter(t=>t.unit===u.id);
    const uF=mFuel.filter(f=>f.unit===u.id);
    return{unit:u,driver:drivers.find(d=>d.assignedUnit===u.id),
      tripCount:uT.filter(t=>t.status==="finalizado").length,
      km:uT.reduce((a,b)=>a+(b.km||0),0),
      fuelL:uF.reduce((a,b)=>a+b.liters,0),
      fuelCost:uF.reduce((a,b)=>a+b.cost,0),
      fuelCnt:uF.length
    };
  }).filter(s=>s.tripCount>0||s.fuelL>0);

  const tot={
    trips:mTrips.filter(t=>t.status==="finalizado").length,
    km:uSum.reduce((a,b)=>a+b.km,0),
    fuelL:uSum.reduce((a,b)=>a+b.fuelL,0),
    fuelCost:uSum.reduce((a,b)=>a+b.fuelCost,0),
    clients:new Set(mTrips.map(t=>t.client)).size,
  };

  return h('div',{style:{animation:"fadeUp .25s ease"}},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,gap:12,flexWrap:"wrap"}},
      h('div',{style:{display:"flex",alignItems:"center",gap:12}},
        h('div',{style:{width:40,height:40,background:isClosed?C.successBg:C.primaryLt,border:`1px solid ${isClosed?C.successBd:"#93BFFC"}`,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},isClosed?"✅":"📅"),
        h('div',null,
          h('div',{style:{fontSize:17,fontWeight:700,color:C.text}},"Cierre Mensual"),
          h('div',{style:{fontSize:13,color:C.textMid}},"Resumen por tracto: viajes y combustible")
        ),
        isClosed&&h('span',{style:{background:C.successBg,border:`1px solid ${C.successBd}`,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:600,color:C.success}},"✔ Mes cerrado")
      ),
      h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
        h('select',{value:sel,onChange:e=>setSel(e.target.value),className:"inp",style:{width:"auto",appearance:"none",fontWeight:600,fontSize:14,paddingRight:24}},
          MONTHS.map(m=>h('option',{key:m,value:m},mLbl(m)))
        ),
        !isClosed&&h('button',{onClick:()=>setClosed([...closed,sel]),className:"btn-p",style:{padding:"9px 16px",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:7}},
          h(Ic,{n:"check",s:13,c:"#fff"}),"Cerrar Mes"
        )
      )
    ),
    h('div',{style:{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"repeat(3,1fr)":"repeat(5,1fr)",gap:12,marginBottom:18}},
      h(KpiCard,{label:"Viajes",value:tot.trips,sub:"finalizados",icon:"🗺️",accent:C.primary}),
      h(KpiCard,{label:"Kilómetros",value:`${fmt(tot.km)} km`,sub:"recorridos",icon:"🚛",accent:C.info}),
      h(KpiCard,{label:"Litros",value:`${fmt(tot.fuelL)} L`,sub:"cargados",icon:"⛽",accent:C.warning}),
      h(KpiCard,{label:"Gasto Comb.",value:fmtM(tot.fuelCost),sub:"total del mes",icon:"💰",accent:C.danger}),
      h(KpiCard,{label:"Clientes",value:tot.clients,sub:"atendidos",icon:"👥",accent:C.success})
    ),
    h('div',{className:"tabscroll",style:{borderBottom:`1px solid ${C.border}`,marginBottom:18}},
      [{v:"resumen",l:"Resumen por Tracto"},{v:"viajes",l:"Viajes del Mes"},{v:"combustible",l:"Combustible"}].map(t=>
        h('button',{key:t.v,onClick:()=>setTab(t.v),className:`tab${tab===t.v?" on":""}` },t.l)
      )
    ),
    tab==="resumen"&&h('div',null,
      h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",marginBottom:16}},
        h('div',{style:{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt,display:"flex",justifyContent:"space-between"}},
          h('span',{style:{fontSize:13,fontWeight:700,color:C.text}},"Resumen Operativo — ",mLbl(sel)),
          isClosed&&h('span',{style:{fontSize:12,color:C.success,fontWeight:600}},"✔ Cierre registrado")
        ),
        uSum.length===0
          ?h('div',{style:{textAlign:"center",padding:"40px 0",color:C.textLight,fontSize:13}},"Sin registros para ",mLbl(sel))
          :h('div',{className:"tscroll"},
            h('table',{style:{width:"100%",borderCollapse:"collapse",minWidth:780}},
              h(THead,{cols:["Tracto","Modelo","Operador","Viajes","Km","Cargas","Litros","Gasto","$/L","Rend."]}),
              h('tbody',null,uSum.map((s,i)=>{
                const rend=s.fuelL>0&&s.km>0?(s.km/s.fuelL).toFixed(2):"—";
                const ppl=s.fuelL>0&&s.fuelCost>0?(s.fuelCost/s.fuelL).toFixed(2):"—";
                return h('tr',{key:s.unit.id,className:"row-hover",style:{borderBottom:i<uSum.length-1?`1px solid ${C.borderLt}`:"none"}},
                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},s.unit.plates),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,color:C.textMid}},s.unit.model),

                  h('td',{style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.primary,textAlign:"center"}},s.tripCount),
                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontFamily:"IBM Plex Mono,monospace",color:C.text}},fmt(s.km)," km"),
                  h('td',{style:{padding:"10px 14px",fontSize:13,color:C.info,textAlign:"center"}},s.fuelCnt),

                  h('td',{style:{padding:"10px 14px",fontSize:12.5,fontWeight:600,color:rend!=="—"&&+rend<3.8?C.danger:C.success}},rend!=="—"?`${rend} km/L`:"—")
                );
              })),
              h('tfoot',null,h('tr',{style:{background:C.surfaceAlt,borderTop:`2px solid ${C.border}`}},
                h('td',{colSpan:3,style:{padding:"10px 14px",fontSize:13,fontWeight:700,color:C.text}},"TOTALES"),
                h('td',{style:{padding:"10px 14px",fontSize:14,fontWeight:800,color:C.primary,textAlign:"center"}},tot.trips),

              ))
            )
          )
      ),
      uSum.length>0&&h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}},
        uSum.map(s=>{
          const pct=tot.fuelCost>0?Math.min(100,(s.fuelCost/tot.fuelCost)*100):0;
          const rend=s.fuelL>0&&s.km>0?(s.km/s.fuelL).toFixed(2):null;
          return h('div',{key:s.unit.id,className:"card",style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h('div',null,
                h('div',{style:{fontSize:14,fontWeight:700,color:C.text,fontFamily:"IBM Plex Mono,monospace"}},s.unit.plates),
                h('div',{style:{fontSize:12,color:C.textMid}},s.unit.model)
              ),
              h('div',{style:{textAlign:"right"}},
                h('div',{style:{fontSize:17,fontWeight:800,color:C.danger}},fmtM(s.fuelCost)),
                h('div',{style:{fontSize:11,color:C.textLight}},"combustible")
              )
            ),
            h('div',{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:10}},
              [["Viajes",s.tripCount,C.primary],["Litros",`${fmt(s.fuelL)}L`,C.warning],["Km",fmt(s.km),C.info]].map(([l,v,c])=>

      users.map((u,i)=>h('div',{key:i,className:"card",style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,marginBottom:7}},
        h('div',{style:{width:38,height:38,borderRadius:8,background:(RC[u.role]||C.primary)+"15",color:RC[u.role]||C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}},
          u.name.split(" ").filter((_,i)=>i>0).map(n=>n[0]).join("").slice(0,2)
        ),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:13.5,fontWeight:600,color:C.text}},u.name),
          h('div',{style:{fontSize:11.5,color:C.textLight}},u.email)
        ),
        h('div',{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}},
          h('span',{style:{background:(RC[u.role]||C.primary)+"15",color:RC[u.role]||C.primary,fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4}},u.role),
          h(Badge,{status:u.status})
        )
      )),
      h('div',{style:{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:7,padding:"14px 16px",marginTop:12}},
        h('div',{style:{fontSize:12,fontWeight:700,color:C.textMid,marginBottom:9,display:"flex",alignItems:"center",gap:6}},h(Ic,{n:"shield",s:13,c:C.primary}),"Matriz de Permisos"),
        h('div',{className:"tscroll"},
          h('table',{style:{width:"100%",borderCollapse:"collapse",fontSize:12.5}},
            h('thead',null,h('tr',null,
              h('th',{style:{textAlign:"left",padding:"5px 8px",color:C.textLight,fontWeight:600,borderBottom:`1px solid ${C.border}`}},"Módulo"),
              ...["Admin","Supervisor","Operador"].map(r=>h('th',{key:r,style:{padding:"5px 8px",color:C.textLight,fontWeight:600,textAlign:"center",borderBottom:`1px solid ${C.border}`}},r))
            )),
            h('tbody',null,
              [["Dashboard",1,1,1],["Unidades",1,1,0],["Operadores",1,1,1],["Viajes",1,1,1],["Combustible",1,0,1],["Mantenimiento",1,1,0],["Cierre de Mes",1,1,0],["Usuarios",1,0,0]].map(([m,a,s,o])=>
                h('tr',{key:m,style:{borderBottom:`1px solid ${C.borderLt}`}},
                  h('td',{style:{padding:"6px 8px",color:C.text,fontWeight:500}},m),
                  ...[a,s,o].map((v,i)=>h('td',{key:i,style:{padding:"6px 8px",textAlign:"center"}},v?h('span',{style:{color:C.success,fontWeight:700}},"✓"):h('span',{style:{color:C.borderLt}},"—")))
                )
              )
            )
          )
        )
      )
    ),
    h('div',null,
      h('div',{style:{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}},"Información del Sistema"),
      h('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,padding:"14px 16px"}},
        [["Versión","3.1.0"],["Módulos activos","9"],["Unidades registradas","4"],["Operadores","4"],["Modo","Demo"]].map(([l,v])=>
          h('div',{key:l,style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.borderLt}`,fontSize:13}},
            h('span',{style:{color:C.textMid}},l),h('span',{style:{color:C.text,fontWeight:600}},v)
          )
        )
      )
    )
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const {isMobile,isTablet}=useBP();
  const [session,setSession]=useState(null);
  const [active,setActive]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(false);
  const [units,setUnits]=useState(UNITS0);
  const [drivers,setDrivers]=useState(DRIVERS0);
  const [trips,setTrips]=useState(TRIPS0);
  const [fuel,setFuel]=useState(FUEL0);
  const [maint,setMaint]=useState(MAINT0);

  if(!session)return h(Login,{onLogin:s=>{setSession(s);setActive("dashboard");}});

  const {user,company}=session;
  const NAV=[
    {id:"dashboard",l:"Dashboard",e:"🗂️",g:"Operaciones"},
    {id:"units",l:"Flota",e:"🚛",g:"Operaciones"},
    {id:"drivers",l:"Operadores",e:"👤",g:"Operaciones"},
    {id:"trips",l:"Viajes",e:"🗺️",g:"Operaciones"},
    {id:"fuel",l:"Combustible",e:"⛽",g:"Administración"},
    {id:"maint",l:"Mantenimiento",e:"🔧",g:"Administración"},
    {id:"rentabilidad",l:"Rentabilidad",e:"💹",g:"Administración"},
    {id:"cierre",l:"Cierre de Mes",e:"📅",g:"Administración"},
    {id:"gps",l:"GPS & Movimiento",e:"📡",g:"Sensores"},
    {id:"motor",l:"Sensor Motor",e:"⚙️",g:"Sensores"},
    {id:"fuelSensor",l:"Nivel Combustible",e:"🔋",g:"Sensores"},
    {id:"map",l:"Mapa de Rutas",e:"📍",g:"Herramientas"},
    {id:"users",l:"Usuarios",e:"👥",g:"Sistema"},
  ];
  const GROUPS=[...new Set(NAV.map(n=>n.g))];
  const TITLES={dashboard:"Dashboard Operativo",units:"Gestión de Flota",drivers:"Operadores",trips:"Control de Viajes",fuel:"Control de Combustible",maint:"Mantenimiento",cierre:"Cierre de Mes",map:"Mapa de Rutas",users:"Usuarios y Seguridad"};
  const alerts=[
    ...units.filter(u=>days(u.docExpiry)<30),
    ...units.filter(u=>u.nextMaintKm-u.km<10000),
    ...drivers.filter(d=>days(d.licExpiry)<60),
  ];

  function nav(id){setActive(id);if(isTablet)setSideOpen(false);}

  return h('div',{style:{display:"flex",height:"100vh",overflow:"hidden"}},
    // Overlay
    isTablet&&sideOpen&&h('div',{className:"overlay",onClick:()=>setSideOpen(false)}),
    // Sidebar
    h('aside',{style:{width:220,background:C.sidebar,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden",
      position:isTablet?"fixed":"relative",top:0,left:0,bottom:0,zIndex:200,
      transform:isTablet&&!sideOpen?"translateX(-100%)":"translateX(0)",transition:"transform .25s ease",
      boxShadow:isTablet&&sideOpen?"4px 0 20px rgba(0,0,0,.3)":undefined}},
      h('div',{style:{padding:"18px 16px 14px",borderBottom:"1px solid rgba(255,255,255,.07)"}},
        h('div',{style:{display:"flex",alignItems:"center",gap:10}},
          h('div',{style:{width:34,height:34,background:C.primary,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}},h(Ic,{n:"truck",s:17,c:"#fff"})),
          h('div',null,
            h('div',{style:{fontSize:14.5,fontWeight:700,color:"#fff"}},"FleetOS"),
            h('div',{style:{fontSize:9.5,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".12em"}},"Fleet Management OS")
          )
        )
      ),
      h('div',{style:{margin:"10px 10px 6px",background:"rgba(20,71,230,.15)",border:"1px solid rgba(20,71,230,.25)",borderRadius:7,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}},
        h('div',{style:{width:8,height:8,borderRadius:"50%",background:C.success,animation:"pulse 2s infinite"}}),
        h('div',{style:{fontSize:11.5,fontWeight:600,color:"rgba(255,255,255,.7)"}},"Sistema Activo")
      ),
      h('nav',{style:{flex:1,padding:"4px 8px",overflowY:"auto"}},
        GROUPS.map(g=>h('div',{key:g,style:{marginBottom:4}},
          h('div',{style:{fontSize:9.5,fontWeight:700,color:"rgba(255,255,255,.25)",textTransform:"uppercase",letterSpacing:".12em",padding:"9px 8px 4px"}},g),
          NAV.filter(n=>n.g===g).map(n=>
            h('button',{key:n.id,onClick:()=>nav(n.id),className:`nav-item ${active===n.id?"active":""}`,
              style:{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:6,background:"transparent",color:"rgba(255,255,255,.45)",border:"none",fontSize:13,fontWeight:400,textAlign:"left",marginBottom:1,position:"relative"}},
              h('span',{style:{fontSize:15}},n.e),
              h('span',{style:{flex:1}},n.l),
              n.id==="dashboard"&&alerts.length>0&&h('span',{style:{background:"#DC2626",color:"#fff",fontSize:10,fontWeight:700,borderRadius:4,padding:"1px 6px"}},alerts.length)
            )
          )
        ))
      ),
      h('div',{style:{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,.07)"}},
        h('div',{style:{display:"flex",alignItems:"center",gap:8}},
          h('div',{style:{width:30,height:30,borderRadius:6,background:C.primary+"25",color:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}},user.avatar),
          h('div',{style:{flex:1,overflow:"hidden"}},
            h('div',{style:{fontSize:11.5,fontWeight:600,color:"rgba(255,255,255,.85)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},user.name),
            h('div',{style:{fontSize:9.5,color:"rgba(255,255,255,.35)"}},user.role)
          ),
          h('button',{onClick:()=>setSession(null),style:{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.3)",display:"flex",padding:4,borderRadius:5},
            onMouseEnter:e=>e.currentTarget.style.color="#EF4444",onMouseLeave:e=>e.currentTarget.style.color="rgba(255,255,255,.3)"},
            h(Ic,{n:"logout",s:14})
          )
        )
      )
    ),
    // Content
    h('div',{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},
      h('header',{style:{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 16px 0 18px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}},
        h('div',{style:{display:"flex",alignItems:"center",gap:10}},
          isTablet&&h('button',{onClick:()=>setSideOpen(!sideOpen),style:{background:"none",border:"none",cursor:"pointer",color:C.textMid,display:"flex",padding:4,borderRadius:6}},
            h('svg',{width:20,height:20,fill:"none",stroke:"currentColor",strokeWidth:1.8,strokeLinecap:"round"},
              h('line',{x1:3,y1:6,x2:17,y2:6}),h('line',{x1:3,y1:11,x2:17,y2:11}),h('line',{x1:3,y1:16,x2:17,y2:16})
            )
          ),
          h('div',null,
            h('h1',{style:{fontSize:15,fontWeight:700,color:C.text,letterSpacing:"-.02em"}},TITLES[active]||active),
            !isMobile&&h('div',{style:{fontSize:11,color:C.textLight}},new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"}))
          )
        ),
        h('div',{style:{display:"flex",alignItems:"center",gap:8}},
          !isMobile&&h('div',{style:{display:"flex",alignItems:"center",gap:6,background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:20,padding:"4px 12px"}},
            h('div',{style:{width:6,height:6,borderRadius:"50%",background:C.success,animation:"pulse 2s infinite"}}),
            h('span',{style:{fontSize:12,color:C.textMid,fontWeight:500}},units.filter(u=>u.status==="en ruta").length," en ruta")
          ),
          alerts.length>0&&h('div',{style:{display:"flex",alignItems:"center",gap:5,background:C.dangerBg,border:`1px solid ${C.dangerBd}`,borderRadius:20,padding:"4px 11px",cursor:"pointer"},onClick:()=>nav("dashboard")},
            h(Ic,{n:"bell",s:12,c:C.danger}),
            h('span',{style:{fontSize:12,color:C.danger,fontWeight:600}},alerts.length," alertas")
          ),
          h('div',{style:{width:30,height:30,borderRadius:7,background:C.primaryLt,color:C.primary,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}},user.avatar)
        )
      ),
      h('main',{style:{flex:1,overflowY:"auto",padding:isMobile?"12px 12px":"20px 24px"}},
        h('div',{style:{maxWidth:1360,margin:"0 auto"}},
          active==="dashboard"&&h(Dashboard,{units,drivers,trips,fuel,maint}),
          active==="units"&&h(Units,{units,setUnits,drivers}),
          active==="drivers"&&h(Drivers,{drivers,setDrivers,units}),
          active==="trips"&&h(Trips,{trips,setTrips,units,drivers}),
          active==="fuel"&&h(Fuel,{fuel,setFuel,units,drivers}),
          active==="maint"&&h(Maint,{maint,setMaint,units}),
          active==="rentabilidad"&&h(Rentabilidad,{units,trips,fuel,maint,drivers}),
          active==="cierre"&&h(Cierre,{trips,fuel,units,drivers}),
          active==="gps"&&h(ModGPS,{units,drivers,trips}),
          active==="motor"&&h(ModMotor,{units,drivers}),
          active==="fuelSensor"&&h(ModFuelSensor,{units,drivers,fuel}),
          active==="map"&&h(MapRoutes,{trips,units,drivers}),
          active==="users"&&h(Users,{company})
        )
      ),
      h('footer',{style:{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"7px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}},
        h('span',{style:{fontSize:11,color:C.textLight}},"© 2025 FleetOS Fleet Management OS"),
        h('span',{style:{fontSize:11,color:C.textLight}},"v3.1.0 · FleetOS")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
}
</script>
</body>
